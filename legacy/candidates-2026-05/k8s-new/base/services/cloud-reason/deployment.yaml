apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-reason
  namespace: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-reason
  template:
    metadata:
      labels:
        app: cloud-reason
    spec:
      containers:
      - name: cloud-reason
        image: ghcr.io/portfolio-system-architect/cloud-reason:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: portfolio-secrets
              key: DATABASE_URL
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: INFO
        livenessProbe:
          httpGet:
            path: /api/v1/status
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/status
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
          - name: shared-data
            mountPath: /app/rag-index
            subPath: cloud-reason-rag
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data-pvc
      securityContext:
        fsGroup: 1000
