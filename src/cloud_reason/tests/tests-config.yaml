test:
  component: "cloud-reason"
  directory: "tests/"
  framework: "pytest"
  options:
    verbose: true
    capture_output: false
    fail_fast: false

test_suites:
  - name: "api_tests"
    files: ["tests/test_api.py"]
    description: "Тестирование REST API endpoints"
  - name: "reasoning_tests"
    files: ["tests/test_reasoning.py"]
    description: "Тестирование движка рассуждений"

test_data:
  directory: "tests/data/"
  files:
    - "test_context.json"
    - "test_hypotheses.json"

coverage:
  report_format: "html"
  output_dir: "tests/coverage/"
  minimum_percentage: 85

fixtures:
  - name: "test_client"
    description: "Тестовый клиент для API"
  - name: "mock_git"
    description: "Мок для интеграции с Git"
  - name: "mock_security"
    description: "Мок для сканера безопасности"

