version: "1"
models:
  # Локальные модели Ollama
  - name: Qwen Coder 7B (локально)
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434
    roles:
      - agent
      - chat
      - edit
  
  - name: Qwen Coder 3B (локально)
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
  
  - name: Gemma 3 4B (локально)
    provider: ollama
    model: gemma3:4b
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
  
  - name: Llama 3.2 1B (локально)
    provider: ollama
    model: llama3.2:1b
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
  
  # DeepSeek (через переменные окружения)
  - name: DeepSeek Chat
    provider: deepseek
    model: deepseek-chat
    apiKey: ${DEEPSEEK_API_KEY}
    roles:
      - agent
      - chat
      - edit

mcpServers:
  - name: Example MCP Server
    command: npx
    args:
      - -y
      - "@upstash/example-mcp"
    env: {}