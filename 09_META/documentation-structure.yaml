# documentation-structure.yaml
# Шаблон документации для portfolio-system-architect

root_files:
  required:
    - path: "README.md"
      description: "Главная страница: цель, компоненты, быстрый старт"
    - path: "ARCHITECTURE.md"
      description: "Общая архитектура экосистемы"
    - path: "LICENSE"
      description: "Лицензия MIT для кода"
    - path: "CONTRIBUTING.md"
      description: "Правила вклада в проект"
    - path: "CODE_OF_CONDUCT.md"
      description: "Кодекс поведения сообщества"

  recommended:
    - path: "CHANGELOG.md"
      description: "История изменений"
    - path: "EVIDENCE.md"
      description: "Доказательства экспертизы: кейсы, метрики"

docs_directory:
  adr:
    description: "Architecture Decision Records"
    template: "docs/adr/ADR-TEMPLATE.md"
    required_files:
      - "ADR-001-system-thinking-methodology.md"
      - "ADR-002-component-integration.md"
      - "ADR-003-diagram-format.md"

  architecture:
    description: "Детальное описание архитектуры"
    required_files:
      - "components.md"
      - "integration.md"
      - "tradeoffs.md"

  methodology:
    description: "Методологии и принципы"
    required_files:
      - "system-thinking.md"
      - "architecture-design.md"
      - "integration.md"
      - "visualization.md"

  integration:
    description: "Руководства по интеграции"
    required_files:
      - "case-studies.md"

components_documentation:
  template: |
    # {component_name}

    ## Назначение
    {краткое описание}

    ## Структура
    ```
    {tree-структура}
    ```

    ## API / Интерфейсы
    {описание}

    ## Примеры использования
    {примеры}

    ## Интеграции
    {с какими компонентами взаимодействует}

  components:
    - name: "it-compass"
      path: "components/it-compass/README.md"
      required_sections: ["Назначение", "Маркеры", "API", "Примеры"]

    - name: "cloud-reason"
      path: "components/cloud-reason/README.md"
      required_sections:
        ["Назначение", "API", "Рабочие процессы", "Безопасность"]

    - name: "arch-compass-framework"
      path: "components/arch-compass-framework/README.md"
      required_sections: ["Назначение", "Модули", "Безопасность", "Примеры"]

demos_documentation:
  presentations:
    path: "demos/presentations/case-studies/"
    template: "demos/presentations/case-studies/TEMPLATE.md"

  speaking_materials:
    path: "demos/speaking-materials/"
    required_files:
      - "architecture-workshop/README.md"
      - "interview-materials/README.md"
      - "system-thinking-presentation/README.md"

validation_rules:
  - rule: "Каждый компонент должен иметь README.md"
    check: "components/*/README.md"

  - rule: "Каждый ADR должен иметь статус"
    check: "docs/adr/*.md contains 'Статус:'"

  - rule: "Все ссылки в README должны работать"
    check: "markdown-link-check README.md"
