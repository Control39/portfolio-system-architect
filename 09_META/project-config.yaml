# project-config.yaml
version: "1.1"
name: "portfolio-system-architect"
description: "Единая экосистема архитектора когнитивных систем"
author:
  name: "Екатерина Куделя"
  role: "Архитектор когнитивных систем"
  contact:
    email: "leadarchitect.ai@gmail.com"
    github: "github.com/leadarchitect-ai"

# Ваши реальные компоненты
components:
  - name: "arch-compass-framework"
    path: "components/arch-compass-framework/"
    language: "powershell"
    entrypoint: "ArchCompass.psm1"
    documentation:
      - "README.md"
      - "docs/architecture.md"
    dependencies:
      - "powershell>=7.0"
      - "PSScriptAnalyzer>=1.0.0"
      - "Pester>=5.0.0"

  - name: "it-compass"
    path: "components/it-compass/"
    language: "python"
    entrypoint: "src/core/tracker.py"
    documentation:
      - "README.md"
      - "docs/ARCHITECTURE.md"
      - "docs/METHODOLOGY.md"
    dependencies:
      - "python>=3.12"
      - "streamlit>=1.38.0"
      - "pandas>=2.2.0"
      - "openpyxl>=3.1.0"
      - "requests>=2.32.0"
      - "jinja2>=3.2.0"
    testing:
      framework: "pytest"
      command: "pytest components/it-compass/tests/ -v"

  - name: "cloud-reason"
    description: "Система облачного рассуждения с REST API и интеграцией с Git"
    path: "components/cloud-reason/"
    language: "python"
    entrypoint: "src/api/reasoning_api.py"
    dependencies:
      - "python>=3.12"
      - "fastapi>=0.115.0"
      - "uvicorn>=0.32.0"
      - "pydantic>=2.9.0"
      - "requests>=2.32.0"
      - "gitpython>=3.1.43"
      - "chardet>=5.2.0"
      - "colorama>=0.4.6"
    documentation:
      api: "components/cloud-reason/docs/API.md"
      workflows: "components/cloud-reason/docs/workflows.md"
      readme: "components/cloud-reason/README.md"
    automation:
      scripts:
        - "components/cloud-reason/scripts/run_api.sh"
        - "components/cloud-reason/scripts/run_tests.sh"
    testing:
      framework: "pytest"
      command: "pytest components/cloud-reason/tests/ -v --cov=components/cloud-reason/src"
    ci_cd:
      github_actions:
        workflows:
          - "test-cloud-reason"
          - "deploy-cloud-reason"

  - name: "portfolio-organizer"
    path: "components/portfolio-organizer/"
    language: "python"
    entrypoint: "src/api/reasoning_api.py"
    documentation:
      - "README.md"
    dependencies:
      - "python>=3.8"
      - "fastapi>=0.68.0"
      - "pydantic>=1.8.0"

  - name: "system-proof"
    path: "components/system-proof/"
    language: "powershell"
    entrypoint: "RAG/process_document.ps1"
    documentation:
      - "README.md"
      - "RAG/docs/"
    dependencies:
      - "powershell>=7.0"
      - "PSScriptAnalyzer>=1.0.0"
    testing:
      framework: "Pester"
      command: "Invoke-Pester components/system-proof/tests/"

  - name: "thought-architecture"
    path: "components/thought-architecture/"
    language: "markdown"
    documentation:
      - "README.md"
      - "cases/"
      - "tools/"
    dependencies:
      - "markdown>=3.4.1"

  - name: "career-development-system"
    path: "components/career-development-system/"
    language: "python"
    entrypoint: "src/core/competency_tracker.py"
    documentation:
      - "README.md"
      - "docs/API_REFERENCE.md"
    dependencies:
      - "python>=3.8"
      - "pandas>=1.3.2"
    "unittest"
      command: "python -m unittest discover components/career-development-system/src/tests/"

  - name: "ml-model-registry"
    path: "components/ml-model-registry/"
    language: "python"
    entrypoint: "src/core/registry.py"
    documentation:
      - "README.md"
      - "ARCHITECTURE.md"
    dependencies:
      - "python>=3.8"
      - "fastapi>=0.68.0"
      - "sqlalchemy>=1.4.23"
      - "pydantic>=1.8.2"
      - "pandas>=1.3.2"
      - "numpy>=1.21.2"
      - "scikit-learn>=0.24.2"
      - "mlflow>=1.20.2"
    testing:
      framework: "unittest"
      command: "python -m unittest discover components/ml-model-registry/tests/"

# Автоматизация — ваши реальные скрипты
automation:
  daily_tasks:
    - name: "generate-obsidian-map"
      script: "scripts/generate_obsidian_map.py"
      description: "Генерация карты знаний Obsidian"
      schedule: "0 2 * * *" # ежедневно в 2:00

    - name: "generate-website"
      script: "scripts/generate_website.py"
      description: "Генерация статического сайта"
      schedule: "0 3 * * *"

    - name: "run-daily-automation"
      script: "scripts/run_daily.ps1"
      description: "Ежедневная автоматизация PowerShell"
      schedule: "0 4 * * *"

  on_commit:
    - name: "validate-markers"
      script: "scripts/sync_case_markers.py"
      description: "Синхронизация маркеров кейсов"

# CI/CD — ваши реальные workflows
ci_cd:
  github_actions:
    workflows:
      - name: "update-components"
        path: ".github/workflows/update.yml"
        triggers: ["push", "pull_request"]
      - name: "code-quality"
        path: ".github/workflows/code-quality.yml"
        triggers: ["push", "pull_request"]
      - name: "test-cloud-reason"
        path: ".github/workflows/test-cloud-reason.yml"
        triggers: ["push", "pull_request"]

# Теги для поиска и грантов
tags:
  - "cognitive-architecture"
  - "system-thinking"
  - "portfolio-automation"
  - "open-source"
  - "sourcecraft-grant-ready"
  - "python"
  - "powershell"
  - "ai-assisted"
  - "ml-ops"
  - "rag-system"

# Единые стандарты проекта
standards:
  python:
    version: ">=3.8"
    formatter: "black"
    linter: "ruff"
    type_checker: "mypy"
    test_framework: "pytest"
    docstring_style: "google"
  
  powershell:
    version: ">=7.0"
    linter: "PSScriptAnalyzer"
    test_framework: "Pester"
  
  documentation:
    primary_language: "ru"
    secondary_language: "en"
    format: "markdown"
  
  testing:
min_coverage_python: 100
    min_coverage_powershell: 60
    require_tests: true
  
  security:
    tools: ["gitleaks", "bandit", "git-secrets"]
    scan_on_commit: true
    scan_on_pr: true