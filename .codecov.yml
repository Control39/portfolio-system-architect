# Codecov configuration for portfolio-system-architect
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 5%
        base: auto
    patch:
      default:
        target: 80%
        threshold: 5%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  python:
    paths:
      - apps/
      - src/
      - tools/
    carryforward: true

ignore:
  - "**/tests/"
  - "**/__pycache__/"
  - "**/.venv/"
  - "**/venv/"
  - "**/node_modules/"
  - "**/migrations/"
  - "**/docs/"
  - "**/examples/"

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

github_checks:
  annotations: true