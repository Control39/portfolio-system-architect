# code-quality.yaml
# Правила качества кода для мультиязычного проекта

python:
  linting:
    tool: "ruff"
    config:
      line_length: 88
      target_version: "py38"
      select: ["E", "F", "I", "W", "C"]
      ignore: []
    paths:
      - "components/*/src/**/*.py"
      - "scripts/*.py"

  formatting:
    tool: "black"
    config:
      line_length: 88
      target_version: ["py38"]
    paths:
      - "components/*/src/**/*.py"
      - "scripts/*.py"

  type_checking:
    tool: "mypy"
    config:
      python_version: "3.8"
      strict: false
    paths:
      - "components/*/src/**/*.py"

  testing:
    framework: "pytest"
    config:
      min_coverage: 70
      test_paths:
        - "components/*/tests/"
        - "tests/"
    commands:
      run: "pytest {path} -v --cov={src_path}"
      coverage: "pytest --cov-report=html"

powershell:
  linting:
    tool: "PSScriptAnalyzer"
    config:
      rules:
        - "PSAvoidUsingWriteHost"
        - "PSUseApprovedVerbs"
        - "PSUseConsistentIndentation"
    paths:
      - "components/**/*.ps1"
      - "scripts/**/*.ps1"

  formatting:
    tool: "psscriptformatter"
    paths:
      - "components/**/*.ps1"
      - "scripts/**/*.ps1"

  testing:
    framework: "Pester"
    config:
      min_coverage: 60
    paths:
      - "components/*/tests/**/*.Tests.ps1"

markdown:
  linting:
    tool: "markdownlint"
    config:
      line_length: false
      no_inline_html: false
    paths:
      - "**/*.md"
      - "!node_modules/**"
      - "!website/**"

security:
  tools:
    - name: "gitleaks"
      description: "Поиск секретов в Git-истории"
      command: "gitleaks detect --source . --redact"
      paths: ["."]

    - name: "bandit"
      description: "Анализ безопасности Python-кода"
      command: "bandit -r components/*/src -ll"
      paths: ["components/*/src/**/*.py"]

    - name: "git-secrets"
      description: "Предотвращение коммита секретов"
      command: "git-secrets --scan"
      paths: ["."]

documentation:
  python_docstrings:
    style: "google"
    required_sections: ["Args", "Returns", "Raises"]
    paths: ["components/*/src/**/*.py"]

  readme_requirements:
    - "Краткое описание компонента"
    - "Структура файлов"
    - "Пример использования"
    - "Зависимости"
    - "Лицензия"

github_actions:
  workflows:
    - name: "code-quality"
      path: ".github/workflows/code-quality.yml"
      triggers: ["push", "pull_request"]
      jobs:
        - "lint-python"
        - "lint-powershell"
        - "test-python"
        - "security-scan"

    - name: "docs-validation"
      path: ".github/workflows/docs-validation.yml"
      triggers: ["push"]
      jobs:
        - "validate-markdown"
        - "check-links"
