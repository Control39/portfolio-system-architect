[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".venv",
    "legacy",
    "experiments",
    "site",
]

[tool.ruff.lint]
# E402: module level import not at top of file
# Игнорируем, т.к. в монорепозитории sys.path.insert должен идти ДО импортов Атомов из src/
# Это архитектурное решение, см. docs/architecture/decisions/ADR-014-monorepo-boundary.md
extend-ignore = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
