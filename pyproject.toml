[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "portfolio-system-architect"
dynamic = ["version"]
dependencies = [
  # core deps from requirements.txt implied
]
readme = "README.md"

[tool.pytest.ini_options]
testpaths = [
  "apps",
  "tests",
  "tests/e2e",
  "tests/unit"
]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
pythonpath = [
  ".",
  "apps",
  "apps/ml-model-registry",
  "apps/cloud-reason",
  "apps/cloud-reason/cloud_reason",
  "apps/it-compass",
  "apps/it-compass/src",
  "apps/career-development/career-development-system/src"
]
addopts = "--cov=apps --cov=src --cov-report=html --cov-report=term-missing -m 'not slow'"
markers = [
  "e2e: E2E tests (services up)",
  "slow: Slow tests"
]
filterwarnings = [
  "ignore::DeprecationWarning:langchain"
]

[tool.pytest-cov]
cov_fail_under = 95

