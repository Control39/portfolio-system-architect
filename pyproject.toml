[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "portfolio-system-architect"
dynamic = ["version"]
dependencies = [
    "fastapi>=0.68.0",
    "uvicorn[standard]>=0.15.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.5.2",
    "sqlalchemy>=2.0.0",
    "alembic>=1.12.0",
    "psycopg2-binary>=2.9.0",
    "redis>=5.0.0",
    "requests>=2.33.1",  # Security update: CVE fixes
    "langchain>=0.3.1",
    "langchain-community>=0.3.27",
    "langchain-openai>=0.3.0",
    "pandas>=1.3.2",
    "python-multipart>=0.0.5",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "httpx>=0.28.1",  # Update for security and performance
    "pyyaml>=6.0.3",  # Security update: CVE-2020-14343 fix
    "sentence-transformers>=2.2.2",
    "chromadb>=0.4.22",
]
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "Lead AI Systems Architect", email = ""},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[tool.pytest.ini_options]
testpaths = [
  "apps",
  "tests",
  "tests/e2e",
  "tests/unit"
]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
pythonpath = [
  ".",
  "apps",
  "apps/ml-model-registry",
  "apps/cloud-reason",
  "apps/cloud-reason/cloud_reason",
  "apps/it-compass",
  "apps/it-compass/src",
  "apps/career-development/career-development-system/src"
]
addopts = "--cov=apps --cov=src --cov-report=html --cov-report=term-missing -m 'not slow'"
markers = [
  "e2e: E2E tests (services up)",
  "slow: Slow tests"
]
filterwarnings = [
  "ignore::DeprecationWarning:langchain"
]

[tool.pytest-cov]
cov_fail_under = 95

[tool.hatch]
package-format = ["sdist", "wheel"]

[tool.hatch.version]
path = "src/assistant_orchestrator/__init__.py"

[tool.hatch.build.targets.sdist]
packages = ["src/assistant_orchestrator"]

[tool.hatch.build.targets.wheel]
packages = ["src/assistant_orchestrator"]

[tool.repo-audit]
# Конфигурация автоматического аудита репозитория
levels = ["base", "professional", "enterprise"]
# Пути к чек-листам
checklist_path = "tools/repo_audit/checklists/"
# Порог прохождения (в процентах)
pass_threshold = 80
# Автоматическое исправление
auto_fix = false
# Формат вывода (json, markdown, console)
output_format = "markdown"
# Исключаемые пути
exclude_paths = [
  ".venv",
  "node_modules",
  "__pycache__",
  ".git",
  "coverage_html",
  "data",
  "postgres",
]
# Интеграция с GitHub
github_integration = true
# Slack-уведомления (опционально)
slack_webhook = ""
