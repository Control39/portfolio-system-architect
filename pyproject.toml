[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "portfolio-system-architect"
dynamic = ["version"]
dependencies = [
    "flask-wtf>=1.2.0",
    "fastapi>=0.135.2",
    "uvicorn[standard]>=0.46.0",
    "pydantic>=2.9.2",
    "pydantic-settings>=2.6.1",
    "sqlalchemy>=2.0.37",
    "alembic>=1.14.0",
    "psycopg2-binary>=2.9.10",
    "redis>=5.3.1",
    "requests>=2.33.1",  # Security update: CVE fixes
    "langchain>=1.2.13",
    "langchain-community>=0.2.28",
    "langchain-openai>=0.2.1",
    "pandas>=3.0.2",
    "python-multipart>=0.0.13",
    "python-jose[cryptography]>=3.5.0",
    "passlib[bcrypt]>=1.7.4",
    "httpx>=0.28.1",  # Update for security and performance
    "pyyaml>=6.0.3",  # Security update: CVE-2020-14343 fix
    "sentence-transformers>=3.0.1",
    "chromadb>=1.5.5",
]
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "Lead AI Systems Architect", email = ""},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[tool.pytest.ini_options]
testpaths = [
  "apps",
  "tests",
  "tests/e2e",
  "tests/unit"
]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
pythonpath = []
addopts = "--cov=apps --cov=src --cov-report=html --cov-report=term-missing -m 'not slow'"
markers = [
  "e2e: E2E tests (services up)",
  "slow: Slow tests"
]
filterwarnings = [
  "ignore::DeprecationWarning:langchain"
]

[tool.pytest-cov]
cov_fail_under = 95

[tool.hatch]
package-format = ["sdist", "wheel"]

[tool.hatch.version]
path = "src/assistant_orchestrator/__init__.py"

[tool.hatch.build.targets.sdist]
packages = ["src", "apps"]

[tool.hatch.build.targets.wheel]
packages = ["src", "apps"]

[project.optional-dependencies]
audit = [
    "pip-audit>=2.9.0",
    "bandit>=1.8.0"
]
dev = [
    "pytest>=9.0.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
    "ruff>=0.15.0",
    "black>=26.0.0",
    "bandit>=1.8.0",
    "mypy>=1.15.0",
]
test = [
    "pytest>=9.0.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
]
docs = [
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
]



[tool.repo-audit]
# Конфигурация автоматического аудита репозитория
levels = ["base", "professional", "enterprise"]
# Пути к чек-листам
checklist_path = "tools/repo_audit/checklists/"
# Порог прохождения (в процентах)
pass_threshold = 80
# Автоматическое исправление
auto_fix = false
# Формат вывода (json, markdown, console)
output_format = "markdown"
# Исключаемые пути
exclude_paths = [
  ".venv",
  "node_modules",
  "__pycache__",
  ".git",
  "coverage_html",
  "data",
  "postgres",
]
# Интеграция с GitHub
github_integration = true
# Slack-уведомления (опционально)
slack_webhook = ""
