[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "apps"]
markers = [
    "e2e: marks tests as end-to-end (slow)",
    "slow: marks tests as slow",
    "timeout: mark tests with timeout"
]
addopts = [
    "-v",
    "--tb=short",
    "--cov=apps",
    "--cov=src",
    "--cov-report=html:coverage_html",
    "--cov-report=term-missing",
    "--cov-fail-under=95"
]

[tool.black]
line-length = 120
target-version = ["py310", "py311", "py312"]
include = '\\.pyi?$'
extend-exclude = '''
/(
    \\.venv
    | __pycache__
    | \\.pytest_cache
    | \\.mypy_cache
    | \\.ruff_cache
    | node_modules
    | dist
    | build
    | migrations
    | postgres
)/
'''

[tool.isort]
profile = "black"
line_length = 120
known_first_party = ["apps", "src"]
lines_after_imports = 2
combine_as_imports = true
force_wrap_aliases = true

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
    "\\.venv/",
    "__pycache__/",
    "\\.pytest_cache/",
    "node_modules/",
    "dist/",
    "build/",
]

[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "node_modules",
    "dist",
    "build",
    "migrations",
    "postgres",
    "coverage_html",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C4", "SIM", "UP", "RUF"]
ignore = [
    "RUF001",  # Ambiguous unicode character in string (кириллица разрешена)
    "RUF002",  # Ambiguous unicode character in docstring
    "RUF003",  # Ambiguous unicode character in comment
    "PERF",    # Performance optimizations (опционально)
    "RET",     # Return statements (частично)
    "SIM108",  # Ternary operator (стиль)
]