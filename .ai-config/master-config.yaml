version: "1.0"
models:
  - id: "ollama-llama3.1"
    name: "Llama 3.1 8B"
    provider:
      type: "ollama"
      baseUrl: "http://localhost:11434"
    capabilities:
      chat: true
      completion: true
      embedding: false
  - id: "gigachat"
    name: "GigaChat GPT 4o Mini"
    provider:
      type: "gigachat"
      apiKey: "${GIGACHAT_API_KEY}"
    capabilities:
      chat: true
      vision: true
      functionCalling: true
  - id: "yandexgpt"
    name: "YandexGPT 3 Lite"
    provider:
      type: "yandexgpt"
      apiKey: "${YANDEXGPT_API_KEY}"
      folderId: "${YANDEXGPT_FOLDER_ID}"
    capabilities:
      chat: true
      completion: true
  - id: "deepseek"
    name: "DeepSeek R1"
    provider:
      type: "deepseek"
      apiKey: "${DEEPSEEK_API_KEY}"
    capabilities:
      chat: true
      coding: true
ui:
  theme: "dark"
  language: "ru"
monitoring:
  enabled: true
  interval: 5000
