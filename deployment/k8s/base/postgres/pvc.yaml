# PostgreSQL PersistentVolumeClaim
# Works on: GKE v1.27+, Kind, Minikube
# On GCP GKE: uses standard storage class

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: portfolio
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard  # GKE default
  resources:
    requests:
      storage: 5Gi  # Sufficient for GCP Free Tier

