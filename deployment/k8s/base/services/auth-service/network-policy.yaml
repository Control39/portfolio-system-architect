apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-network-policy
  labels:
    app: auth-service
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешить входящие запросы из ingress-контроллера (порт 8000)
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: traefik
    ports:
    - protocol: TCP
      port: 8000
  # Разрешить health checks из monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Разрешить DNS-запросы
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Разрешить доступ к PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Запретить доступ к другим сервисам (только если нужно)
  # - to:
  #   - podSelector:
  #       matchLabels:
  #         app: decision-engine
  #   ports:
  #   - protocol: TCP
  #     port: 8001

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-pod-security
  labels:
    app: auth-service
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
  - PodSecurity
  podSecurity:
    enforce:
      version: "restricted"
      exemptUsernames: []
