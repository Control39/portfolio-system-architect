# Services Kustomization
# Includes all 7 microservices with network policies
# Works on: GKE v1.27+, Kind, Minikube

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: portfolio

resources:
  - shared-data-pvc.yaml
  - it-compass/
  - decision-engine/
  - ml-model-registry/
  - career-development/
  - portfolio-organizer/
  - system-proof/
  - auth-service/

commonLabels:
  component: microservices
  managed-by: kustomize

# Автоматическое применение Pod Security Standards через annotations
commonAnnotations:
  pod-security.kubernetes.io/enforce: restricted
  pod-security.kubernetes.io/enforce-version: latest
