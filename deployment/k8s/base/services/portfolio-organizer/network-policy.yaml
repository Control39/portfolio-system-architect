apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portfolio-organizer-network-policy
  labels:
    app: portfolio-organizer
spec:
  podSelector:
    matchLabels:
      app: portfolio-organizer
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешить входящие запросы из ingress
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: traefik
    ports:
    - protocol: TCP
      port: 8002
  # Health checks
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8002
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # API к decision-engine
  - to:
    - podSelector:
        matchLabels:
          app: decision-engine
    ports:
    - protocol: TCP
      port: 8001
  # API к ml-model-registry
  - to:
    - podSelector:
        matchLabels:
          app: ml-model-registry
    ports:
    - protocol: TCP
      port: 8000
  # API к auth-service
  - to:
    - podSelector:
        matchLabels:
          app: auth-service
    ports:
    - protocol: TCP
      port: 8000
  # Доступ к system-proof (хранилище доказательств)
  - to:
    - podSelector:
        matchLabels:
          app: system-proof
    ports:
    - protocol: TCP
      port: 8003
