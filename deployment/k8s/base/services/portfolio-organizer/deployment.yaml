apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-organizer
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-organizer
  template:
    metadata:
      labels:
        app: portfolio-organizer
    spec:
      containers:
      - name: portfolio-organizer
        image: ghcr.io/portfolio-system-architect/portfolio-organizer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8004
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
      securityContext:
        fsGroup: 1000
