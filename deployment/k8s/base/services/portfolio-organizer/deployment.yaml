apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio_organizer
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio_organizer
  template:
    metadata:
      labels:
        app: portfolio_organizer
    spec:
      containers:
      - name: portfolio_organizer
        image: ghcr.io/portfolio-system-architect/portfolio_organizer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8004
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
          - name: shared-data
            mountPath: /app/portfolio-data
            subPath: portfolio_organizer
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data-pvc
      securityContext:
        fsGroup: 1000

