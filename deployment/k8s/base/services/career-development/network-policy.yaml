apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: career-development-network-policy
  labels:
    app: career-development
spec:
  podSelector:
    matchLabels:
      app: career-development
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешить входящие запросы из it-compass
  - from:
    - podSelector:
        matchLabels:
          app: it-compass
    ports:
    - protocol: TCP
      port: 8004
  # Health checks
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8004
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # API к decision-engine
  - to:
    - podSelector:
        matchLabels:
          app: decision-engine
    ports:
    - protocol: TCP
      port: 8001
  # Redis (кэш рекомендаций)
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
