apiVersion: apps/v1
kind: Deployment
metadata:
  name: career-development
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: career-development
  template:
    metadata:
      labels:
        app: career-development
    spec:
      containers:
      - name: career-development
        image: ghcr.io/portfolio-system-architect/career-development:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
          - name: shared-data
            mountPath: /app/career-data
            subPath: career-development
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data-pvc
      securityContext:
        fsGroup: 1000
