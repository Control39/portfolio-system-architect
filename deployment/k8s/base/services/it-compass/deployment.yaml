# IT-Compass Deployment
# Skill tracking UI for IT professionals
# Works on: GKE v1.27+, Kind, Minikube

apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-compass
  namespace: portfolio
  labels:
    app: it-compass
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: it-compass
  template:
    metadata:
      labels:
        app: it-compass
        tier: frontend
    spec:
      containers:
      - name: it-compass
        image: ghcr.io/portfolio-system-architect/it-compass:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
          name: http
        
        envFrom:
        - configMapRef:
            name: it-compass-config
        
        volumeMounts:
        - name: data
          mountPath: /app/data
        
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
      
      volumes:
      - name: data
        emptyDir: {}
      
      securityContext:
        fsGroup: 1000
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - it-compass
              topologyKey: kubernetes.io/hostname
