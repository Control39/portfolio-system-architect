apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: it-compass-network-policy
  labels:
    app: it-compass
spec:
  podSelector:
    matchLabels:
      app: it-compass
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешить входящие запросы из ingress (Streamlit UI)
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: traefik
    ports:
    - protocol: TCP
      port: 8501
  # Health checks
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8501
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # API к decision-engine
  - to:
    - podSelector:
        matchLabels:
          app: decision-engine
    ports:
    - protocol: TCP
      port: 8001
  # API к auth-service
  - to:
    - podSelector:
        matchLabels:
          app: auth-service
    ports:
    - protocol: TCP
      port: 8000
