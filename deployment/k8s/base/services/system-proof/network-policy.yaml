apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: system-proof-network-policy
  labels:
    app: system-proof
spec:
  podSelector:
    matchLabels:
      app: system-proof
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешить входящие запросы из portfolio-organizer
  - from:
    - podSelector:
        matchLabels:
          app: portfolio-organizer
    ports:
    - protocol: TCP
      port: 8003
  # Health checks
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8003
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # ChromaDB (векторное хранение доказательств)
  - to:
    - podSelector:
        matchLabels:
          app: chromadb
    ports:
    - protocol: TCP
      port: 8000
