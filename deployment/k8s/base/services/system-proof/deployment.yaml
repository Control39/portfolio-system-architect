apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-proof
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: system-proof
  template:
    metadata:
      labels:
        app: system-proof
    spec:
      containers:
      - name: system-proof
        image: ghcr.io/portfolio-system-architect/system-proof:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: portfolio-secrets
              key: DATABASE_URL
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: INFO
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
      securityContext:
        fsGroup: 1000
