apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model-registry
  namespace: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-model-registry
  template:
    metadata:
      labels:
        app: ml-model-registry
    spec:
      containers:
      - name: ml-model-registry
        image: ghcr.io/portfolio-system-architect/ml-model-registry:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: portfolio-secrets
              key: DATABASE_URL
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: INFO
        volumeMounts:
        - name: shared-data
          mountPath: /app/models
          subPath: ml-model-registry
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1500m
            memory: 2Gi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: shared-data-pvc
      securityContext:
        fsGroup: 1000

