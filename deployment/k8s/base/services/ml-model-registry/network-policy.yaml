apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ml-model-registry-network-policy
  labels:
    app: ml-model-registry
spec:
  podSelector:
    matchLabels:
      app: ml-model-registry
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешить входящие запросы из decision-engine
  - from:
    - podSelector:
        matchLabels:
          app: decision-engine
    ports:
    - protocol: TCP
      port: 8000
  # Разрешить входящие запросы из portfolio-organizer
  - from:
    - podSelector:
        matchLabels:
          app: portfolio-organizer
    ports:
    - protocol: TCP
      port: 8000
  # Health checks
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL (метаданные моделей)
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # S3/MinIO (хранилище артефактов)
  - to:
    - podSelector:
        matchLabels:
          app: minio
    ports:
    - protocol: TCP
      port: 9000
