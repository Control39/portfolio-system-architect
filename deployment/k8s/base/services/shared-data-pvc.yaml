# Shared PersistentVolumeClaim for service data
# Used by decision-engine, ml-model-registry, system-proof, etc.
# Mounted as /app/data, /app/models, /app/rag-index, etc.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-data-pvc
  namespace: portfolio
  labels:
    app: portfolio
    tier: data
spec:
  accessModes:
    - ReadWriteOnce  # Changed from RWX to RWO for local testing
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi   # Reduced for local testing
