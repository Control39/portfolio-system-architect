# Ingress with API Gateway & Auth
# Routes traffic through auth-service for JWT validation
# Works on: GKE v1.27+, Kind, Minikube

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/auth-url: "http://auth-service:8100/auth/verify"
    nginx.ingress.kubernetes.io/auth-signin: "http://auth-service:8100/auth/token"
    # For GCP Ingress:
    # kubernetes.io/ingress.class: "gce"
    # networking.gke.io/managed-certificates: "portfolio-cert"
spec:
  rules:
  - host: portfolio.local
    http:
      paths:
      # Public endpoints (no auth required)
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8100

      # Protected endpoints (auth required)
      - path: /it-compass
        pathType: Prefix
        backend:
          service:
            name: it-compass
            port:
              number: 8501

      - path: /decision-engine
        pathType: Prefix
        backend:
          service:
            name: decision-engine
            port:
              number: 8001

      - path: /ml-registry
        pathType: Prefix
        backend:
          service:
            name: ml-model-registry
            port:
              number: 8001

      - path: /career-dev
        pathType: Prefix
        backend:
          service:
            name: career-development
            port:
              number: 8000

      - path: /portfolio-organizer
        pathType: Prefix
        backend:
          service:
            name: portfolio-organizer
            port:
              number: 8004

      - path: /system-proof
        pathType: Prefix
        backend:
          service:
            name: system-proof
            port:
              number: 8003
