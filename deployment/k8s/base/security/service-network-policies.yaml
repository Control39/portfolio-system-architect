# Service-specific Network Policies
# Implements micro-segmentation for each microservice
# Works on: GKE v1.27+ (network policies enabled), Kind, Minikube

---
# decision-engine: Only accept requests from IT-Compass and Portfolio-Organizer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: decision-engine-network-policy
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: decision-engine
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: it-compass
    - podSelector:
        matchLabels:
          app: portfolio-organizer
    ports:
    - protocol: TCP
      port: 8001
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow connection to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432

---
# it-compass: Only accept requests from Traefik (ingress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: it-compass-network-policy
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: it-compass
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8501
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow connection to decision-engine
  - to:
    - podSelector:
        matchLabels:
          app: decision-engine
    ports:
    - protocol: TCP
      port: 8001

