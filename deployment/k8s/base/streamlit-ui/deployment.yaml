# Kubernetes Deployment for Architect Assistant Streamlit UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-ui
  namespace: portfolio-system
  labels:
    app: streamlit-ui
    component: ai-architect
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-ui
  template:
    metadata:
      labels:
        app: streamlit-ui
        component: ai-architect
        tier: frontend
    spec:
      containers:
      - name: streamlit-ui
        image: streamlit-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8503
          name: http
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
          value: "false"
        - name: API_URL
          value: "http://rag-api.portfolio-system.svc.cluster.local:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8503
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8503
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
      # Node selector for frontend (optional)
      nodeSelector:
        kubernetes.io/role: frontend
