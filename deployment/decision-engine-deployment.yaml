apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-engine
  template:
    metadata:
      labels:
        app: decision-engine
    spec:
      containers:
      - name: decision-engine
        image: portfolio-system-architect:decision-engine
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: decision-engine
spec:
  selector:
    app: decision-engine
  ports:
  - port: 8001
    targetPort: 8001
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: decision-engine-config
data:
  PYTHONPATH: /app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: decision-engine
spec:
  rules:
  - host: decision-engine.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: decision-engine
            port:
              number: 8001
