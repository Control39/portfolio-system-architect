apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-model-registry
  template:
    metadata:
      labels:
        app: ml-model-registry
    spec:
      containers:
      - name: ml-model-registry
        image: portfolio-system-architect:ml-model-registry
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: ml-model-registry
spec:
  selector:
    app: ml-model-registry
  ports:
  - port: 8002
    targetPort: 8002
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-model-registry-config
data:
  PYTHONPATH: /app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-model-registry
spec:
  rules:
  - host: ml-model-registry.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ml-model-registry
            port:
              number: 8002
