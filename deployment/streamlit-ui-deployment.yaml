# Kubernetes Deployment for Architect Assistant Streamlit UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-ui
  namespace: portfolio-system
  labels:
    app: streamlit-ui
    component: ai-architect
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-ui
  template:
    metadata:
      labels:
        app: streamlit-ui
        component: ai-architect
        tier: frontend
    spec:
      containers:
      - name: streamlit-ui
        image: streamlit-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
          name: http
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
          value: "false"
        - name: API_URL
          value: "http://rag-api.portfolio-system.svc.cluster.local:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
      # Node selector for frontend (optional)
      nodeSelector:
        kubernetes.io/role: frontend
---
# Service for Streamlit UI
apiVersion: v1
kind: Service
metadata:
  name: streamlit-ui
  namespace: portfolio-system
  labels:
    app: streamlit-ui
    component: ai-architect
    tier: frontend
spec:
  selector:
    app: streamlit-ui
  ports:
  - port: 8501
    targetPort: 8501
    name: http
  type: ClusterIP
---
# Ingress for external access to Streamlit UI
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streamlit-ui-ingress
  namespace: portfolio-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - architect-assistant.example.com
    secretName: streamlit-ui-tls
  rules:
  - host: architect-assistant.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: streamlit-ui
            port:
              number: 8501
---
# ConfigMap for Streamlit UI configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamlit-ui-config
  namespace: portfolio-system
data:
  config.yaml: |
    api:
      url: "http://rag-api.portfolio-system.svc.cluster.local:8000"
      timeout: 30
    ui:
      title: "AI Architect Assistant"
      theme: "light"
      default_top_k: 3
      default_min_confidence: 0.3
    features:
      enable_history: true
      enable_examples: true
      enable_source_view: true