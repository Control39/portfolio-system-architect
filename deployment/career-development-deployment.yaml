apiVersion: apps/v1
kind: Deployment
metadata:
  name: career-development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: career-development
  template:
    metadata:
      labels:
        app: career-development
    spec:
      containers:
      - name: career-development
        image: portfolio-system-architect:career-development
        ports:
        - containerPort: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: career-development
spec:
  selector:
    app: career-development
  ports:
  - port: 8003
    targetPort: 8003
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: career-development-config
data:
  PYTHONPATH: /app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: career-development
spec:
  rules:
  - host: career-development.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: career-development
            port:
              number: 8003

