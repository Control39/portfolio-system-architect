apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-organizer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-organizer
  template:
    metadata:
      labels:
        app: portfolio-organizer
    spec:
      containers:
      - name: portfolio-organizer
        image: portfolio-system-architect:portfolio-organizer
        ports:
        - containerPort: 8004
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-organizer
spec:
  selector:
    app: portfolio-organizer
  ports:
  - port: 8004
    targetPort: 8004
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-organizer-config
data:
  PYTHONPATH: /app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-organizer
spec:
  rules:
  - host: portfolio-organizer.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portfolio-organizer
            port:
              number: 8004
