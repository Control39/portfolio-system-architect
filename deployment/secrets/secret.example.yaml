# Template for local development (NEVER commit with actual values)
# Copy this file to create sealed-secret.yaml after sealing with kubeseal

apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secrets
  namespace: portfolio
type: Opaque
stringData:
  # Database
  POSTGRES_DB: portfolio
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: "change-me-in-production"
  
  # JWT & API Security
  JWT_SECRET: "dev-jwt-secret-change-in-production"
  JWT_ALGORITHM: "HS256"
  API_KEY_SECRET: "dev-api-key-secret-change-in-production"
  
  # Logging
  LOG_LEVEL: "INFO"
  
  # Optional: Environment
  ENVIRONMENT: "production"

---
# To use this template:
# 1. Replace all "change-me" values with actual secrets from GitHub Secrets
# 2. Run: kubeseal -f deployment/secrets/secret.yaml -w deployment/secrets/sealed-secret.yaml
# 3. Commit only sealed-secret.yaml (encrypted)
# 4. Delete this file or keep it untracked
