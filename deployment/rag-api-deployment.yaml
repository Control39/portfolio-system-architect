# Kubernetes Deployment for Architect Assistant RAG API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: portfolio-system
  labels:
    app: rag-api
    component: ai-architect
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
        component: ai-architect
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: rag-api
        image: rag-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: CHROMA_PERSIST_DIR
          value: "/app/data/chroma_db"
        - name: CACHE_DIR
          value: "/app/data/cache"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
        volumeMounts:
        - name: chroma-data
          mountPath: /app/data/chroma_db
          subPath: chroma_db
        - name: cache-data
          mountPath: /app/data/cache
          subPath: cache
      volumes:
      - name: chroma-data
        persistentVolumeClaim:
          claimName: rag-data-pvc
      - name: cache-data
        emptyDir: {}
---
# Service for RAG API
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: portfolio-system
  labels:
    app: rag-api
    component: ai-architect
    tier: backend
spec:
  selector:
    app: rag-api
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
# PersistentVolumeClaim for ChromaDB data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-data-pvc
  namespace: portfolio-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
# HorizontalPodAutoscaler for RAG API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: portfolio-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
