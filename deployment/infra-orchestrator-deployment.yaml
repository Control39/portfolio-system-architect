apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infra-orchestrator
  template:
    metadata:
      labels:
        app: infra-orchestrator
    spec:
      containers:
      - name: infra-orchestrator
        image: portfolio-system-architect:infra-orchestrator
        ports:
        - containerPort: 8502
---
apiVersion: v1
kind: Service
metadata:
  name: infra-orchestrator
spec:
  selector:
    app: infra-orchestrator
  ports:
  - port: 8502
    targetPort: 8502
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-orchestrator-config
data:
  PYTHONPATH: /app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infra-orchestrator
spec:
  rules:
  - host: infra-orchestrator.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: infra-orchestrator
            port:
              number: 8502

