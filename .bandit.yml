# Bandit Configuration for Portfolio System Architect
# https://bandit.readthedocs.io/en/latest/config.html

# Skip tests for known false positives

skips:
  # B101: assert_used - Asserts are only used in tests (pytest), not in production
  - B101

  # B404: subprocess - subprocess is used with hardcoded commands (no user input)
  # See: src/assistant_orchestrator/plugins/expert_finder.py
  - B404

  # B501: request_with_no_cert_validation - SSL verification enabled by default
  - B501

  # B507: ssh_no_host_key_verification - Host key verification handled separately
  - B507

# Additional configuration
asserts:
  # Report on all assert statements, even if skipped
  check_for_side_effects: true

# Exclude directories
exclude_dirs:
  - '.git'
  - '__pycache__'
  - '.venv'
  - 'venv'
  - 'node_modules'
  - '.eggs'
  - '*.egg-info'
  - 'build'
  - 'dist'
  - 'site'
  - '.archive'

# Output format
output_format: screen

# Severity and confidence thresholds
# B1-B5: Critical, B6-B9: High, B10-B13: Medium, B14+: Low
# Only report Medium and above by default
targets:
  - src/
  - apps/
