# Конфигурация Cognitive Automation Agent
# Версия: 2.0

# Уровень автономности агента
autonomy:
  level: high  # high, medium, low
  approval_required: false
  risk_tolerance: medium  # very_low, low, medium, high, very_high

  # Доверенные паттерны для автоматического выполнения
  trusted_patterns:
    - "*.test.*"  # Автоматическое выполнение тестов
    - "requirements*.txt"  # Автоматическое обновление зависимостей
    - "package.json"  # Автоматическое обновление npm пакетов
    - ".github/workflows/*"  # Автоматическая настройка CI/CD
    - "Dockerfile*"  # Автоматическая сборка и оптимизация
    - "docker-compose*.yml"  # Автоматическая настройка композа
    - "*.config.js"  # Автоматическая настройка конфигураций
    - "*.env.example"  # Автоматическое создание .env файлов

# Настройки сканирования проекта
scanning:
  enabled: true
  triggers:
    project_open: true  # Автоматическое сканирование при открытии проекта
    file_change: true   # Сканирование при изменении файлов
    git_commit: true    # Сканирование перед коммитом
    schedule: "0 */6 * * *"  # Периодическое сканирование (каждые 6 часов)

  levels:
    quick:
      enabled: true
      timeout: 10s
    standard:
      enabled: true
      timeout: 60s
    deep:
      enabled: false  # Включать только при необходимости
      timeout: 300s

  output:
    formats: [json, yaml]
    directory: "apps/cognitive-agent/scans/"
    retention_days: 30
    compare_with_previous: true

# Планировщик задач
task_planner:
  enabled: true
  prediction_model: "ml_based"  # ml_based, rule_based, hybrid

  # Настройки предсказания задач
  prediction:
    use_historical_data: true
    use_project_context: true
    use_user_patterns: true

  # Приоритеты задач
  priorities:
    critical: ["security", "production_issues"]
    high: ["performance", "dependencies"]
    medium: ["code_quality", "documentation"]
    low: ["refactoring", "optimization"]

  # Параллельное выполнение
  parallel_execution:
    enabled: true
    max_parallel_tasks: 5
    resource_aware: true  # Учитывать доступные ресурсы

# Система самообучения
learning:
  enabled: true
  model_retraining:
    schedule: "0 2 * * 0"  # Каждое воскресенье в 2:00
    data_retention_days: 90

  # Сбор метрик
  metrics_collection:
    enabled: true
    interval: 300  # Секунды
    storage: "apps/cognitive-agent/metrics/"

  # Анализ эффективности
  effectiveness_analysis:
    enabled: true
    report_frequency: "weekly"

  # Корректировка алгоритмов
  algorithm_optimization:
    enabled: true
    auto_adjust: true
    validation_required: true

# Интеграции с внешними системами
integrations:
  enabled: true

  # Системы контроля версий
  version_control:
    git:
      enabled: true
      auto_commit: true
      auto_branch: true
      hooks:
        pre_commit: true
        post_merge: true
        pre_push: true

  # CI/CD системы
  ci_cd:
    github_actions:
      enabled: true
      auto_setup: true
      optimization: true

    gitlab_ci:
      enabled: false
      auto_setup: true

    jenkins:
      enabled: false
      auto_setup: true

  # Мониторинг
  monitoring:
    prometheus:
      enabled: true
      auto_setup: true
      scrape_interval: "30s"

    grafana:
      enabled: true
      auto_dashboards: true

    sentry:
      enabled: false
      auto_setup: true

  # Облачные платформы
  cloud:
    aws:
      enabled: false
      auto_discovery: true

    azure:
      enabled: false
      auto_discovery: true

    google_cloud:
      enabled: false
      auto_discovery: true

  # Системы управления проектами
  project_management:
    jira:
      enabled: false
      auto_sync: true

    trello:
      enabled: false
      auto_sync: true

    asana:
      enabled: false
      auto_sync: true

  # Коммуникации
  communications:
    slack:
      enabled: false
      notifications: true

    teams:
      enabled: false
      notifications: true

    telegram:
      enabled: false
      notifications: true

# Безопасность
security:
  # Проверка перед выполнением
  pre_execution_checks:
    enabled: true
    validate_changes: true
    estimate_impact: true

  # Механизм отката
  rollback:
    enabled: true
    auto_rollback: true
    rollback_timeout: 300  # Секунды

  # Резервное копирование
  backup:
    enabled: true
    before_changes: true
    retention: 7  # Дней

  # Ограничения доступа
  access_control:
    allowed_directories: ["/"]  # Все директории
    denied_directories: []  # Нет запрещенных директорий
    file_permissions_check: true

# Производительность
performance:
  # Ограничения ресурсов
  resource_limits:
    max_memory_mb: 1024
    max_cpu_percent: 50
    max_disk_mb: 100

  # Кэширование
  caching:
    enabled: true
    scan_results: true
    dependency_analysis: true
    code_analysis: true
    cache_ttl_hours: 24

  # Оптимизация
  optimization:
    incremental_scanning: true
    parallel_processing: true
    lazy_loading: true

# Логирование и отладка
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  directory: "apps/cognitive-agent/logs/"
  retention_days: 30
  rotation: "daily"

  # Детальное логирование
  detailed_logs:
    scan_details: false
    task_execution: true
    error_details: true
    performance_metrics: true

  # Отчеты
  reports:
    daily_summary: true
    weekly_analysis: true
    monthly_trends: true

# Уведомления
notifications:
  enabled: true

  # Типы уведомлений
  types:
    critical_issues: true
    security_alerts: true
    performance_degradation: true
    task_completion: false  # Только для критических задач
    learning_updates: false

  # Каналы уведомлений
  channels:
    console: true
    log_file: true
    # email: false
    # webhook: false

# Расширения и плагины
extensions:
  # Встроенные скиллы
  builtin_skills:
    - project-scanner
    - task-planner
    - learning-system
    - git-automation
    - dependency-manager
    - code-optimizer

  # Кастомные скиллы
  custom_skills:
    directory: "apps/cognitive-agent/skills/custom/"
    auto_load: true

  # Плагины сообщества
  community_plugins:
    enabled: false
    repository: "https://github.com/cognitive-automation/plugins"
    auto_update: false

# Настройки для разных окружений
environments:
  development:
    autonomy_level: high
    risk_tolerance: high
    notifications: false

  staging:
    autonomy_level: medium
    risk_tolerance: medium
    notifications: true

  production:
    autonomy_level: low
    risk_tolerance: low
    notifications: true
    approval_required: true

# Экспериментальные функции
experimental:
  enabled: true  # ВКЛЮЧЕНО 24 мая 2026

  features:
    ai_planning: true  # Использование ИИ для планирования (включено)
    predictive_maintenance: false  # Предсказательное обслуживание
    autonomous_refactoring: false  # Автономный рефакторинг
    code_generation: true  # Генерация кода (включено для MVP)

  # Настройки ИИ-моделей
  ai_models:
    # ═══════════════════════════════════════════════════════════
    # 🧠 УМНЫЙ ВЫБОР МОДЕЛИ
    # Cognitive Agent автоматически выбирает модель по типу задачи
    # ═══════════════════════════════════════════════════════════
    
    # По умолчанию использовать GigaChat Lite (основная работа)
    default: "gigachat-lite"
    
    # ═══════════════════════════════════════════════════════════
    # 🎯 АВТОМАТИЧЕСКИЙ ВЫБОР ПО ТИПУ ЗАДАЧИ
    # ═══════════════════════════════════════════════════════════
    model_selection:
      enabled: true
      strategy: "task_based"  # Выбор на основе типа задачи
      
      # Правила выбора модели
      rules:
        # ─────────────────────────────────────────────────────
        # GigaChat Lite (899k токенов) - ОСНОВНАЯ РАБОТА
        # ─────────────────────────────────────────────────────
        - condition: "task_type in ['coding', 'refactoring', 'testing', 'documentation', 'debugging']"
          model: "gigachat-lite"
          reason: "Экономия токенов Pro/Max, Lite достаточно для повседневных задач"
          
        # ─────────────────────────────────────────────────────
        # GigaChat Pro (50k токенов) - СЛОЖНЫЕ АРХИТЕКТУРНЫЕ ЗАДАЧИ
        # ─────────────────────────────────────────────────────
        - condition: "task_type in ['architecture', 'system_design', 'integration_planning'] OR complexity == 'high'"
          model: "gigachat-pro"
          reason: "Требуется более глубокое понимание и reasoning"
          
        # ─────────────────────────────────────────────────────
        # GigaChat Max (45k токенов) - КРИТИЧНЫЕ РЕШЕНИЯ
        # ─────────────────────────────────────────────────────
        - condition: "task_type in ['critical_decision', 'grant_proposal', 'strategic_planning'] OR complexity == 'critical'"
          model: "gigachat-max"
          reason: "Максимальное качество для критически важных решений"
          warning: "⚠️ Использовать только при необходимости! Ограниченный бюджет токенов"
          
        # ─────────────────────────────────────────────────────
        # Ollama Qwen2.5-Coder - БЫСТРЫЕ ПРАВКИ / ОФФЛАЙН
        # ─────────────────────────────────────────────────────
        - condition: "task_type == 'quick_edit' OR offline_mode == true OR gigachat_unavailable == true"
          model: "ollama-qwen2.5-coder"
          reason: "Локальная модель без лимитов токенов"
          
        # ─────────────────────────────────────────────────────
        # Ollama Cogito - АРХИТЕКТУРНЫЙ ОБЗОР / DIAGRAMS
        # ─────────────────────────────────────────────────────
        - condition: "task_type in ['architecture_review', 'diagram_generation', 'adr_writing'] AND offline_mode == true"
          model: "ollama-cogito"
          reason: "Специализирована на reasoning и архитектуре"
      
      # Приоритет fallback-цепочки
      fallback_chain:
        primary: "gigachat-lite"
        chain:
          - id: "gigachat-pro"
            trigger: "complexity == 'high' OR timeout == true"
          - id: "gigachat-max"
            trigger: "complexity == 'critical' OR explicit_request == true"
          - id: "ollama-qwen2.5-coder"
            trigger: "gigachat_unavailable == true OR offline_mode == true"
          - id: "ollama-cogito"
            trigger: "architecture_task == true"
          - id: "yandexgpt"
            trigger: "all_others_failed == true"
      
      # Настройки таймаутов и повторных попыток
      timeout:
        gigachat: 60s
        ollama: 120s
        yandexgpt: 60s
      
      retry:
        count: 2
        backoff: "exponential"  # Экспоненциальная задержка
      
      # Логирование выбора модели
      logging:
        log_model_selection: true
        log_token_usage: true
        log_fallbacks: true
    
    # ═══════════════════════════════════════════════════════════
    # 📊 МОНИТОРИНГ БЮДЖЕТА ТОКЕНОВ
    # ═══════════════════════════════════════════════════════════
    token_budget:
      enabled: true
      limits:
        gigachat-lite: 899799
        gigachat-pro: 50000
        gigachat-max: 45338
      
      alerts:
        low_budget: 10000          # Предупреждение при остатке < 10k
        critical_budget: 5000      # Критический уровень < 5k
        
      actions:
        on_low_budget: "switch_to_lite"  # Переключиться на Lite
        on_critical: "require_approval"  # Требовать подтверждения пользователя
    
    # ═══════════════════════════════════════════════════════════
    # ☁️ GigaChat (облачные модели)
    # ═══════════════════════════════════════════════════════════
    gigachat:
      enabled: true
      endpoint: "https://gigachat.devices.sberbank.ru/api/v1"
      api_key_env: "GIGACHAT_API_KEY"
      models:
        - "GigaChat-Lite"    # Основная
        - "GigaChat-Pro"     # Сложные задачи
        - "GigaChat-Max"     # Критичные решения
    
    # ═══════════════════════════════════════════════════════════
    # 💻 Ollama (локальные модели)
    # ═══════════════════════════════════════════════════════════
    ollama:
      enabled: true
      endpoint: "http://localhost:11434"
      models:
        - "qwen2.5-coder:7b"  # Кодинг
        - "cogito:3b"         # Архитектура
    
    # ═══════════════════════════════════════════════════════════
    # 🇷🇺 YandexGPT (дополнительный резерв)
    # ═══════════════════════════════════════════════════════════
    yandexgpt:
      enabled: true
      api_key_env: "YANDEXGPT_API_KEY"
      folder_id_env: "YANDEXGPT_FOLDER_ID"
      model: "yandexgpt-lite"

  # Ограничения экспериментальных функций
  constraints:
    max_execution_time: 600  # Секунды
    require_validation: true
    rollback_guarantee: true

