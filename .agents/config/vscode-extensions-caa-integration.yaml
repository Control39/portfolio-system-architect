# Конфигурация интеграции системы автоматизации расширений VS Code с CAA
# Cognitive Automation Agent будет автоматически управлять расширениями

name: vscode-extensions-automation
version: "1.0"
description: |
  Интеграция системы автоматического управления расширениями VS Code
  с Cognitive Automation Agent для полной автономии

triggers:
  - event: project_opened
    action: check_extensions_compliance
    priority: medium

  - event: config_changed
    file_pattern: "config/vscode/vscode-extensions.json"
    action: sync_extensions
    priority: high

  - event: schedule
    cron: "0 9 * * 1"  # Каждый понедельник в 9:00
    action: weekly_extensions_audit
    priority: low

actions:
  check_extensions_compliance:
    description: "Проверка соответствия установленных расширений конфигурации"
    script: "scripts/vscode-extensions-manager.py --check --report"
    timeout: 300
    expected_output:
      - "compliance_score"
      - "missing_extensions"
      - "recommendations"

  sync_extensions:
    description: "Синхронизация расширений с конфигурацией"
    script: "scripts/vscode-extensions-manager.py --sync --dry-run"
    requires_approval: true
    approval_prompt: "Синхронизировать расширения VS Code? Будут установлены/удалены расширения."

  weekly_extensions_audit:
    description: "Еженедельный аудит расширений и генерация отчета"
    script: "scripts/vscode-extensions-manager.py --audit --generate-report"
    output_file: "reports/vscode-extensions-audit-{date}.md"

  optimize_extensions:
    description: "Оптимизация расширений на основе использования"
    script: "scripts/vscode-extensions-manager.py --optimize --usage-data"
    data_source: "~/.vscode/extensions/usage-data.json"

integration:
  with_caa:
    skill_name: "vscode-extensions-manager"
    activation_phrases:
      - "проверь расширения"
      - "синхронизируй расширения"
      - "оптимизируй vs code"
      - "настрой расширения"

  with_ci_cd:
    workflow: ".github/workflows/vscode-extensions-check.yml"
    triggers: ["push", "pull_request", "schedule"]

  monitoring:
    metrics:
      - name: "extensions_compliance_score"
        type: "gauge"
        description: "Оценка соответствия расширений"
        threshold: 90

      - name: "extensions_count"
        type: "counter"
        description: "Количество установленных расширений"

      - name: "extensions_optimization_savings"
        type: "gauge"
        description: "Экономия места после оптимизации (MB)"

notifications:
  on_compliance_below_threshold:
    channels: ["vscode", "slack", "email"]
    message: "Оценка соответствия расширений VS Code ниже порога: {score}%"

  on_extensions_changed:
    channels: ["vscode"]
    message: "Расширения VS Code были обновлены. Установлено: {added}, Удалено: {removed}"

rules:
  - name: "maintain_minimal_compliance"
    condition: "extensions_compliance_score < 90"
    action: "notify_and_suggest_sync"

  - name: "prevent_conflicting_extensions"
    condition: "detected_conflicts > 0"
    action: "resolve_conflicts_automatically"

  - name: "optimize_performance"
    condition: "extensions_count > 50"
    action: "suggest_optimization"

documentation:
  user_guide: "docs/vscode-extensions-automation.md"
  api_reference: "scripts/README.md"
  troubleshooting: "docs/troubleshooting/vscode-extensions.md"

# Конфигурация для разных операционных систем
platform_specific:
  windows:
    script: "scripts/vscode-extensions-windows.ps1"
    vscode_path: "$env:USERPROFILE/.vscode/extensions"

  linux:
    script: "scripts/vscode-extensions-unix.sh"
    vscode_path: "~/.vscode/extensions"

  macos:
    script: "scripts/vscode-extensions-unix.sh"
    vscode_path: "~/.vscode/extensions"

# Тестирование интеграции
test_scenarios:
  - name: "compliance_check"
    steps:
      - run: "scripts/vscode-extensions-manager.py --check"
      - assert: "compliance_score >= 0"

  - name: "dry_run_sync"
    steps:
      - run: "scripts/vscode-extensions-manager.py --sync --dry-run"
      - assert: "no_errors"

  - name: "report_generation"
    steps:
      - run: "scripts/vscode-extensions-manager.py --report"
      - assert: "report_file_exists"
