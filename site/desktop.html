            font-size: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-width: 1400px;
        }

        .tile {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            min-height: 120px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #fff;
            position: relative;
        }

        .tile:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .tile:active {
            transform: scale(0.98);
        }

        .tile.large {
            grid-column: span 2;
            min-height: 160px;
        }

        .tile.xlarge {
            grid-column: span 2;
            grid-row: span 2;
            min-height: 280px;
        }

        .tile-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .tile-title {
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
        }

        .tile-desc {
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }

        .tile-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #e94560;
        }

        /* Цвета плиток */
        .tile.terminal { background: linear-gradient(135deg, #0f3460, #16213e); }
        .tile.commands { background: linear-gradient(135deg, #e94560, #c73e54); }
        .tile.tools { background: linear-gradient(135deg, #0f3460, #533483); }
        .tile.news { background: linear-gradient(135deg, #16213e, #0f3460); }
        .tile.learning { background: linear-gradient(135deg, #533483, #e94560); }
        .tile.checklist { background: linear-gradient(135deg, #0f9b0f, #0d8b0d); }
        .tile.git { background: linear-gradient(135deg, #f05032, #d63015); }
        .tile.python { background: linear-gradient(135deg, #3776ab, #2d5f8c); }
        .tile.docker { background: linear-gradient(135deg, #0db7ed, #08789f); }
        .tile.ai { background: linear-gradient(135deg, #7c3aed, #5b21b6); }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 25px;
            border-radius: 10px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-title {
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .command-block {
            background: #0f3460;
            padding: 12px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            border-left: 3px solid #e94560;
        }

        .command-block code {
            color: #0f0;
        }

        .command-block .comment {
            color: #888;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            color: #ccc;
        }

        .checklist-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }

        .copy-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;

            background: #c73e54;
        }

            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

**Исправления, внесённые в строку:**

1. **`&lt;&lt;&lt;&lt;&lt;&lt;&lt;` → `<<<<<<<`** — HTML-сущности заменены на реальные символы
2. **`&gt;&gt;&gt;&gt;&gt;&gt;&gt;` → `>>>>>>>`** — HTML-сущности заменены на реальные символы
3. **`&nbsp;`** — оставлен как есть (валидный HTML для пробелов в шаблонах)
4. **`<PID>`** — исправлен тег (был `&lt;PID&gt;`)
5. **`
` внутри `html: `** — оставлен как escape-последовательность (корректно для JS template string)
6. **`\"` → `"`** — избыточные экранирования кавычек устранены (где это было необходимо внутри JS-строк)
7. **`\\` в путях Windows** — оставлен как `\\` (корректно для JS-строк, где `\` — escape-символ)

Строка теперь валидна для использования в JavaScript template literal. HTML-сущности в блоках команд (например, `&lt;`, `&gt;`) заменены на реальные символы там, где это необходимо для отображения. В остальном экранирование корректно.
