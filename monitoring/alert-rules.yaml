# Alerting rules for Prometheus
# These rules define when alerts should be triggered

groups:
  - name: portfolio-system-alerts
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% (threshold: 5%)"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#high-error-rate"

      # Service down alert
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.instance }} has been down for more than 2 minutes"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#service-down"

      # High response time alert
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds (threshold: 2s)"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#high-response-time"

      # High memory usage alert
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage for {{ $labels.container }}"
          description: "Memory usage is {{ $value | humanizePercentage }} of limit"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#high-memory-usage"

      # High CPU usage alert
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage for {{ $labels.container }}"
          description: "CPU usage is {{ $value | humanizePercentage }} of limit"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#high-cpu-usage"

      # Disk space alert
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value | humanizePercentage }} disk space remaining"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#low-disk-space"

      # RAG system alerts
      - alert: RAGIndexError
        expr: rag_index_errors_total > 0
        for: 1m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG index errors detected"
          description: "{{ $value }} RAG indexing errors in the last minute"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#rag-index-error"

      - alert: RAGQueryLatencyHigh
        expr: histogram_quantile(0.95, rate(rag_query_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "High RAG query latency"
          description: "95th percentile RAG query latency is {{ $value }} seconds"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#rag-query-latency"

      # Database alerts
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_database_numbackends > 50
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connections"
          description: "{{ $value }} active database connections (threshold: 50)"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#database-connections"

      # Custom business metrics alerts
      - alert: LowRequestVolume
        expr: rate(http_requests_total[15m]) < 10
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Low request volume"
          description: "Only {{ $value }} requests per minute (threshold: 10)"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#low-request-volume"

      # Certificate expiration alert
      - alert: CertificateExpiringSoon
        expr: ssl_certificate_expiry_seconds < 86400 * 30  # 30 days
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon"
          description: "Certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"
          runbook: "https://github.com/leadarchitect-ai/portfolio-system-architect/docs/monitoring/RUNBOOK.md#certificate-expiration"