# Prometheus Alert Rules for Portfolio System Architect
# CPU, Memory, Error Rates, and SLO/SLI metrics

groups:
  - name: portfolio.rules
    interval: 30s
    rules:

      # CPU Alerts
      - alert: HighCPUUsage
        expr: |
          (100 - (avg by (pod) (rate(container_cpu_usage_seconds_total{pod=~"portfolio.*"}[5m])) * 100)) < 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} CPU usage is above 70% (current: {{ $value | humanize }}%)"

      - alert: CriticalCPUUsage
        expr: |
          (100 - (avg by (pod) (rate(container_cpu_usage_seconds_total{pod=~"portfolio.*"}[1m])) * 100)) < 10
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL CPU usage on {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} CPU usage is above 90%!"

      # Memory Alerts
      - alert: HighMemoryUsage
        expr: |
          (container_memory_usage_bytes{pod=~"portfolio.*"} / container_spec_memory_limit_bytes{pod=~"portfolio.*"}) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} memory is above 80% (current: {{ $value | humanize }}%)"

      - alert: OutOfMemory
        expr: |
          (container_memory_usage_bytes{pod=~"portfolio.*"} / container_spec_memory_limit_bytes{pod=~"portfolio.*"}) * 100 > 95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Out of memory on {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} memory is critical ({{ $value | humanize }}%)"

      # Error Rate Alerts
      - alert: HighErrorRate
        expr: |
          (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])) * 100 > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in {{ $labels.job }}"
          description: "Error rate is {{ $value | humanize }}%"

      - alert: CriticalErrorRate
        expr: |
          (rate(http_requests_total{status=~"5.."}[1m]) / rate(http_requests_total[1m])) * 100 > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL error rate in {{ $labels.job }}"
          description: "Error rate is {{ $value | humanize }}% - IMMEDIATE ACTION NEEDED!"

      # Database Connectivity
      - alert: DatabaseDown
        expr: |
          up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database is DOWN"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding"

      # Service Unavailable
      - alert: ServiceDown
        expr: |
          up{job=~"cloud-reason|it-compass|ml-registry|system-proof"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Service {{ $labels.job }} at {{ $labels.instance }} is not responding"

      # Pod Restart Rate
      - alert: HighPodRestartRate
        expr: |
          rate(container_last_seen{pod=~"portfolio.*"}[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High pod restart rate for {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is restarting frequently"

      # Disk Space
      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.device }}"
          description: "Only {{ $value | humanize }}% disk space available"

      # SLO/SLI - Request Latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency in {{ $labels.job }}"
          description: "P95 latency is {{ $value | humanize }}s (SLO target: <1s)"

      # SLO/SLI - Availability
      - alert: SLOAvailabilityBreach
        expr: |
          (1 - (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]))) < 0.99
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Availability SLO breached in {{ $labels.job }}"
          description: "Availability is {{ $value | humanizePercentage }} (SLO target: >99%)"

      # SLO/SLI - Error Budget
      - alert: ErrorBudgetExhausted
        expr: |
          (rate(http_requests_total{status=~"5.."}[30d]) / rate(http_requests_total[30d])) > 0.01
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Error budget exhausted for {{ $labels.job }}"
          description: "30-day error rate is {{ $value | humanizePercentage }} (budget: <1%)"
