global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cloud_reason'
    static_configs:
      - targets: ['cloud-reason:8001']

  - job_name: 'ml_model_registry'
    static_configs:
      - targets: ['ml-model-registry:8001']

  - job_name: 'it_compass'
    static_configs:
      - targets: ['it-compass:8501']

  - job_name: 'career_development'
    static_configs:
      - targets: ['career-development:8000']

  - job_name: 'portfolio_organizer'
    static_configs:
      - targets: ['portfolio-organizer:8004']

  - job_name: 'system_proof'
    static_configs:
      - targets: ['system-proof:8003']

  - job_name: 'arch_compass'
    static_configs:
      - targets: ['arch-compass:80']

  - job_name: 'auth_service'
    static_configs:
      - targets: ['auth-service:8100']

  - job_name: 'rag_api'
    static_configs:
      - targets: ['rag-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'streamlit_ui'
    static_configs:
      - targets: ['streamlit-ui:8501']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'chromadb'
    static_configs:
      - targets: ['chromadb:8000']
    metrics_path: '/metrics'
    scrape_interval: 60s
    scrape_timeout: 15s
