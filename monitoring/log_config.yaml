# Logging Configuration
# Structured logging setup for Portfolio System Architect

logging:
  version: 1

  # Log format settings
  format:
    datefmt: "%Y-%m-%d %H:%M:%S"
    style: "%"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Log levels
  levels:
    default: INFO
    uvicorn: WARNING
    fastapi: WARNING
    sqlalchemy: WARNING
    pydantic: WARNING

  # Handlers
  handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
      formatter: standard
      stream: ext://sys.stdout

    file:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: detailed
      filename: logs/app.log
      maxBytes: 10485760
      backupCount: 5
      encoding: utf8

    error_file:
      class: logging.handlers.RotatingFileHandler
      level: ERROR
      formatter: detailed
      filename: logs/error.log
      maxBytes: 10485760
      backupCount: 5
      encoding: utf8

  # Loggers
  loggers:
    portfolio_system_architect:
      level: DEBUG
      handlers: [console, file, error_file]
      propagate: false

  # Root logger
  root:
    level: DEBUG
    handlers: [console]
