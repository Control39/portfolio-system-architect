# Python Logging Configuration
# This configuration supports both console and file logging

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(module)s - %(funcName)s - %(lineno)d - %(message)s"
  json:
    format: '{"timestamp": "%(asctime)s", "logger": "%(name)s", "level": "%(levelname)s", "module": "%(module)s", "function": "%(funcName)s", "line": %(lineno)d, "message": "%(message)s"}'

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

  json_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/app.json
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

loggers:
  # Application logger
  portfolio_system_architect:
    level: DEBUG
    handlers: [console, file, error_file, json_file]
    propagate: false

  # Third-party loggers
  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  fastapi:
    level: INFO
    handlers: [console]
    propagate: false

  # SQLAlchemy
  sqlalchemy:
    level: WARNING
    handlers: [console]
    propagate: false

  # Pydantic
  pydantic:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: DEBUG
  handlers: [console, file, error_file, json_file]
