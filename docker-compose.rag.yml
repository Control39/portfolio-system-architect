# Docker Compose for Architect Assistant RAG System
# Local development and testing environment

version: '3.8'

services:
  # ChromaDB vector database
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma_db
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma_db
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # RAG API (FastAPI)
  rag-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - CACHE_DIR=/app/data/cache
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - api_cache:/app/data/cache
      - ./api:/app/api
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml
      - ./README.md:/app/README.md
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Streamlit UI
  streamlit-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: streamlit-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://rag-api:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ui:/app/ui
    depends_on:
      rag-api:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL for metadata (if needed)
  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres
    environment:
      - POSTGRES_DB=rag_metadata
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_metadata"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: rag-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - rag-network
    depends_on:
      - postgres

volumes:
  chroma_data:
    driver: local
  api_cache:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  rag-network:
    driver: bridge