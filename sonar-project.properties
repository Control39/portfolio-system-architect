# SonarQube properties for portfolio-system-architect
sonar.projectKey=portfolio-system-architect
sonar.projectName=Portfolio System Architect
sonar.projectVersion=1.0

# Source code
sonar.sources=src,apps,gateway,api
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.exclusions=**/node_modules/**,**/*.min.js,**/__pycache__/**,**/.venv/**,**/.git/**

# Python configuration
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit.xml

# Quality Gate
sonar.qualitygate.wait=true

# Security
sonar.security.config.file=sonar-security-config.json

# Language
sonar.language=py

# Analysis
sonar.sourceEncoding=UTF-8
sonar.host.url=${env:SONAR_HOST_URL}
sonar.login=${env:SONAR_TOKEN}

# Test coverage
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/__init__.py
sonar.coverage.jacoco.xmlReportPaths=coverage.xml

# Duplication
sonar.cpd.exclusions=**/tests/**,**/test_*.py