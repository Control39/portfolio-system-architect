[pytest]
asyncio_mode = auto
testpaths = python_server/tests apps/*/tests src/*/tests
addopts = --strict-markers -v --tb=short --cov-fail-under=0

# Paths are relative to rootdir (pytest auto-detects rootdir from test file location)
# When running from apps/*/tests/, rootdir is apps/*/, so:
# - . -> apps/*/
# - ../.. -> C:\repo
# - ../../src -> C:\repo\src
# NOTE: We DON'T add '..' because it would add apps/ which causes conflicts with apps/*/src/ai_config_manager
pythonpath =
    .
    ../..
    ../../src

markers =
    timeout: mark tests with timeout
    e2e: end-to-end tests (slow)
    slow: slow tests

# Игнорируем временно проблемные молекулы
ignore =
    apps/mcp_server/tests
    apps/system_proof/tests
    apps/template_service/tests
