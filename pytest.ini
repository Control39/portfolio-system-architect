[tool:pytest]
addopts = --cov=apps --cov=src --cov-report=html --cov-report=term-missing -m "not slow"
testpaths = apps tests/e2e tests/unit
pythonpath = . apps src
markers =
    e2e: E2E tests (services up)
    slow: Slow tests

[tool:pytest-cov]
cov_fail_under = 95

[tool:pytest-cov]
cov_fail_under = 95

