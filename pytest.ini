[pytest]
asyncio_mode = auto
testpaths = python_server/tests apps/*/tests src/*/tests
addopts = --strict-markers -v --tb=short --cov-fail-under=0



# Reduce module import collisions during test collection


pythonpath = .

    apps/ai_config_manager/src
    apps/ai_provider_manager/src
    apps/auth_service/src
    apps/career_development/src
    apps/cognitive_agent/src
    apps/decision_engine/src
    apps/infra_orchestrator/src
    apps/it_compass/src
    apps/job_automation_agent/src
    apps/knowledge_graph/src
    apps/mcp_server/src
    apps/ml_model_registry/src
    apps/portfolio_organizer/src
    apps/system_proof/src
    apps/template_service/src
    apps/thought_architecture/src
    src



markers =
    timeout: mark tests with timeout
    e2e: end-to-end tests (slow)
    slow: slow tests
