name: 'Install Dependencies'
description: 'Install Python dependencies from requirements files'
inputs:
  requirements-file:
    description: 'Path to requirements file'
    required: false
    default: 'requirements-dev.txt'
  extra-index-url:
    description: 'Extra PyPI index URL'
    required: false
    default: ''
  upgrade-pip:
    description: 'Upgrade pip before installing'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Upgrade pip if needed
      if: ${{ inputs.upgrade-pip == 'true' }}
      shell: bash
      run: python -m pip install --upgrade pip
    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ inputs.requirements-file }}
        if [ -f "requirements.txt" ] && [ "${{ inputs.requirements-file }}" != "requirements.txt" ]; then
          pip install -r requirements.txt
        fi
    - name: List installed packages
      shell: bash
      run: pip list
