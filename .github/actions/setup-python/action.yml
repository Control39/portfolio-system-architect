name: 'Setup Python'
description: 'Set up Python with caching and optional version'
inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  cache-dependency-path:
    description: 'Path to dependency file for caching (e.g., requirements.txt)'
    required: false
    default: 'requirements-dev.txt'
runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
    - name: Display Python info
      shell: bash
      run: |
        python --version
        pip --version