name: 🧠 Cognitive Agent Health Check

on:
  push:
    branches: [ main, develop, '**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🔁 Checkout Repository
        uses: actions/checkout@v7

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 🚀 Launch Cognitive Agent (Full Mode)
        run: |
          PYTHONPATH=$PWD python -m agents.cognitive_agent.scripts.scanner_main --mode=full --stop-after=90s
        env:
          PYTHONPATH: $PWD
          LOG_LEVEL: INFO

      - name: 📂 Upload Logs as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-logs-${{ github.run_id }}
          path: agents/logs/
          retention-days: 7

      - name: 📊 Post Status to PR (if applicable)
        if: github.event_name == 'pull_request'
        run: |
          echo "✅ Cognitive Automation Agent успешно прошёл проверку автономии."
          echo "Логи доступны в артефактах: \`agent-logs-${{ github.run_id }}\`"
