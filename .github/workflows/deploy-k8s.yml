name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'deployment/k8s/**'
      - 'gateway/**'
      - 'api/**'
      - 'docker-compose.yml'
      - 'Dockerfile*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      force:
        description: 'Force deployment even if tests fail'
        required: false
        default: false
        type: boolean

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: success() || github.event.inputs.force == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ secrets.DOCKER_USERNAME }}/portfolio-gateway
          ${{ secrets.DOCKER_USERNAME }}/portfolio-api
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push gateway image
      uses: docker/build-push-action@v7
      with:
        context: ./gateway
        file: ./gateway/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push API image
      uses: docker/build-push-action@v7
      with:
        context: ./api
        file: ./api/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 --decode > ~/.kube/config
        kubectl cluster-info

    - name: Deploy to Kubernetes
      run: |
        # Apply Kubernetes manifests
        if [ -d "deployment/k8s" ]; then
          kubectl apply -f deployment/k8s/namespace.yaml
          kubectl apply -f deployment/k8s/configmaps.yaml
          kubectl apply -f deployment/k8s/secrets.yaml
          kubectl apply -f deployment/k8s/deployments.yaml
          kubectl apply -f deployment/k8s/services.yaml
          kubectl apply -f deployment/k8s/ingress.yaml
        else
          echo "No Kubernetes manifests found in deployment/k8s/"
        fi

    - name: Wait for deployment to complete
      run: |
        kubectl rollout status deployment/portfolio-gateway -n portfolio-system --timeout=300s
        kubectl rollout status deployment/portfolio-api -n portfolio-system --timeout=300s

    - name: Verify deployment
      run: |
        echo "Deployment status:"
        kubectl get pods -n portfolio-system
        echo ""
        echo "Services:"
        kubectl get svc -n portfolio-system

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build-images, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 --decode > ~/.kube/config
        kubectl cluster-info

    - name: Deploy to Production
      run: |
        # Apply production manifests
        if [ -d "deployment/k8s/production" ]; then
          kubectl apply -f deployment/k8s/production/ -R
        elif [ -d "deployment/k8s" ]; then
          kubectl apply -f deployment/k8s/ -R
        fi

    - name: Wait for production deployment
      run: |
        kubectl rollout status deployment/portfolio-gateway -n portfolio-system --timeout=300s
        kubectl rollout status deployment/portfolio-api -n portfolio-system --timeout=300s

    - name: Run smoke tests
      run: |
        # Simple smoke test to verify deployment
        echo "Running smoke tests..."
        # Add actual smoke test commands here
        echo "Smoke tests completed"

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [test, build-images, deploy-staging, deploy-production]
    if: always()

    steps:
    - name: Send deployment notification
      run: |
        echo "Deployment workflow completed"
        echo "Status:"
        echo "- Test: ${{ needs.test.result }}"
        echo "- Build: ${{ needs.build-images.result }}"
        echo "- Staging: ${{ needs.deploy-staging.result }}"
        echo "- Production: ${{ needs.deploy-production.result }}"

        if [[ "${{ needs.deploy-staging.result }}" == "success" ]]; then
          echo "✅ Staging deployment successful"
        else
          echo "❌ Staging deployment failed"
        fi

        if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
          echo "✅ Production deployment successful"
        elif [[ "${{ needs.deploy-production.result }}" == "skipped" ]]; then
          echo "⚠️  Production deployment skipped (not triggered)"
        fi
