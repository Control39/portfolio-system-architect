name: Code Quality & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  lint-python:
    name: Python Lint & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install tools
        run: |
          pip install ruff black bandit

      - name: Check formatting with Black
        run: |
          black --check apps/ src/ tests/ || echo "::warning::Formatting issues found"

      - name: Run ruff
        id: lint
        run: |
          ruff check apps/ src/ tests/ --output-format=json > ruff-report.json || echo "[]" > ruff-report.json

      - name: Run Bandit security scan
        id: bandit
        run: |
          echo "::group::Bandit security scan"
          bandit -r apps/ src/ -f json -o bandit-report.json || echo '{"results": []}' > bandit-report.json
          echo "::endgroup::"

      - name: Count Bandit findings
        id: count-bandit
        run: |
          bandit_count=$(jq '.results | length' bandit-report.json 2>/dev/null || echo "0")
          echo "bandit_count=$bandit_count" >> "$GITHUB_OUTPUT"
          echo "🔒 Bandit found $bandit_count security issues"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 14

      - name: Count Python lint errors
        id: count-errors
        run: |
          error_count=$(jq '[.[] | select(.type == "error")] | length' ruff-report.json 2>/dev/null || echo "0")
          warning_count=$(jq '[.[] | select(.type == "warning")] | length' ruff-report.json 2>/dev/null || echo "0")
          echo "error_count=$error_count" >> "$GITHUB_OUTPUT"
          echo "warning_count=$warning_count" >> "$GITHUB_OUTPUT"
          echo "📊 Python lint: $error_count errors, $warning_count warnings"

      - name: Upload ruff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-lint-report
          path: ruff-report.json
          retention-days: 7

  lint-powershell:
    name: PowerShell Lint
    runs-on: windows-latest
    if: false  # временно отключено, требует доработки
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        id: lint-ps
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path apps/, src/, scripts/ -Recurse -Include @("*.ps1", "*.psm1") -Severity @("Error", "Warning")
          $results | ConvertTo-Json -Depth 5 | Out-File -FilePath ps-lint-report.json
          Write-Host "✅ PowerShell lint completed"

      - name: Upload PowerShell lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: powershell-lint-report
          path: ps-lint-report.json
          retention-days: 7

  final-report:
    name: Quality Gate Report
    runs-on: ubuntu-latest
    needs: [lint-python]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "🚦 Quality checks completed"
          echo "Python lint status: ${{ needs.lint-python.result }}"
