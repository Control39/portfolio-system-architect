name: Code Quality & Documentation (SourceCraft → GitHub Sync)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1" # Еженедельно в понедельник
  workflow_dispatch: # Ручной запуск

jobs:
  setup-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-key }}
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Cache Python dependencies
        id: cache
        uses: actions/cache@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

  validate-config:
    runs-on: ubuntu-latest
    needs: setup-cache
    timeout-minutes: 5
    outputs:
      valid: ${{ steps.validate.outcome == 'success' }}
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Restore Python cache
        uses: actions/cache@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup-cache.outputs.cache-key }}

      # Улучшение 1: чёткая валидация YAML с явным кодом выхода
      - name: Validate YAML configs with schema
        id: validate
        run: |
          pip install pyyaml yamllint
          valid_files=()
          has_errors=0

          for file in project-config.yaml documentation-structure.yaml code-quality.yaml; do
            if [ -f "$file" ]; then
              echo "🔍 Linting $file..."
              if ! yamllint "$file"; then
                echo "❌ YAML lint failed for $file"
                has_errors=1
              fi
              if ! python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
                echo "❌ Invalid YAML syntax in $file"
                has_errors=1
              else
                valid_files+=("$file")
                echo "✅ Valid YAML: $file"
              fi
            else
              echo "⚠️ File not found: $file (skipping)"
            fi
          done

          if [ ${#valid_files[@]} -eq 0 ]; then
            echo "❌ No YAML files found for validation"
            exit 1
          fi

          if [ $has_errors -ne 0 ]; then
            echo "❌ Validation failed due to errors in YAML files"
            exit 1
          else
            echo "✅ All YAML files validated successfully"
          fi

  lint-python:
    runs-on: ubuntu-latest
    needs: validate-config
    if: needs.validate-config.outputs.valid == 'true'
    timeout-minutes: 10
    outputs:
      passed: ${{ steps.lint.outcome == 'success' }}
      error_count: ${{ steps.count-errors.outputs.error_count }}
      warning_count: ${{ steps.count-errors.outputs.warning_count }}
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
      - name: Restore Python cache
        uses: actions/cache@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup-cache.outputs.cache-key }}
      - name: Install tools
        run: pip install ruff black bandit
      - name: Check formatting with Black
        run: |
          if [ -d "components" ] || [ -d "scripts" ]; then
            black --check components/ scripts/ || echo "⚠️ Formatting issues found"
          else
            echo "⚠️ No Python directories to check"
          fi
      - name: Run ruff
        id: lint
        run: |
          if [ -d "components" ] || [ -d "scripts" ]; then
            ruff check components/ scripts/ --output-format=json > ruff-report.json || echo "[]" > ruff-report.json
          else
            echo "⚠️ No Python directories to lint"
            echo "[]" > ruff-report.json
          fi

      - name: Run Bandit security scan
        id: bandit
        run: |
          echo "🔒 Running Bandit security scanner..."
          if [ -d "apps" ] || [ -d "src" ] || [ -d "scripts" ]; then
            bandit -r apps/ src/ scripts/ -f json -o bandit-report.json || echo '{"issues": []}' > bandit-report.json
          else
            echo "⚠️ No Python directories to scan"
            echo '{"issues": []}' > bandit-report.json
          fi
          
      - name: Count Bandit findings
        id: count-bandit
        run: |
          echo "🔍 Counting Bandit security issues..."
          if [ -f bandit-report.json ]; then
            content=$(cat bandit-report.json | tr -d ' \\n')
            if [ "$content" = "{\"issues\":[]}" ] || [ -z "$content" ]; then
              echo "📊 No security issues found"
              bandit_count=0
            else
              bandit_count=$(jq '.issues | length' bandit-report.json 2>/dev/null || echo "0")
            fi
            echo "bandit_count=$bandit_count" >> $GITHUB_OUTPUT
            echo "🔒 Bandit found $bandit_count security issues"
          else
            echo "⚠️ No Bandit report found"
            echo "bandit_count=0" >> $GITHUB_OUTPUT
          fi
      - name: Upload Bandit report
        uses: actions/upload-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 14

      # Улучшение 3: проверка на пустые отчёты
      - name: Count Python lint errors and warnings
        id: count-errors
        run: |
          echo "🔍 Counting Python lint issues..."

          if [ -f ruff-report.json ]; then
            # Проверяем, что файл не пустой и не содержит просто []
            content=$(cat ruff-report.json | tr -d ' \n')
            if [ "$content" = "[]" ]; then
              echo "📊 Empty report, no issues found"
              error_count=0
              warning_count=0
            else
              error_count=$(jq '[.[] | select(.level == "error")] | length' ruff-report.json 2>/dev/null || echo "0")
              warning_count=$(jq '[.[] | select(.level == "warning")] | length' ruff-report.json 2>/dev/null || echo "0")
            fi
            
            echo "📊 Python lint stats: $error_count errors, $warning_count warnings"
            echo "error_count=$error_count" >> $GITHUB_OUTPUT
            echo "warning_count=$warning_count" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No ruff report found, using zeros"
            echo "error_count=0" >> $GITHUB_OUTPUT
            echo "warning_count=0" >> $GITHUB_OUTPUT
          fi
      - name: Upload ruff report
        uses: actions/upload-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: always()
        with:
          name: ruff-lint-report
          path: ruff-report.json
          retention-days: 7

  lint-powershell:
    runs-on: windows-latest
    needs: validate-config
    if: false  # временно отключено, требует доработки
    timeout-minutes: 10
    outputs:
      passed: ${{ steps.lint-ps.outcome == 'success' }}
      error_count: ${{ steps.count-ps-errors.outputs.error_count }}
      warning_count: ${{ steps.count-ps-errors.outputs.warning_count }}
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Install PSScriptAnalyzer
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
      - name: Run PSScriptAnalyzer
        id: lint-ps
        shell: pwsh
        run: |
          if (Test-Path "components" -PathType Container -or Test-Path "scripts" -PathType Container) {
            $results = Invoke-ScriptAnalyzer -Path components/, scripts/ -Recurse -Include @("*.ps1", "*.psm1") -Severity @("Error", "Warning")
            $results | ConvertTo-Json -Depth 5 | Out-File -FilePath ps-lint-report.json
            Write-Host "✅ PowerShell lint completed"
          } else {
            Write-Host "⚠️ No PowerShell directories found"
            "[]" | Out-File -FilePath ps-lint-report.json
          }

      # Улучшение 3: проверка на пустые отчёты для PowerShell
      - name: Count PowerShell lint errors and warnings
        id: count-ps-errors
        shell: pwsh
        run: |
          Write-Host "🔍 Counting PowerShell lint issues..."

          if (Test-Path ps-lint-report.json) {
            $content = Get-Content ps-lint-report.json -Raw
            if ($content -eq "[]" -or $content -eq "" -or $content -eq "`n") {
              Write-Host "📊 Empty report, no issues found"
              $errorCount = 0
              $warningCount = 0
            } else {
              $report = $content | ConvertFrom-Json
              $errorCount = ($report | Where-Object { $_.Severity -eq "Error" }).Count
              $warningCount = ($report | Where-Object { $_.Severity -eq "Warning" }).Count
            }
            
            Write-Host "📊 PowerShell lint stats: $errorCount errors, $warningCount warnings"
            Write-Output "error_count=$errorCount" >> $env:GITHUB_OUTPUT
            Write-Output "warning_count=$warningCount" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "⚠️ No PowerShell report found, using zeros"
            Write-Output "error_count=0" >> $env:GITHUB_OUTPUT
            Write-Output "warning_count=0" >> $env:GITHUB_OUTPUT
          }
      - name: Upload PowerShell lint report
        uses: actions/upload-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: always()
        with:
          name: powershell-lint-report
          path: ps-lint-report.json
          retention-days: 7

  validate-documentation:
    runs-on: ubuntu-latest
    needs: [validate-config, lint-python, lint-powershell]
    if: always()
    timeout-minutes: 5
    outputs:
      valid: ${{ steps.docs.outcome == 'success' }}
      missing_files_count: ${{ steps.count-missing.outputs.missing_files }}
      missing_readmes_count: ${{ steps.count-missing.outputs.missing_readmes }}
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install jq
        run: |
          sudo apt-get update
          if ! sudo apt-get install -y jq; then
            echo "❌ Failed to install jq"
            exit 1
          fi
          echo "✅ jq installed successfully"

      - name: Load documentation config
        id: load-config
        run: |
          if [ -f docs-config.json ]; then
            if ! config_content=$(cat docs-config.json | jq -c . 2>/dev/null); then
              echo "⚠️ Invalid JSON in docs-config.json, using defaults"
              echo 'config={"required_files":["README.md","05_MANIFEST/ARCHITECTURE.md","LICENSE","CONTRIBUTING.md"],"component_dirs":["components/"]}' >> $GITHUB_OUTPUT
            else
              echo "config=$config_content" >> $GITHUB_OUTPUT
            fi
          else
            echo 'config={"required_files":["README.md","05_MANIFEST/ARCHITECTURE.md","LICENSE","CONTRIBUTING.md"],"component_dirs":["components/"]}' >> $GITHUB_OUTPUT
          fi

      - name: Check required files and count missing
        id: docs
        run: |
          echo "🔍 Checking required documentation files..."
          required_files=$(echo '${{ steps.load-config.outputs.config }}' | jq -r '.required_files[]?' 2>/dev/null || echo "README.md")
          missing=()

          while IFS= read -r file || [ -n "$file" ]; do
            if [ -n "$file" ]; then
              if [ ! -f "$file" ]; then
                missing+=("$file")
                echo "❌ Missing: $file"
              else
                echo "✅ Found: $file"
              fi
            fi
          done <<< "$(echo "$required_files" | grep -v '^$')"

          echo "missing_files=${#missing[@]}" >> $GITHUB_OUTPUT
          echo "📊 Missing required files: ${#missing[@]}"

          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required files: ${missing[*]}"
            exit 1
          else
            echo "✅ All required files present"
          fi

      - name: Validate component READMEs and count missing
        id: count-missing
        run: |
          echo "🔍 Checking component READMEs..."
          component_dirs=$(echo '${{ steps.load-config.outputs.config }}' | jq -r '.component_dirs[]?' 2>/dev/null || echo "components/")
          missing_readmes=()

          while IFS= read -r dir || [ -n "$dir" ]; do
            if [ -n "$dir" ]; then
              if [ -d "$dir" ] && [ ! -f "${dir}README.md" ]; then
                missing_readmes+=("$dir")
                echo "❌ Missing README in: $dir"
              elif [ -d "$dir" ]; then
                echo "✅ Found README in: $dir"
              fi
            fi
          done <<< "$(echo "$component_dirs" | grep -v '^$')"

          echo "missing_readmes=${#missing_readmes[@]}" >> $GITHUB_OUTPUT
          echo "📊 Missing READMEs: ${#missing_readmes[@]}"

          if [ ${#missing_readmes[@]} -gt 0 ]; then
            echo "❌ Missing READMEs in components:" > docs-validation-report.txt
            printf '  %s\n' "${missing_readmes[@]}" >> docs-validation-report.txt
            exit 1
          else
            echo "✅ All components have README.md"
            echo "✅ All documentation checks passed" > docs-validation-report.txt
          fi

      - name: Upload documentation validation report
        if: always()
        uses: actions/upload-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: docs-validation-report
          path: docs-validation-report.txt
          retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    needs: validate-documentation
    if: always()
    timeout-minutes: 15
    outputs:
      clean: ${{ steps.gitleaks.outcome == 'success' }}
      findings_count: ${{ steps.count-findings.outputs.findings }}
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0
      - name: Run gitleaks
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --report-format sarif --report-path gitleaks-report.sarif

      # Улучшение 3: проверка на пустые отчёты для security
      - name: Count security findings
        id: count-findings
        run: |
          echo "🔍 Counting security findings..."

          if [ -f gitleaks-report.sarif ]; then
            # Проверяем, что файл не пустой
            if [ ! -s gitleaks-report.sarif ]; then
              echo "📊 Empty security report"
              findings=0
            else
              findings=$(jq '.runs[0].results | length' gitleaks-report.sarif 2>/dev/null || echo "0")
            fi
            echo "findings=$findings" >> $GITHUB_OUTPUT
            echo "🔒 Security scan found $findings issues"
          else
            echo "⚠️ No security report found"
            echo "findings=0" >> $GITHUB_OUTPUT
          fi
      - name: Upload security report
        uses: actions/upload-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: always()
        with:
          name: security-scan-report
          path: gitleaks-report.sarif
          retention-days: 30

  generate-documentation:
    runs-on: ubuntu-latest
    needs: [lint-python, validate-documentation]
    if: always()
    timeout-minutes: 10
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
      - name: Restore Python cache
        uses: actions/cache@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup-cache.outputs.cache-key }}
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ requirements.txt not found, skipping"
          fi
      - name: Generate knowledge map
        continue-on-error: true
        run: |
          if [ -f scripts/generate_obsidian_map.py ]; then
            python scripts/generate_obsidian_map.py
            echo "✅ Knowledge map generated"
          else
            echo "⚠️ Knowledge map script not found"
            mkdir -p docs
            echo "# Knowledge Map (placeholder)" > generated_map.md
          fi
      - name: Generate website
        continue-on-error: true
        run: |
          if [ -f scripts/generate_website.py ]; then
            python scripts/generate_website.py
            echo "✅ Website generated"
          else
            echo "⚠️ Website generation script not found"
            mkdir -p docs/website
            echo "<html><body><h1>Documentation Website</h1><p>Generated on $(date)</p></body></html>" > docs/website/index.html
          fi
      - name: Create documentation summary
        run: |
          mkdir -p docs
          cat > docs/SUMMARY.md << EOF
          # Generated Documentation Summary
          - **Last updated:** $(date)
          - **Commit:** ${{ github.sha }}
          - **Status:** Documentation generation completed

          ## Generated Files
          - [Knowledge Map](generated_map.md)
          - [Website](docs/website/index.html)

          ## Project Structure
          $(find . -type d -not -path "*/.git/*" -not -path "*/node_modules/*" | head -20 | sed 's|^\./||')
          EOF
      - name: Archive generated documentation
        uses: actions/upload-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: generated-documentation
          path: |
            generated_map.md
            docs/
          retention-days: 14

  final-report:
    runs-on: ubuntu-latest
    needs:
      [
        validate-config,
        lint-python,
        lint-powershell,
        validate-documentation,
        security-scan,
        generate-documentation,
      ]
    if: always()
    timeout-minutes: 10
    outputs:
      quality_status: ${{ steps.quality-gate.outputs.status }}
      quality_reason: ${{ steps.quality-gate.outputs.reason }}
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      # Улучшение 2: детальное логирование входных данных
      - name: Calculate quality metrics and determine status
        id: quality-gate
        run: |
          echo "🔍 Calculating quality metrics..."
          echo ""
          echo "Input data from previous jobs:"
          echo "  Python lint errors: ${{ needs.lint-python.outputs.error_count }}"
          echo "  Python lint warnings: ${{ needs.lint-python.outputs.warning_count }}"
          echo "  PowerShell lint errors: ${{ needs.lint-powershell.outputs.error_count }}"
          echo "  PowerShell lint warnings: ${{ needs.lint-powershell.outputs.warning_count }}"
          echo "  Missing files: ${{ needs.validate-documentation.outputs.missing_files_count }}"
          echo "  Missing READMEs: ${{ needs.validate-documentation.outputs.missing_readmes_count }}"
          echo "  Security findings: ${{ needs.security-scan.outputs.findings_count }}"

          RUN_ID=${{ github.run_id }}
          REPO=${{ github.repository }}
          ARTIFACT_URL="https://github.com/$REPO/actions/runs/$RUN_ID/artifacts"
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"

          # Собираем метрики с защитой от пустых значений
          PY_ERRORS="${{ needs.lint-python.outputs.error_count }}"
          PY_ERRORS=${PY_ERRORS:-0}
          PY_WARNINGS="${{ needs.lint-python.outputs.warning_count }}"
          PY_WARNINGS=${PY_WARNINGS:-0}

          PS_ERRORS="${{ needs.lint-powershell.outputs.error_count }}"
          PS_ERRORS=${PS_ERRORS:-0}
          PS_WARNINGS="${{ needs.lint-powershell.outputs.warning_count }}"
          PS_WARNINGS=${PS_WARNINGS:-0}

          MISSING_FILES="${{ needs.validate-documentation.outputs.missing_files_count }}"
          MISSING_FILES=${MISSING_FILES:-0}
          MISSING_READMES="${{ needs.validate-documentation.outputs.missing_readmes_count }}"
          MISSING_READMES=${MISSING_READMES:-0}

          SEC_FINDINGS="${{ needs.security-scan.outputs.findings_count }}"
          SEC_FINDINGS=${SEC_FINDINGS:-0}

          # Вычисляем метрики
          TOTAL_ERRORS=$((PY_ERRORS + PS_ERRORS + SEC_FINDINGS))
          TOTAL_WARNINGS=$((PY_WARNINGS + PS_WARNINGS))
          TOTAL_MISSING=$((MISSING_FILES + MISSING_READMES))

          echo ""
          echo "📊 Raw metrics:"
          echo "  Python: errors=$PY_ERRORS, warnings=$PY_WARNINGS"
          echo "  PowerShell: errors=$PS_ERRORS, warnings=$PS_WARNINGS"
          echo "  Security findings: $SEC_FINDINGS"
          echo "  Missing files: $MISSING_FILES"
          echo "  Missing READMEs: $MISSING_READMES"
          echo ""
          echo "📈 Calculated totals:"
          echo "  Total errors: $TOTAL_ERRORS"
          echo "  Total warnings: $TOTAL_WARNINGS"
          echo "  Total missing docs: $TOTAL_MISSING"

          # Определение статуса качества с тремя уровнями
          if [ $TOTAL_ERRORS -gt 0 ] || [ $SEC_FINDINGS -gt 0 ]; then
            QUALITY_STATUS="❌ FAILED"
            STATUS_REASON="Critical issues found (errors or security findings)"
          elif [ $TOTAL_WARNINGS -gt 0 ] || [ $TOTAL_MISSING -gt 0 ]; then
            QUALITY_STATUS="⚠️ WARNING"
            STATUS_REASON="Non-critical issues found (warnings or missing docs)"
          else
            QUALITY_STATUS="✅ PASSED"
            STATUS_REASON="All checks passed"
          fi

          echo "status=$QUALITY_STATUS" >> $GITHUB_OUTPUT
          echo "reason=$STATUS_REASON" >> $GITHUB_OUTPUT

          echo ""
          echo "🚦 Quality Gate: $QUALITY_STATUS"
          echo "📌 Reason: $STATUS_REASON"

          # Улучшение 4: детализация отчёта по безопасности
          SECURITY_DETAILS=""
          if [ $SEC_FINDINGS -gt 0 ] && [ -f gitleaks-report.sarif ]; then
            SECURITY_DETAILS=$(jq -r '.runs[0].results | group_by(.ruleId) | map({ruleId: .[0].ruleId, count: length}) | .[] | "  - \(.ruleId): \(.count) issues"' gitleaks-report.sarif 2>/dev/null || echo "  - Unable to parse security details")
          fi

          # Создаём полный отчёт
          cat > full-report.md << EOF
          # 📊 Code Quality Report
          **Generated:** $(date)
          **Workflow Run:** [View Run]($RUN_URL)

          ## 🚦 Quality Gate: $QUALITY_STATUS
          **Reason:** $STATUS_REASON

          ## 📈 Summary Metrics
          | Metric | Count |
          |--------|-------|
          | 🔴 Errors | $TOTAL_ERRORS |
          | 🟡 Warnings | $TOTAL_WARNINGS |
          | 📝 Missing Docs | $TOTAL_MISSING |
          | 🔒 Security Findings | $SEC_FINDINGS |

          ## 📋 Detailed Metrics
          | Job | Errors | Warnings | Status |
          |-----|--------|----------|--------|
          | Python Lint | $PY_ERRORS | $PY_WARNINGS | ${{ needs.lint-python.result }} |
          | PowerShell Lint | $PS_ERRORS | $PS_WARNINGS | ${{ needs.lint-powershell.result }} |
          | Documentation | - | - | ${{ needs.validate-documentation.result }} |
          | Security Scan | $SEC_FINDINGS | - | ${{ needs.security-scan.result }} |

          ## 🔒 Security Findings Summary
          $(if [ $SEC_FINDINGS -gt 0 ]; then
            echo "$SECURITY_DETAILS"
          else
            echo "No security findings detected"
          fi)

          ## 📁 Artifacts
          - [Python Lint Report]($ARTIFACT_URL)
          - [PowerShell Lint Report]($ARTIFACT_URL)
          - [Documentation Validation]($ARTIFACT_URL)
          - [Security Scan Report]($ARTIFACT_URL)
          - [Generated Documentation]($ARTIFACT_URL)

          ## 📝 Next Steps
          $([ $TOTAL_ERRORS -gt 0 ] && echo "- Fix 🔴 errors first" || echo "")
          $([ $SEC_FINDINGS -gt 0 ] && echo "- Address 🔒 security findings" || echo "")
          $([ $TOTAL_WARNINGS -gt 0 ] && echo "- Review 🟡 warnings" || echo "")
          $([ $TOTAL_MISSING -gt 0 ] && echo "- Add missing documentation 📝" || echo "")
          - Run workflow again after fixes
          EOF

          echo "✅ Full report created"

      - name: Upload full report
        uses: actions/upload-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: full-quality-report
          path: full-report.md
          retention-days: 30

      # Улучшение 6: позитивные сообщения в PR
      - name: Create compact PR comment
        if: github.event_name == 'pull_request'
        id: create-comment
        continue-on-error: true
        run: |
          RUN_ID=${{ github.run_id }}
          REPO=${{ github.repository }}
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"

          QUALITY_STATUS="${{ steps.quality-gate.outputs.status }}"
          STATUS_REASON="${{ steps.quality-gate.outputs.reason }}"

          # Собираем ключевые метрики
          PY_ERRORS="${{ needs.lint-python.outputs.error_count }}"
          PY_ERRORS=${PY_ERRORS:-0}
          PY_WARNINGS="${{ needs.lint-python.outputs.warning_count }}"
          PY_WARNINGS=${PY_WARNINGS:-0}

          PS_ERRORS="${{ needs.lint-powershell.outputs.error_count }}"
          PS_ERRORS=${PS_ERRORS:-0}
          PS_WARNINGS="${{ needs.lint-powershell.outputs.warning_count }}"
          PS_WARNINGS=${PS_WARNINGS:-0}

          SEC_FINDINGS="${{ needs.security-scan.outputs.findings_count }}"
          SEC_FINDINGS=${SEC_FINDINGS:-0}

          MISSING_FILES="${{ needs.validate-documentation.outputs.missing_files_count }}"
          MISSING_FILES=${MISSING_FILES:-0}
          MISSING_READMES="${{ needs.validate-documentation.outputs.missing_readmes_count }}"
          MISSING_READMES=${MISSING_READMES:-0}

          TOTAL_ERRORS=$((PY_ERRORS + PS_ERRORS + SEC_FINDINGS))

          # Компактный комментарий с позитивным сообщением
          cat > pr-comment.md << EOF
          ## ${QUALITY_STATUS} Code Quality Summary

          **${STATUS_REASON}**

          \`\`\`
          Python:    🔴 ${PY_ERRORS} errors  🟡 ${PY_WARNINGS} warnings
          PowerShell: 🔴 ${PS_ERRORS} errors  🟡 ${PS_WARNINGS} warnings
          Security:  🔒 ${SEC_FINDINGS} findings
          Docs:      📝 ${MISSING_FILES} files  📚 ${MISSING_READMES} READMEs
          \`\`\`

          [📊 View Full Report](${RUN_URL})

          $([ $TOTAL_ERRORS -eq 0 ] && [ $SEC_FINDINGS -eq 0 ] && echo "🎉 **Ready to merge!** All quality checks passed." || echo "")
          EOF

          echo "✅ Compact PR comment created"

      # Удаление старых комментариев и публикация нового
      - name: Update PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            try {
              const fs = require('fs');
              const comment = fs.readFileSync('pr-comment.md', 'utf8');
              
              console.log('🔍 Looking for previous comments...');
              
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });
              
              const botComments = comments.filter(c => 
                c.user.type === 'Bot' && 
                c.body.includes('Code Quality Summary')
              );
              
              console.log(`Found ${botComments.length} previous comments`);
              
              for (const oldComment of botComments) {
                console.log(`Deleting comment #${oldComment.id}`);
                await github.rest.issues.deleteComment({
                  comment_id: oldComment.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
              }
              
              console.log('Creating new comment...');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              
              console.log('✅ PR comment updated successfully');
            } catch (error) {
              console.log('⚠️ Failed to update PR comment:', error.message);
            }

