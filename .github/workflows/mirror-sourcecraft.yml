# .github/workflows/mirror-sourcecraft.yml
name: Verify & Mirror SourceCraft → GitHub
on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:        # ручной запуск

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout empty repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Add SourceCraft remote
        run: git remote add srccraft https://sourcecraft.dev/leadarchitect-ai/portfolio-system-architect.git || true

      - name: Fetch everything from SourceCraft
        run: git fetch srccraft --prune --tags

      - name: Run lint (ruff)
        run: |
          pip install ruff
          ruff check .

      - name: Run security scan (trivy)
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.50.3/trivy_0.50.3_Linux-64bit.tar.gz
          tar -xzf trivy_0.50.3_Linux-64bit.tar.gz
          ./trivy fs .

      - name: Push mirror to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/leadarchitect-ai/portfolio-system-architect.git
          git push --mirror origin

