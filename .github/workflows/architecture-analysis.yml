name: Architecture Maturity Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: Analyze architecture maturity
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git stats

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Assistant Orchestrator (JSON report)
        run: |
          python -m assistant_orchestrator \
            --output docs/archive/reports \
            --format json \
            --verbose

      - name: Run Assistant Orchestrator (HTML dashboard)
        run: |
          python -m assistant_orchestrator \
            --output docs/archive/reports \
            --format html

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-reports
          path: docs/archive/reports/
          retention-days: 30

      - name: Display summary
        run: |
          echo "## Architecture Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports generated:" >> $GITHUB_STEP_SUMMARY
          echo "- JSON report with full analysis" >> $GITHUB_STEP_SUMMARY
          echo "- HTML dashboard with visualizations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the artifacts to view the reports." >> $GITHUB_STEP_SUMMARY
