# .github/workflows/test.yml
# CI/CD pipeline для автоматического тестирования

name: Tests and Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        pwsh-version: [ '7.2', '7.4' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PowerShell
        uses: powershell/powershell-setup@v1
        with:
          pwsh-version: ${{ matrix.pwsh-version }}
      
      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          pester --version
      
      - name: Install dependencies
        shell: pwsh
        run: |
          # Установка дополнительных модулей, если нужны
          # Install-Module -Name powershell-yaml -Force -Scope CurrentUser
          Write-Host "Dependencies installed"
      
      - name: Run Unit Tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $testResults = Invoke-Pester -Path tests/unit -PassThru -Output Detailed -CodeCoverage @(
            "src/**/*.psm1",
            "src/**/*.ps1"
          )
          
          Write-Host "Unit Tests Results:"
          Write-Host "  Total: $($testResults.TotalCount)"
          Write-Host "  Passed: $($testResults.PassedCount)"
          Write-Host "  Failed: $($testResults.FailedCount)"
          Write-Host "  Skipped: $($testResults.SkippedCount)"
          
          if ($testResults.CodeCoverage) {
            $coverage = $testResults.CodeCoverage.CoveragePercent
            Write-Host "  Code Coverage: $([math]::Round($coverage, 2))%"
          }
          
          if ($testResults.FailedCount -gt 0) {
            exit 1
          }
      
      - name: Run Integration Tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $testResults = Invoke-Pester -Path tests/integration -PassThru -Output Detailed
          
          Write-Host "Integration Tests Results:"
          Write-Host "  Total: $($testResults.TotalCount)"
          Write-Host "  Passed: $($testResults.PassedCount)"
          Write-Host "  Failed: $($testResults.FailedCount)"
          
          if ($testResults.FailedCount -gt 0) {
            exit 1
          }
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-pwsh${{ matrix.pwsh-version }}
          path: |
            tests/TestResults/*.xml
            tests/TestResults/*.json
          retention-days: 30
      
      - name: Upload Code Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-${{ matrix.os }}-pwsh${{ matrix.pwsh-version }}
          path: tests/TestResults/CodeCoverage.xml
          retention-days: 30
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Полная история для gitleaks
      
      - name: Setup PowerShell
        uses: actions/setup-node@v4
        with:
          pwsh-version: '7.4'
      
      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
      
      - name: Run Security Scanner (PowerShell)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          # Импорт модулей
          Import-Module "$PWD/src/infrastructure/security/SecretManager.psm1" -Force
          Import-Module "$PWD/src/infrastructure/security/SecurityScanner.psm1" -Force
          
          # Инициализация SecretManager
          [SecretManager]::Initialize(@{
              VaultType = "Environment"
              ScanForLeaksOnInitialize = $false
          })
          
          # Запуск сканирования
          $config = @{
              ProjectRoot = $PWD
              UseExternalTools = $false
          }
          
          $results = Invoke-SecurityScan -Config $config
          
          # Вывод результатов
          Write-Host "Security Scan Results:"
          Write-Host "  Total Issues: $($results.Count)"
          
          $highSeverity = $results | Where-Object { $_.Severity -eq 'High' }
          $mediumSeverity = $results | Where-Object { $_.Severity -eq 'Medium' }
          $lowSeverity = $results | Where-Object { $_.Severity -eq 'Low' }
          
          Write-Host "  High: $($highSeverity.Count)"
          Write-Host "  Medium: $($mediumSeverity.Count)"
          Write-Host "  Low: $($lowSeverity.Count)"
          
          # Экспорт в JSON
          $jsonResults = [SecurityScanner]::ExportResultsToJson()
          $jsonPath = "tests/TestResults/security-scan-results.json"
          New-Item -ItemType Directory -Path (Split-Path $jsonPath -Parent) -Force | Out-Null
          $jsonResults | Out-File -FilePath $jsonPath -Encoding UTF8
          
          # Если есть критические проблемы, завершаем с ошибкой
          if ($highSeverity.Count -gt 0) {
            Write-Host "`n❌ Обнаружены критические проблемы безопасности:" -ForegroundColor Red
            foreach ($issue in $highSeverity) {
              Write-Host "  - $($issue.Message) ($($issue.File):$($issue.Line))" -ForegroundColor Red
            }
            exit 1
          }
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
          no-git: false
          exit-code: 1
          severity: high
      
      - name: Upload Security Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: tests/TestResults/security-scan-results.json
          retention-days: 90
  
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PowerShell
        uses: actions/setup-node@v4
        with:
          pwsh-version: '7.4'
      
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          $results = Invoke-ScriptAnalyzer -Path src -Recurse -Severity Error, Warning
          
          if ($results) {
            Write-Host "Linting Issues Found:" -ForegroundColor Yellow
            $results | Format-Table -AutoSize
            exit 1
          } else {
            Write-Host "✅ No linting issues found" -ForegroundColor Green
          }
      
      - name: Upload Linting Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linting-results
          path: |
            **/*.sarif
          retention-days: 30
