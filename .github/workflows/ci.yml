name: CI/CD Pipeline (Consolidated)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Ежедневно в 2:00 UTC для периодического тестирования
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'

jobs:
  # ==================== SECURITY CHECKS ====================
  security-check:
    runs-on: ubuntu-latest
    name: Security Checks
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          pip install safety pip-audit detect-secrets
          # Install syft for SBOM
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          # Install liccheck
          pip install liccheck

      - name: Detect secrets with detect-secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline

      - name: Safety scan
        run: safety check -r requirements-dev.txt --output json > safety-report.json || true

      - name: Pip-audit
        run: pip-audit -r requirements-dev.txt --format json --output pip-audit-report.json || true

      - name: License check
        run: liccheck -r requirements-dev.txt -s licenses.ini || true

      - name: Generate SBOM
        run: syft . -o spdx-json=sbom.spdx.json

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          TRIVY_SECRET_CONFIG_PATH: './trivy-secret.yaml'
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          secret-config: './trivy-secret.yaml'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Archive security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            safety-report.json
            pip-audit-report.json
            sbom.spdx.json
            .secrets.baseline

  # ==================== LINT & FORMAT ====================
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          for d in apps/*/requirements.txt; do [ -f "$d" ] && pip install -r "$d"; done

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.0

      - name: Ruff check
        run: ruff check . --output-format=github

      - name: Black format check
        run: black --check .

  # ==================== PYTHON TESTS (MATRIX) ====================
  python-tests:
    name: Python Tests on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest pytest-cov pytest-asyncio pytest-xdist

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov=apps --cov=gateway --cov-report=xml --cov-report=html --junitxml=junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            junit.xml
            coverage.xml
            htmlcov/

  # ==================== POWERSHELL TESTS ====================
  powershell-tests:
    name: PowerShell Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        pwsh-version: [ '7.2', '7.4' ]
    
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Setup PowerShell
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          pwsh-version: ${{ matrix.pwsh-version }}
      
      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester
          pester --version
      
      - name: Install dependencies
        shell: pwsh
        run: |
          # Установка дополнительных модулей, если нужны
          # Install-Module -Name powershell-yaml -Force -Scope CurrentUser
      
      - name: Run PowerShell tests
        shell: pwsh
        run: |
          $testResults = Invoke-Pester -Path "apps/arch-compass-framework/tests" -PassThru -Output Detailed
          if ($testResults.FailedCount -gt 0) {
            Write-Error "Tests failed: $($testResults.FailedCount)"
            exit 1
          }

  # ==================== INTEGRATION TESTS ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [python-tests, powershell-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install docker-compose

      - name: Start services for integration tests
        run: |
          docker-compose -f docker-compose.yml up -d chromadb postgres
          sleep 30  # Wait for services to start

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Stop services
        if: always()
        run: |
          docker-compose -f docker-compose.yml down

  # ==================== DOCKER BUILD ====================
  docker-build:
    needs: [lint, python-tests, powershell-tests]
    runs-on: ubuntu-latest
    name: Build Docker Images
    permissions:
      contents: read
      packages: write

    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOYMENT ====================
  deploy-gitops:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    name: Deploy via GitOps
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          version: 'latest'

      - name: Authenticate to Kubernetes cluster
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl cluster-info

      - name: Deploy using kustomize
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl apply -k deployment/k8s/overlays/staging

      - name: Wait for deployments
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl rollout status deployment/it-compass -n portfolio --timeout=300s
          kubectl rollout status deployment/cloud-reason -n portfolio --timeout=300s
          kubectl rollout status deployment/ml-model-registry -n portfolio --timeout=300s
          kubectl rollout status deployment/portfolio-organizer -n portfolio --timeout=300s

  # ==================== NOTIFICATIONS ====================
  notify:
    runs-on: ubuntu-latest
    if: failure()
    needs: [security-check, lint, python-tests, powershell-tests, integration-tests, docker-build, deploy-gitops]
    name: Notify on Failure
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 CI Pipeline Failed!
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Action URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ==================== BADGE UPDATES ====================
  update-badges:
    runs-on: ubuntu-latest
    name: Update Badges with Real Metrics
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Update badges with real metrics
        run: |
          python scripts/update-badges.py
          
          # Коммит обновленных бейджей
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Добавляем обновленные файлы
          git add README.md badges/ || echo "No badge files to add"
          git add badges/coverage.md badges/metrics.json 2>/dev/null || echo "No metric files to add"
          
          # Коммит если есть изменения
          git diff --cached --quiet || git commit -m "chore: update badges with real metrics [skip ci]"
          
          echo "Badges updated successfully"

      - name: Push changes
        run: git push origin main
