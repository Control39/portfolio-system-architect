name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security-check:
    runs-on: ubuntu-latest
    name: Security Checks
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          pip install safety pip-audit detect-secrets
          # Install syft for SBOM
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          # Install liccheck
          pip install liccheck

      - name: Detect secrets with detect-secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline

      - name: Safety scan
        run: safety check -r requirements-dev.txt --output json > safety-report.json || true

      - name: Pip-audit
        run: pip-audit -r requirements-dev.txt --format json --output pip-audit-report.json || true

      - name: License check
        run: liccheck -r requirements-dev.txt -s licenses.ini || true

      - name: Generate SBOM
        run: syft . -o spdx-json=sbom.spdx.json

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Archive security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            safety-report.json
            pip-audit-report.json
            sbom.spdx.json
            .secrets.baseline

  lint:
    runs-on: ubuntu-latest
    name: Lint & Format
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          for d in apps/*/requirements.txt; do [ -f "$d" ] && pip install -r "$d"; done

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.0

      - name: Ruff check
        run: ruff check . --output-format=github

      - name: Black format check
        run: black --check .

  test:
    runs-on: ubuntu-latest
    name: Tests & Coverage
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: portfolio_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          for d in apps/*/requirements.txt; do [ -f "$d" ] && pip install -r "$d"; done

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test
          ENVIRONMENT: test
        run: |
          pytest apps/ tests/unit/ \
            --cov=apps/ \
            --cov=src \
            --cov-fail-under=95 \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -m "not slow"

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test
          ENVIRONMENT: test
        run: |
          pytest tests/integration/ -v || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            htmlcov/
            coverage.xml

  docker-build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    name: Build Docker Images
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-gitops:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    name: Deploy via GitOps
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          version: 'latest'

      - name: Authenticate to Kubernetes cluster
        # Example for GKE; adjust for your cluster provider
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl cluster-info

      - name: Deploy using kustomize
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl apply -k deployment/k8s/overlays/staging

      - name: Wait for deployments
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl rollout status deployment/it-compass -n portfolio --timeout=300s
          kubectl rollout status deployment/cloud-reason -n portfolio --timeout=300s
          kubectl rollout status deployment/ml-model-registry -n portfolio --timeout=300s
          kubectl rollout status deployment/portfolio-organizer -n portfolio --timeout=300s

  notify:
    runs-on: ubuntu-latest
    if: failure()
    needs: [security-check, lint, test, docker-build, deploy-gitops]
    name: Notify on Failure
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 CI Pipeline Failed!
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Action URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
