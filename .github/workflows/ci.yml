name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/unit/test_assistant_orchestrator_main.py \
            --ignore=tests/unit/test_embedding_agent_updated.py \
            --cov=apps --cov=src --cov-report=xml --cov-report=term --junitxml=junit.xml -v

      - name: Run skipped tests (optional, for info)
        run: |
          echo "Skipping known problematic tests:"
          echo "  - test_assistant_orchestrator_main.py (CLI mock mismatch)"
          echo "  - test_embedding_agent_updated.py (ChromaDB/HF dependencies)"
          echo "See docs/KNOWN_ISSUES.md for details"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml
          retention-days: 14
