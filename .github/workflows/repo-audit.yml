name: Repository Audit
on:
  schedule:
    # Run every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '**.md'
      - '**.yml'
      - '**.yaml'
      - '**.toml'
      - '**.json'
      - '**.txt'
      - '**.ini'
      - '**.cfg'
      - '**.sh'
      - '**.ps1'
  pull_request:
    branches:
      - main
    paths:
      - '**.py'
      - '**.md'
      - '**.yml'
      - '**.yaml'
      - '**.toml'
      - '**.json'
      - '**.txt'
      - '**.ini'
      - '**.cfg'
      - '**.sh'
      - '**.ps1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Run repository audit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r tools/repo_audit/requirements.txt 2>/dev/null || echo "No specific requirements for tools/repo_audit"

      - name: Run repository audit
        id: audit
        run: |
          cd tools/repo_audit
          python cli.py --format markdown --output ../../audit-report.md
          echo "score=$(python -c "import sys; sys.path.insert(0, '.'); from checker import RepositoryAuditor; a = RepositoryAuditor('.'); a.register_check(__import__('checks.documentation').documentation.DocumentationCheck); a.register_check(__import__('checks.security').security.SecurityCheck); a.register_check(__import__('checks.structure').structure.StructureCheck); a.register_check(__import__('checks.cicd').cicd.CICDCheck); a.register_check(__import__('checks.code_quality').code_quality.CodeQualityCheck); a.run_all(); s = a.score(); print(f'{s[\"percentage\"]:.2f}')")" >> $GITHUB_OUTPUT

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-report
          path: audit-report.md
          retention-days: 30

      - name: Check score threshold
        run: |
          SCORE=${{ steps.audit.outputs.score }}
          if (( $(echo "$SCORE < 80.0" | bc -l) )); then
            echo "Audit score $SCORE% is below 80% threshold"
            echo "## ❌ Repository Audit Failed" >> $GITHUB_STEP_SUMMARY
            echo "Score: **$SCORE%** (minimum required: 80%)" >> $GITHUB_STEP_SUMMARY
            echo "See the attached audit report for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "Audit score $SCORE% meets threshold"
            echo "## ✅ Repository Audit Passed" >> $GITHUB_STEP_SUMMARY
            echo "Score: **$SCORE%**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');
            const score = '${{ steps.audit.outputs.score }}';
            const comment = `## Repository Audit Result\n**Score:** ${score}%\n\n<details><summary>Full Report</summary>\n\n\`\`\`markdown\n${report}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
