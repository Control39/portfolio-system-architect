name: Release

on:
  push:
    tags:
      - 'v*'  # Run on version tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get all history for changelog generation

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install git-changelog

    - name: Get version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          # For manual dispatch, bump version
          CURRENT_VERSION=$(grep -E '^version =' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          
          # Bump version
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          case $BUMP_TYPE in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac
          NEW_VERSION="$major.$minor.$patch"
          
          # Update files
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$NEW_VERSION" >> $GITHUB_OUTPUT
        else
          # For tag push, extract from tag
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "NEW_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
        fi

    - name: Generate changelog
      run: |
        # Generate changelog
        git-changelog -o CHANGELOG.md || {
          echo "Using fallback changelog generation"
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## [${{ steps.get_version.outputs.NEW_VERSION }}] - $(date +%Y-%m-%d)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --oneline --no-merges $(git describe --tags --abbrev=0 2>/dev/null || echo "")..HEAD | sed 's/^/- /' >> CHANGELOG.md
        }

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
        name: Release ${{ steps.get_version.outputs.TAG_NAME }}
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release artifacts
      if: ${{ github.event_name == 'push' }}
      run: |
        # Create source code archive
        tar -czf portfolio-system-architect-${{ steps.get_version.outputs.NEW_VERSION }}.tar.gz --exclude=.git --exclude=node_modules --exclude=__pycache__ .
        
        # Upload to release
        gh release upload ${{ steps.get_version.outputs.TAG_NAME }} portfolio-system-architect-${{ steps.get_version.outputs.NEW_VERSION }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify success
      if: success()
      run: |
        echo "🎉 Release ${{ steps.get_version.outputs.TAG_NAME }} created successfully!"
        echo "View at: https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.TAG_NAME }}"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push gateway image
      uses: docker/build-push-action@v5
      with:
        context: ./gateway
        file: ./gateway/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/portfolio-gateway:${{ steps.get_version.outputs.NEW_VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/portfolio-gateway:latest

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./api
        file: ./api/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/portfolio-api:${{ steps.get_version.outputs.NEW_VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/portfolio-api:latest

  notify-teams:
    name: Notify Teams
    runs-on: ubuntu-latest
    needs: [create-release, publish-pypi, publish-docker]
    if: always()
    
    steps:
    - name: Send notification
      run: |
        echo "Release workflow completed"
        echo "Status: ${{ needs.create-release.result }}, ${{ needs.publish-pypi.result }}, ${{ needs.publish-docker.result }}"
