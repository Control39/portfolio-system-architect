name: Service Structure Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - '.github/workflows/service-structure.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - '.github/workflows/service-structure.yml'

jobs:
  check-service-structure:
    name: Проверка структуры сервисов
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest

      - name: Run service structure check
        run: |
          python scripts/check_service_structure.py

      - name: Upload report (if failed)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: service-structure-report
          path: |
            scripts/check_service_structure.py
          retention-days: 7
