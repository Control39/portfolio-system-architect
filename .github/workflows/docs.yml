name: Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - '**.md'
      - 'docs/**'
      - '!docs/_build/**'
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * *'  # Daily at 3:00 UTC
  workflow_dispatch:

jobs:
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install pydoc-markdown diagrams

    - name: Generate documentation
      run: |
        chmod +x scripts/linux/generate-docs.sh
        ./scripts/linux/generate-docs.sh

    - name: Check for documentation changes
      id: doc-changes
      run: |
        if git diff --name-only HEAD~1 HEAD | grep -q "docs/"; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Documentation files changed"
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No documentation changes"
        fi

    - name: Commit documentation changes
      if: steps.doc-changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        git commit -m "docs: auto-generate documentation [skip ci]" || echo "No changes to commit"

    - name: Push changes
      if: steps.doc-changes.outputs.changes == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref_name }}

  build-and-deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    needs: generate-docs
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install MkDocs
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material

    - name: Build documentation site
      run: |
        # Build the site
        mkdocs build --config-file ./mkdocs.yml --site-dir ../_build --clean

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: _build
        publish_branch: gh-pages
