name: Deploy to Azure

on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: portfolio-system-architect
  AZURE_WEBAPP_PLAN: portfolio-plan
  RESOURCE_GROUP: portfolio-rg
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE: ghcr.io/leadarchitect-ai/portfolio-system-architect:latest

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # Create environment in GitHub for additional control

    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure login
        run: az account show

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          context: .
          # push: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          images: ${{ env.DOCKER_IMAGE }}

      - name: Run health check
        run: |
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1

