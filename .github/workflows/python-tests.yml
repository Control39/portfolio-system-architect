name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Ежедневно в 2:00 UTC
  workflow_dispatch:

jobs:
  test:
    name: Python Tests on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install pytest pytest-cov pytest-asyncio pytest-xdist

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov=apps --cov=gateway --cov-report=xml --cov-report=html --junitxml=junit.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          junit.xml
          coverage.xml
          htmlcov/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install docker-compose

    - name: Start services for integration tests
      run: |
        docker-compose -f docker-compose.yml up -d chromadb postgres
        sleep 30  # Wait for services to start

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short

    - name: Stop services
      if: always()
      run: |
        docker-compose -f docker-compose.yml down

  notify:
    name: Notify Test Results
    runs-on: ubuntu-latest
    needs: [test, integration-tests]
    if: always()

    steps:
    - name: Send notification
      run: |
        echo "Tests completed with status: ${{ needs.test.result }}"
        echo "Integration tests status: ${{ needs.integration-tests.result }}"