name: Auto Update Badges

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual triggering
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.python-version'
      - 'scripts/update-badges*.py'
      - '.github/workflows/auto-update-badges.yml'

jobs:
  update-badges:
    runs-on: ubuntu-latest
    name: Auto Update Badges
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov tomli
      
      - name: Get current badge metrics (before update)
        id: before-metrics
        run: |
          # Run the badge health check to get current score
          set +e
          python scripts/check-badges-health.py
          exit_code=$?
          set -e
          
          if [ $exit_code -ne 0 ]; then
            echo "Warning: check-badges-health.py failed with exit code $exit_code"
            # Пробуем прочитать существующий файл, если он есть
            if [ -f "badges/health-report.json" ]; then
                HEALTH_SCORE=$(python -c "import json; print(json.load(open('badges/health-report.json')).get('health_score', 0))")
                echo "current_health_score=$HEALTH_SCORE" >> $GITHUB_OUTPUT
            else
                echo "current_health_score=0" >> $GITHUB_OUTPUT
            fi
          elif [ -f "badges/health-report.json" ]; then
            HEALTH_SCORE=$(python -c "import json; print(json.load(open('badges/health-report.json')).get('health_score', 0))")
            echo "current_health_score=$HEALTH_SCORE" >> $GITHUB_OUTPUT
          else
            echo "current_health_score=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Update badges based on current configuration
        id: update-badges
        run: |
          echo "Updating badges based on current configuration files..."
          python scripts/update-badges-enhanced.py
          
          # Check if README was actually modified
          if git diff --name-only HEAD | grep -q "README.md"; then
            echo "readme_modified=true" >> $GITHUB_OUTPUT
            echo "Badges updated in README.md"
          else
            echo "readme_modified=false" >> $GITHUB_OUTPUT
            echo "No changes needed in README.md"
          fi
      
      - name: Get updated badge metrics
        id: after-metrics
        if: steps.update-badges.outputs.readme_modified == 'true'
        run: |
          set +e
          python scripts/check-badges-health.py
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "Warning: check-badges-health.py failed with exit code $exit_code"
            echo "updated_health_score=ERROR" >> $GITHUB_OUTPUT
          elif [ -f "badges/health-report.json" ]; then
            HEALTH_SCORE=$(python -c "import json; print(json.load(open('badges/health-report.json')).get('health_score', 0))")
            echo "updated_health_score=$HEALTH_SCORE" >> $GITHUB_OUTPUT
          else
            echo "updated_health_score=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request for badge updates
        id: create-pr
        if: steps.update-badges.outputs.readme_modified == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update badges based on current metrics"
          title: "🔄 Auto-update: Refresh badges based on current project metrics"
          body: |
            ## 🔄 Auto-update: Badge Refresh
            
            This PR automatically updates project badges based on current metrics:
            
            ### 📊 Health Score Changes
            - **Before update:** ${{ steps.before-metrics.outputs.current_health_score }}/100
            - **After update:** ${{ steps.after-metrics.outputs.updated_health_score }}/100
            
            ### 🔧 What was updated:
            - Python version badge (read from pyproject.toml/.python-version)
            - Test coverage badge (based on current pytest coverage)
            - Test status badge (passed/failed)
            - Dependencies count badge
            - Last commit date
            
            ### 📈 Benefits:
            - **Accuracy:** Badges reflect actual project state
            - **Automation:** No manual updates needed
            - **Transparency:** Users see real-time metrics
            
            ### 🤖 Automation Details:
            This PR was automatically created by the [Auto Update Badges](.github/workflows/auto-update-badges.yml) workflow.
            
            ---
            
            *Auto-generated by badge automation system*
          labels: "automated-pr,badges,chore"
          branch: "auto-update/badges-$(date +%Y%m%d-%H%M%S)"
          delete-branch: true
      
      - name: Notify on successful update
        if: steps.update-badges.outputs.readme_modified == 'true' && steps.create-pr.outcome == 'success'
        run: |
          echo "✅ Successfully created PR for badge updates"
          echo "PR Number: ${{ steps.create-pr.outputs.pull-request-number }}"
          echo "PR URL: ${{ steps.create-pr.outputs.pull-request-url }}"
      
      - name: Notify if no updates needed
        if: steps.update-badges.outputs.readme_modified == 'false'
        run: |
          echo "✅ Badges are already up-to-date"
          echo "No changes were made to README.md"
      
      - name: Upload badge reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-update-reports
          path: |
            badges/health-report.json
            badges/metrics.json
            badges/coverage.md
          retention-days: 7