name: Deploy MkDocs Site

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-git-revision-date-localized-plugin

      - name: Build MkDocs site
        run: |
          mkdocs build --config-file docs/mkdocs.yml --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/site

      - name: Deploy K8s (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          kubectl config use-context prod
          kubectl apply -f deployment/
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Trigger SourceCraft Sites deployment
        run: |
          echo "Site will be automatically deployed to SourceCraft Sites"
          echo "Site URL: https://leadarchitect-ai.sourcecraft.site/portfolio-system-architect/"
