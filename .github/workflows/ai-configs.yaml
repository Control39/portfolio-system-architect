name: AI Config CI/CD

on:
  push:
    paths:
      - '.ai-config/**'
      - '.ai-config-gui/**'
  pull_request:
    paths:
      - '.ai-config/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd .ai-config
          npm install

      - name: Validate YAML
        run: |
          cd .ai-config
          node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            const config = yaml.load(fs.readFileSync('master-config.yaml', 'utf8'));
            console.log('✅ Моделей:', config.models.length);
          "

      - name: Run tests
        run: |
          cd .ai-config-gui
          npm install
          npm test

  generate:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd .ai-config
          npm install

      - name: Generate configs
        env:
          GIGACHAT_API_KEY: ${{ secrets.GIGACHAT_API_KEY }}
          YANDEXGPT_API_KEY: ${{ secrets.YANDEXGPT_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd .ai-config
          npm run generate:all

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: generated-configs
          path: |
            .sourcecraft/
            .koda/
            .cline/

  release:
    needs: generate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3

      - name: Build GUI
        run: |
          cd .ai-config-gui
          npm install
          npm run build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            .ai-config-gui/dist/*.exe
            .ai-config-gui/dist/*.dmg
            .ai-config-gui/dist/*.AppImage
