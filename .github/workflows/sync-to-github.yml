name: Sync to GitHub Mirror

on:
  push:
    branches:
      - main
      - gh-pages
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for long paths
        run: git config --global core.longpaths true
        shell: bash
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0
          ref: main  # checkout main to have a base

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Fetch all branches and tags from origin
        run: |
          git fetch origin --tags
          git fetch origin --prune

      - name: List branches
        run: git branch -r

      - name: Push mirror to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Remove old mirror remote if exists
          git remote remove mirror 2>/dev/null || true
          # Add mirror remote using token
          git remote add mirror https://x-access-token:$GITHUB_TOKEN@github.com/Control39/cognitive-systems-architecture.git
          # Push all branches and tags (mirror)
          git push --mirror mirror
          # Cleanup
          git remote remove mirror
