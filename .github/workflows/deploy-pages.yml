name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for long paths
        run: git config --system core.longpaths true
        shell: bash
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'
      
      - name: Install mkdocs and dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-git-revision-date-localized-plugin
      
      - name: Configure site_url for GitHub Pages
        run: |
          cd docs/mkdocs-site
          # Создаем временный mkdocs.yml с правильным site_url для GitHub Pages
          python -c "
          import yaml
          with open('mkdocs.yml', 'r') as f:
              config = yaml.safe_load(f)
          config['site_url'] = 'https://leadarchitect-ai.github.io/portfolio-system-architect/'
          with open('mkdocs.yml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True)
          "
          echo "Updated site_url for GitHub Pages"
      
      - name: Build mkdocs site
        run: |
          cd docs/mkdocs-site
          mkdocs build --site-dir site
      
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/mkdocs-site/site
          publish_branch: gh-pages

