name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify mkdocs.yml exists
        run: |
          if [ ! -f "mkdocs.yml" ]; then
            echo "ERROR: mkdocs.yml not found in root!"
            exit 1
          fi
          echo "✓ mkdocs.yml found"
          cat mkdocs.yml | head -20

      - name: Install MkDocs
        run: |
          pip install --upgrade pip
          pip install mkdocs-material
          pip install mkdocs-git-revision-date-localized-plugin

      - name: Build MkDocs site
        run: |
          echo "Building documentation with mkdocs.yml from root..."
          mkdocs build --config-file ./mkdocs.yml --site-dir ./site --clean -v
          echo "✓ Build successful"
          ls -la site/

      - name: Deploy to GitHub Pages (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          cname: control39.github.io

      - name: Build only (for PRs and feature branches)
        if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'
        run: |
          echo "Documentation built successfully"
          echo "✓ To deploy, merge to main branch"
          du -sh ./site
