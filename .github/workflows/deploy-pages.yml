name: Deploy Documentation to GitHub Pages (Jekyll)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs  # Jekyll config is in docs/
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Verify _config.yml exists
        run: |
          if [ ! -f "_config.yml" ]; then
            echo "ERROR: _config.yml not found in docs/!"
            exit 1
          fi
          echo "✓ _config.yml found"
          cat _config.yml | head -20

      - name: Install Jekyll dependencies
        run: |
          gem install bundler
          bundle install

      - name: Build Jekyll site
        run: |
          echo "Building documentation with Jekyll from docs/..."
          bundle exec jekyll build --destination ../site --baseurl ""
          echo "✓ Build successful"
          ls -la ../site/

      - name: Deploy to GitHub Pages (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          cname: control39.github.io

      - name: Build only (for PRs and feature branches)
        if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'
        run: |
          echo "Documentation built successfully"
          echo "✓ To deploy, merge to main branch"
          du -sh ./site
