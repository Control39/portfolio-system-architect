name: Mirror to SourceCraft

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SOURCECRAFT_SSH_KEY }}

      - name: Add SourceCraft host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ssh.sourcecraft.dev >> ~/.ssh/known_hosts 2>&1 || true
          chmod 644 ~/.ssh/known_hosts

      - name: Add SourceCraft remote
        run: |
          git remote add sourcecraft git@ssh.sourcecraft.dev:leadarchitect-ai/portfolio-system-architect.git || git remote set-url sourcecraft git@ssh.sourcecraft.dev:leadarchitect-ai/portfolio-system-architect.git

      - name: Push to SourceCraft
        run: |
          git push sourcecraft main

      - name: Verify mirror
        run: |
          echo "Mirror sync completed successfully"
          echo "SourceCraft URL: https://sourcecraft.dev/leadarchitect-ai/portfolio-system-architect"
