name: Mirror to SourceCraft

on:
  push:
    branches: [ main, gh-pages ]
  delete:
    branches: [ main, gh-pages ]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to SourceCraft
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Удаляем remote, если уже существует
          git remote remove sourcecraft 2>/dev/null || true

          # Добавляем remote SourceCraft с токеном
          git remote add sourcecraft "https://${{ secrets.SOURCECRAFT_TOKEN }}@sourcecraft.dev/Control39/portfolio-system-architect.git"

          # Пушим все ветки и теги
          git push sourcecraft --all
          git push sourcecraft --tags
        env:
          SOURCECRAFT_TOKEN: ${{ secrets.SOURCECRAFT_TOKEN }}

      - name: Clean up remote
        if: always()
        run: |
          git remote remove sourcecraft || true
