name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-fs-scan:
    name: Trivy FS Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: './trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: './trivy-results.sarif'

  bandit-scan:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r apps/ src/ -f json -o bandit-results.json || true

      - name: Upload Bandit results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit-results.json
          retention-days: 14

  pip-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit dependencies
        run: |
          pip-audit --desc --format=json -o pip-audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 14

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: portfolio-system
            dockerfile: docker/Dockerfile
          - service: it-compass
            dockerfile: docker/Dockerfile.it-compass
          - service: decision-engine
            dockerfile: docker/Dockerfile.decision-engine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            docker build -t ${{ matrix.service }}:test -f ${{ matrix.dockerfile }} .
          else
            echo "::warning::Dockerfile ${{ matrix.dockerfile }} not found, skipping"
            exit 0
          fi

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        if: hashFiles(matrix.dockerfile) != ''
        with:
          image-ref: '${{ matrix.service }}:test'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles(matrix.dockerfile) != ''
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'

  gitleaks:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --report-format sarif --report-path ./gitleaks-report.sarif

      - name: Upload gitleaks results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: './gitleaks-report.sarif'

  notify-security:
    name: Security Notification
    runs-on: ubuntu-latest
    needs: [trivy-fs-scan, bandit-scan, pip-audit, docker-scan, gitleaks]
    if: failure()
    steps:
      - name: Send security alert
        run: |
          echo "::error::Security scan failed! Check the workflow results."
          echo "Failed jobs: ${{ join(needs.*.result, ', ') }}"
