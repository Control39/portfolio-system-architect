---
name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-fs-scan:
    name: Trivy FS Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: './trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          skip-dirs: '.venv/,node_modules/,__pycache__/,*.egg-info,tests/,docs/archive/,_archive/,legacy/,experiments/'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('./trivy-results.sarif') != ''
        with:
          sarif_file: './trivy-results.sarif'

  bandit-scan:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r apps/ src/ -f json -o bandit-results.json || true

      - name: Upload Bandit results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit-results.json
          retention-days: 14

  pip-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit dependencies
        run: |
          pip-audit --desc --format=json -o pip-audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 14

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth-service
            dockerfile: apps/auth_service/Dockerfile
            context: apps/auth_service
          - service: it-compass
            dockerfile: apps/it_compass/Dockerfile
            context: apps/it_compass
          - service: decision-engine
            dockerfile: apps/decision_engine/Dockerfile
            context: apps/decision_engine
          - service: ml-model-registry
            dockerfile: apps/ml_model_registry/Dockerfile
            context: apps/ml_model_registry
          - service: cognitive-agent
            dockerfile: apps/cognitive_agent/Dockerfile
            context: apps/cognitive_agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build & Scan Docker Image
        id: scan
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            docker build -t ${{ matrix.service }}:test -f ${{ matrix.dockerfile }} ${{ matrix.context }}
            trivy image --format sarif --output trivy-${{ matrix.service }}.sarif ${{ matrix.service }}:test
            echo "file-exists=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Dockerfile ${{ matrix.dockerfile }} not found, skipping"
            echo "file-exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF Report
        if: steps.scan.outputs.file-exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'

  gitleaks:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload gitleaks results
        if: steps.gitleaks.outputs.exit-code == '0' || steps.gitleaks.outputs.exit-code == '1'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: './gitleaks-report.sarif'

  notify-security:
    name: Security Notification
    runs-on: ubuntu-latest
    needs: [trivy-fs-scan, bandit-scan, pip-audit, docker-scan, gitleaks]
    if: failure()
    steps:
      - name: Send security alert
        run: |
          echo "::error::Security scan failed! Check the workflow results."
          echo "Failed jobs: ${{ join(needs.*.result, ', ') }}"
