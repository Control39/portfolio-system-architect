# .github/workflows/test.yml
name: Arch-Compass Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        pwsh-version: ['7.2', '7.4']

    steps:
    - uses: actions/checkout@v3

    - name: Setup PowerShell
      uses: actions/setup-node@v4
      with:
        pwsh-version: ${{ matrix.pwsh-version }}

    - name: Install Dependencies
      run: |
        Install-Module -Name Pester -MaximumVersion 5.9.0 -Force -Scope CurrentUser
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

    - name: Run Unit Tests with Coverage
      run: |
        pwsh -Command "
          `$config = [Pester.Configuration]::Default
          `$config.Run.Path = './tests/unit'
          `$config.CodeCoverage.Enabled = `[bool]\$env:ENABLE_COVERAGE
          if (`$config.CodeCoverage.Enabled) {
            `$config.CodeCoverage.Path = './src/**/*.ps1'
          }
          `$config.TestResult.Enabled = `$true
          `$config.TestResult.Format = 'NUnitXml'
          `$config.TestResult.OutputPath = 'testResults-${{ matrix.pwsh-version }}.xml'
          Invoke-Pester -Configuration `$config
        "

    - name: Run Integration Tests
      run: |
        pwsh -Command "
          `$config = [Pester.Configuration]::Default
          `$config.Run.Path = './tests/integration'
          `$config.TestResult.Enabled = `$true
          `$config.TestResult.Format = 'NUnitXml'
          `$config.TestResult.OutputPath = 'integrationResults-${{ matrix.pwsh-version }}.xml'
          Invoke-Pester -Configuration `$config
        "

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.pwsh-version }}
        path: |
          testResults-*.xml
          integrationResults-*.xml

    - name: Upload Coverage
      if: ${{ matrix.pwsh-version == '7.4' && always() }}
      uses: actions/upload-artifact@v3
      with:
        name: coverage
        path: coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v3

    - name: Check for Secrets
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Security Scanner
      run: |
        if (Test-Path "./src/security/SecurityScanner.psm1") {
          Import-Module "./src/security/SecurityScanner.psm1"
          Invoke-SecurityScan -TargetPath .
        } else {
          Write-Warning "SecurityScanner module not found. Skipping custom scan."
        }
      shell: pwsh
