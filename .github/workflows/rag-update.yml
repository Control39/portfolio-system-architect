---
name: RAG System Update

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - '**.md'
      - '!README.md'
      - '!CHANGELOG.md'
  schedule:
    - cron: '0 4 * * *'  # Daily at 4:00 UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'RAG action to perform'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - rebuild
          - status

jobs:
  update-rag:
    name: Update RAG System
    runs-on: ubuntu-latest
    continue-on-error: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install chromadb sentence-transformers langchain-core

      - name: Check if Docker is available
        id: docker_check
        run: |
          if command -v docker &> /dev/null; then
            echo "has_docker=true" >> $GITHUB_OUTPUT
          else
            echo "has_docker=false" >> $GITHUB_OUTPUT
          fi

      - name: Start ChromaDB (if Docker available)
        if: steps.docker_check.outputs.has_docker == 'true'
        run: |
          docker run -d -p 8001:8000 --name chromadb chromadb/chroma:latest
          sleep 10
          echo "Waiting for ChromaDB..."
          for i in {1..20}; do
            if curl -s http://localhost:8001/api/v1/heartbeat > /dev/null 2>&1; then
              echo "✅ ChromaDB is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "⚠️ ChromaDB not ready, but continuing..."

      - name: Run RAG update
        run: |
          chmod +x scripts/rag-automation.sh
          ACTION="${{ github.event.inputs.action || 'update' }}"
          ./scripts/rag-automation.sh --action $ACTION || echo "RAG update skipped (ChromaDB not available)"
        env:
          CHROMA_HOST: localhost
          CHROMA_PORT: 8001

      - name: Stop ChromaDB
        if: always() && steps.docker_check.outputs.has_docker == 'true'
        run: |
          docker stop chromadb 2>/dev/null || true
          docker rm chromadb 2>/dev/null || true
