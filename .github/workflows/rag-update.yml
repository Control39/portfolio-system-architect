name: RAG System Update

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**.md'
      - '!README.md'
      - '!CHANGELOG.md'
  schedule:
    - cron: '0 4 * * *'  # Daily at 4:00 UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'RAG action to perform'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - rebuild
          - status

jobs:
  update-rag:
    name: Update RAG System
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install chromadb sentence-transformers langchain

    - name: Start ChromaDB
      run: |
        # Start ChromaDB using Docker
        docker run -d -p 8001:8000 --name chromadb chromadb/chroma:latest
        sleep 30

    - name: Run RAG update
      run: |
        chmod +x scripts/rag-automation.sh
        ACTION="${{ github.event.inputs.action || 'update' }}"
        ./scripts/rag-automation.sh --action $ACTION

    - name: Stop ChromaDB
      if: always()
      run: |
        docker stop chromadb 2>/dev/null || true
        docker rm chromadb 2>/dev/null || true
