name: Test Cloud Reason Component

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate component-config.yaml
        run: |
          python -c "
          import yaml
          with open('component-config.yaml', 'r', encoding='utf-8') as f:
              config = yaml.safe_load(f)
          print('✅ YAML валиден!')
          "

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          pip install -r components/cloud-reason/requirements.txt
          pip install pytest pytest-cov codecov

      - name: Run dependency check
        run: python -c "from components.cloud-reason.utils.dependency_checker import check_dependencies; check_dependencies()"

      - name: Run tests
        run: pytest components/cloud-reason/tests/ -v

      - name: Generate coverage report
        run: |
          pytest components/cloud-reason/tests/ \
            --cov=components/cloud-reason \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests

      - name: Run security scan
        run: |
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --path .
          else
            echo "⚠️ gitleaks не установлен, пропустите сканирование безопасности"
          fi

      - name: Print environment requirements
        run: python -c "from components.cloud-reason.utils.dependency_checker import print_env_requirements; print_env_requirements()"
