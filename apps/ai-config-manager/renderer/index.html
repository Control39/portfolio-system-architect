<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Config Manager</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Monaco Editor -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <!-- Стили -->
  <style>
    :root {
      --bg-dark: #1e1e1e;
      --bg-darker: #252526;
      --bg-sidebar: #2d2d2d;
      --text-light: #ffffff;
      --text-muted: #a0a0a0;
      --border-color: #404040;
      --accent-blue: #007acc;
      --accent-green: #2ecc71;
      --accent-red: #e74c3c;
      --accent-yellow: #f1c40f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Шапка */
    .header {
      background: var(--bg-darker);
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 500;
    }

    .header h1 i {
      color: var(--accent-blue);
      margin-right: 8px;
    }

    .header-right {
      display: flex;
      gap: 10px;
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.online {
      background: #1a472a;
      color: #2ecc71;
    }

    .status-badge.offline {
      background: #4a1a1a;
      color: #e74c3c;
    }

    /* Основной контейнер */
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Боковая панель */
    .sidebar {
      width: 280px;
      background: var(--bg-darker);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-section h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .project-info {
      background: var(--bg-sidebar);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .project-path {
      font-size: 12px;
      word-break: break-all;
      color: var(--text-muted);
      margin-top: 4px;
      font-family: monospace;
    }

    .action-button {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 8px;
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-light);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .action-button:hover {
      background: #3d3d3d;
      border-color: var(--accent-blue);
    }

    .action-button i {
      width: 18px;
      color: var(--accent-blue);
    }

    .models-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .model-item {
      padding: 8px 12px;
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }


    .model-item:hover {
      border-color: var(--accent-blue);
      transform: translateX(2px);
    }

    .model-name {
      font-weight: 500;
      font-size: 13px;
    }

    .model-type {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Основная панель */
    .content {
      flex: 1;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-tabs {
      background: var(--bg-darker);
      border-bottom: 1px solid var(--border-color);
      padding: 0 16px;
      display: flex;
      gap: 4px;
    }

    .editor-tab {
      padding: 10px 16px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .editor-tab:hover {
      color: var(--text-light);
    }

    .editor-tab.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
      background: rgba(0, 122, 204, 0.1);
    }

    .editor-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .editor-pane {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
    }

    .editor-pane.active {
      display: block;
    }

    #editor, #env-editor {
      width: 100%;
      height: 100%;
    }

    #env-editor {
      background: var(--bg-dark);
      color: var(--text-light);
      border: none;
      padding: 16px;
      font-family: 'Consolas', monospace;
      resize: none;
      outline: none;
    }

    .output-panel {
      background: var(--bg-darker);
      border-top: 1px solid var(--border-color);
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      padding: 8px 16px;
    }

    .output-line {
      color: var(--text-muted);
      margin: 2px 0;
      white-space: pre-wrap;
    }

    .output-line.error {
      color: var(--accent-red);
    }

    .output-line.success {
      color: var(--accent-green);
    }

    /* Статус бар */
    .status-bar {
      background: var(--bg-darker);
      border-top: 1px solid var(--border-color);
      padding: 4px 16px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.online { background: var(--accent-green); }
    .status-dot.offline { background: var(--accent-red); }
    .status-dot.warning { background: var(--accent-yellow); }

    /* Модальные окна */
    .modal-content {
      background: var(--bg-darker);
      color: var(--text-light);
      border: 1px solid var(--border-color);
    }

    .modal-header {
      border-bottom-color: var(--border-color);
    }

    .modal-footer {
      border-top-color: var(--border-color);
    }

    .form-control, .form-select {
      background: var(--bg-sidebar);
      border-color: var(--border-color);
      color: var(--text-light);
    }

    .form-control:focus, .form-select:focus {
      background: var(--bg-sidebar);
      border-color: var(--accent-blue);
      color: var(--text-light);
      box-shadow: none;
    }

    /* Скроллбары */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-darker);
    }

    ::-webkit-scrollbar-thumb {
      background: #404040;
      border-radius: 4px;
    }


    ::-webkit-scrollbar-thumb:hover {
      background: #4d4d4d;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Шапка -->
    <div class="header">
      <div>
        <h1>
          <i class="fas fa-robot"></i>
          AI Config Manager
        </h1>
      </div>
      <div class="header-right">
        <span class="status-badge" id="ollama-badge">
          <i class="fas fa-circle"></i> Ollama
        </span>
        <button class="btn btn-sm btn-outline-secondary" id="minimize-btn">
          <i class="fas fa-minus"></i>
        </button>
        <button class="btn btn-sm btn-outline-secondary" id="maximize-btn">
          <i class="fas fa-square"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" id="close-btn">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Основной контейнер -->
    <div class="main-container">
      <!-- Боковая панель -->
      <div class="sidebar">
        <div class="sidebar-section">
          <h3><i class="fas fa-folder-open"></i> Проект</h3>
          <div class="project-info">
            <div style="font-size: 13px; margin-bottom: 4px;">Текущий проект:</div>
            <div class="project-path" id="project-path">не выбран</div>
          </div>
          <button class="action-button" id="open-project-btn">
            <i class="fas fa-folder-open"></i>
            Открыть проект
          </button>
        </div>

        <div class="sidebar-section">
          <h3><i class="fas fa-bolt"></i> Быстрые действия</h3>
          <button class="action-button" id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Сгенерировать конфиги
          </button>
          <button class="action-button" id="check-ollama-btn">
            <i class="fas fa-search"></i>
            Проверить Ollama
          </button>
          <button class="action-button" id="run-tests-btn">
            <i class="fas fa-vial"></i>
            Запустить тесты
          </button>
          <button class="action-button" id="open-monitor-btn">
            <i class="fas fa-chart-line"></i>
            Открыть мониторинг
          </button>
        </div>

        <div class="sidebar-section">
          <h3><i class="fas fa-microchip"></i> Модели</h3>
          <div class="models-list" id="models-list">
            <!-- Модели будут загружены сюда -->
            <div class="text-muted text-center py-3">
              <i class="fas fa-spinner fa-spin"></i> Загрузка...
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <h3><i class="fas fa-info-circle"></i> Информация</h3>
          <div style="font-size: 12px;">
            <div class="d-flex justify-between mb-1">
              <span class="text-muted">Версия:</span>
              <span>1.0.0</span>
            </div>
            <div class="d-flex justify-between mb-1">
              <span class="text-muted">Node:</span>
              <span id="node-version"></span>
            </div>
            <div class="d-flex justify-between">
              <span class="text-muted">Платформа:</span>
              <span id="platform"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Основная панель -->
      <div class="content">
        <!-- Вкладки редактора -->
        <div class="editor-tabs">
          <button class="editor-tab active" data-tab="master">
            <i class="fas fa-file-code"></i>
            master-config.yaml
          </button>
          <button class="editor-tab" data-tab="env">
            <i class="fas fa-lock"></i>
            .env
          </button>
          <button class="editor-tab" data-tab="monitor">
            <i class="fas fa-chart-bar"></i>
            Мониторинг
          </button>
        </div>


        <!-- Редакторы -->
        <div class="editor-container">
          <div class="editor-pane active" id="master-pane">
            <div id="editor"></div>
          </div>
          <div class="editor-pane" id="env-pane">
            <textarea id="env-editor" placeholder="# Вставьте содержимое .env файла"></textarea>
          </div>
          <div class="editor-pane" id="monitor-pane">
            <div style="padding: 16px; height: 100%; overflow-y: auto;">
              <canvas id="status-chart" style="height: 300px;"></canvas>

              <div class="row mt-4">
                <div class="col-md-6">
                  <div class="card bg-dark">
                    <div class="card-body">
                      <h5 class="card-title">Системная информация</h5>
                      <table class="table table-sm table-dark">
                        <tr>
                          <td>Ollama</td>
                          <td id="mon-ollama">-</td>
                        </tr>
                        <tr>
                          <td>Моделей</td>
                          <td id="mon-models">-</td>
                        </tr>
                        <tr>
                          <td>Конфиги</td>
                          <td id="mon-configs">-</td>
                        </tr>
                        <tr>
                          <td>Uptime</td>
                          <td id="mon-uptime">-</td>
                        </tr>
                      </table>
                    </div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="card bg-dark">
                    <div class="card-body">
                      <h5 class="card-title">Память</h5>
                      <canvas id="memory-chart" style="height: 200px;"></canvas>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Панель вывода -->
        <div class="output-panel" id="output-panel">
          <div class="output-line">
            <i class="fas fa-terminal"></i> Готов к работе...
          </div>
        </div>
      </div>
    </div>

    <!-- Статус бар -->
    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot" id="ollama-status-dot"></span>
        <span id="ollama-status-text">Проверка...</span>
      </div>
      <div class="status-item">
        <i class="fas fa-file-code"></i>
        <span id="configs-count">0/4 конфигов</span>
      </div>
      <div class="status-item">
        <i class="fas fa-clock"></i>
        <span id="current-time"></span>
      </div>
    </div>
  </div>

  <!-- Модальное окно для модели -->
  <div class="modal fade" id="modelModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Детали модели</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="model-details">
          Загрузка...
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Скрипты -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
