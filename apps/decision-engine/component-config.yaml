component:
  name: "decision-engine"
  description: "Система принятия решений на основе AI с REST API и интеграцией с Git"
  version: "0.1.0"
  path: "components/decision-engine/"

dependencies:
  python:
    - "python>=3.8"
    - "fastapi>=0.68.0"
    - "uvicorn>=0.15.0"
    - "pydantic>=1.8.0"
    - "requests>=2.25.0"
    - "gitpython>=3.1.0"
    - "chardet>=5.0.0"
    - "colorama>=0.4.6"

modules:
  - name: "reasoning_engine"
    path: "core/reasoning_engine.py"
    description: "Основной движок рассуждений (Reasoning Chains)"
  - name: "workflow_manager"
    path: "core/workflow_manager.py"
    description: "Управление рабочими процессами"
  - name: "api_endpoints"
    path: "api/endpoints.py"
    description: "REST API endpoints для взаимодействия с системой"
  - name: "schemas"
    path: "api/schemas.py"
    description: "Pydantic-схемы данных для API"
  - name: "git_integration"
    path: "utils/git_integration.py"
    description: "Интеграция с Git (коммиты, синхронизация)"
  - name: "security_scanner"
    path: "utils/security_scanner.py"
    description: "Сканирование кода на наличие секретов (gitleaks)"
  - name: "settings"
    path: "config/settings.py"
    description: "Настройки конфигурации системы"

documentation:
  api: "docs/api.md"
  workflows: "docs/workflows.md"
  readme: "README.md"

endpoints:
  - path: "/api/v1/reason"
    method: "POST"
    description: "Запуск процесса рассуждения"
    parameters:
      - name: "context_sources"
        type: "list"
        description: "Источники контекста (git_repo, obsidian_vault и др.)"
      - name: "query"
        type: "string"
        description: "Запрос для анализа"
      - name: "reasoning_type"
        type: "string"
        description: "Тип рассуждения (analysis, synthesis и др.)"
  - path: "/api/v1/workflow"
    method: "GET"
    description: "Управление рабочими процессами"
  - path: "/api/v1/status"
    method: "GET"
    description: "Проверка статуса системы"

tests:
  directory: "tests/"
  files:
    - "test_reasoning.py"
    - "test_api.py"
  coverage_target: 85

ci_cd:
  github_actions:
    workflows:
      - name: "test-decision-engine"
        path: ".github/workflows/test-decision-engine.yml"
      - name: "deploy-decision-engine"
        path: ".github/workflows/deploy-decision-engine.yml"

automation:
  scripts:
    - name: "run_api"
      command: "uvicorn api.endpoints:app --reload --host 0.0.0.0 --port 8000"
      description: "Запуск REST API"
    - name: "run_tests"
      command: "pytest tests/ -v"
      description: "Запуск тестов компонента"
    - name: "security_check"
      command: "gitleaks detect --path ."
      description: "Проверка безопасности кода"

security:
  tools:
    - "gitleaks"
  scan_paths:
    - "**.py"
    - "requirements.txt"

logging:
  level: "INFO"
  output: "logs/decision-engine.log"

env_variables:
  - name: "GIT_REPO_URL"
    description: "URL репозитория Git для интеграции"
  - name: "API_KEY"
    description: "API-ключ для внешних сервисов"
  - name: "LOG_LEVEL"
    description: "Уровень логирования (DEBUG, INFO, WARNING, ERROR)"

