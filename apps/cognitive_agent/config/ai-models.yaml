version: "1.0"
models:
  - id: "ollama-llama3.1"
    name: "Llama 3.1 8B"
    provider:
      type: "ollama"
      baseUrl: "http://localhost:11434"
    capabilities:
      chat: true
      completion: true
      embedding: false
  - id: "gigachat"
    name: "GigaChat GPT 4o Mini"
    provider:
      type: "gigachat"
      apiKey: "${GIGACHAT_API_KEY}"
    capabilities:
      chat: true
      vision: true
      functionCalling: true
  - id: "yandexgpt"
    name: "YandexGPT 3 Lite"
    provider:
      type: "yandexgpt"
      apiKey: "${YANDEXGPT_API_KEY}"
      folderId: "${YANDEXGPT_FOLDER_ID}"
    capabilities:
      chat: true
      completion: true
  - id: "yandexgpt-openai"
    name: "YandexGPT (OpenAI Compatible)"
    provider:
      type: "openai"
      baseUrl: "https://ai.api.cloud.yandex.net/v1"
      apiKey: "${YANDEXGPT_OPENAI_API_KEY}"
      model: "gpt://b1g8ug48iu3bb3gv8iom/yandexgpt/latest"
    capabilities:
      chat: true
      completion: true
      vision: false
      functionCalling: true
  - id: "deepseek"
    name: "DeepSeek R1"
    provider:
      type: "deepseek"
      apiKey: "${DEEPSEEK_API_KEY}"
    capabilities:
      chat: true
      coding: true
ui:
  theme: "dark"
  language: "ru"
monitoring:
  enabled: true
  interval: 5000
