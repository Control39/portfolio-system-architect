name: marker-extraction
description: |
  Автоматический workflow для извлечения маркеров компетенций из репозитория.
  Запускается при открытии проекта, коммите или по расписанию.

triggers:
  - event: project_open
    source: vscode
    priority: high
  - event: git_commit
    source: git
    priority: medium
  - event: schedule
    cron: "0 */6 * * *"
    priority: low

steps:
  - name: scan_repository
    action: project_scan
    script: scripts/scanner_main.py
    timeout: 120

  - name: extract_markers
    action: skill_execution
    script: scripts/extract_markers.py
    args:
      - --repo-root
      - "."
      - --auto
    timeout: 300
    depends_on:
      - scan_repository

  - name: update_ui
    action: notification
    message: "Маркеры обновлены: {markers_found} найдено"
    channels:
      - console
      - log
    depends_on:
      - extract_markers

output:
  format: json
  path: docs/evidence/markers_extracted.json
  include_evidence: true
  include_timestamps: true

on_failure:
  action: log_and_notify
  retry_count: 1
  fallback_output: docs/evidence/markers_error.json
