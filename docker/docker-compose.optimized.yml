# Оптимизированная конфигурация Docker Compose с использованием шаблонов
# Использует extends из docker/base-services.yml для устранения дублирования

version: '3.9'

# Импорт базовых конфигураций
x-base: &base-config
  file: ./docker/base-services.yml
  service: postgres-base

services:
  # ============================================================
  # API Gateway & Load Balancer (Traefik)
  # ============================================================
  traefik:
    extends:
      file: ./docker/base-services.yml
      service: traefik-base
    container_name: portfolio-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # ============================================================
  # JWT Auth Service
  # ============================================================
  auth-service:
    extends:
      file: ./docker/base-services.yml
      service: postgres-base
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - JWT_ALGORITHM=HS256
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`localhost`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.service=auth-service"
      - "traefik.http.services.auth-service.loadbalancer.server.port=8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # IT-Compass (Skill Tracking UI)
  # ============================================================
  it-compass:
    build: ./apps/it-compass
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-compass.rule=Host(`localhost`) && PathPrefix(`/it-compass`)"
      - "traefik.http.routers.it-compass.service=it-compass"
      - "traefik.http.services.it-compass.loadbalancer.server.port=8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # Cloud-Reason (RAG API)
  # ============================================================
  cloud-reason:
    build: ./apps/cloud-reason
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./apps/cloud-reason:/app
      - ./data/rag-index:/app/rag-index
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloud-reason.rule=Host(`localhost`) && PathPrefix(`/cloud-reason`)"
      - "traefik.http.routers.cloud-reason.service=cloud-reason"
      - "traefik.http.services.cloud-reason.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # ML-Model-Registry
  # ============================================================
  ml-model-registry:
    build:
      context: ./apps/ml-model-registry
      args:
        - BUILDPLATFORM=linux/amd64
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data/ml-models:/app/models
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml-registry.rule=Host(`localhost`) && PathPrefix(`/ml-registry`)"
      - "traefik.http.routers.ml-registry.service=ml-registry"
      - "traefik.http.services.ml-registry.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # Career Development
  # ============================================================
  career-development:
    build: ./apps/career-development/career-development-system
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.career-dev.rule=Host(`localhost`) && PathPrefix(`/career-dev`)"
      - "traefik.http.routers.career-dev.service=career-dev"
      - "traefik.http.services.career-dev.loadbalancer.server.port=8000"
    depends_on:
      - traefik

  # ============================================================
  # Portfolio Organizer
  # ============================================================
  portfolio-organizer:
    build: ./apps/portfolio-organizer/portfolio-organizer
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio-org.rule=Host(`localhost`) && PathPrefix(`/portfolio-organizer`)"
      - "traefik.http.routers.portfolio-org.service=portfolio-org"
      - "traefik.http.services.portfolio-org.loadbalancer.server.port=8004"
    depends_on:
      - traefik

  # ============================================================
  # System Proof (CoT Storage)
  # ============================================================
  system-proof:
    build: ./apps/system-proof
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./data/proofs:/app/proofs
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.system-proof.rule=Host(`localhost`) && PathPrefix(`/system-proof`)"
      - "traefik.http.routers.system-proof.service=system-proof"
      - "traefik.http.services.system-proof.loadbalancer.server.port=8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    extends:
      file: ./docker/base-services.yml
      service: postgres-base
    container_name: postgres-db
    volumes:
      - ./data/db:/docker-entrypoint-initdb.d

  # ============================================================
  # Redis Cache & Queue
  # ============================================================
  redis:
    extends:
      file: ./docker/base-services.yml
      service: redis-base
    container_name: redis-cache
    ports:
      - "6379:6379"

# Общие сети и volumes (наследуются из base-services.yml)
networks:
  portfolio-network:
    external: true
    name: portfolio-network

volumes:
  data:
  logs:
  postgres_data:
    external: true
