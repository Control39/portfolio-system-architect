version: "1.0"
environment: development

# Глобальные настройки
global:
  log_level: INFO
  monitoring:
    enabled: true
  
  # Глобальные ресурсы (словарь)
  resources:
    code-analyzer:
      type: tool
      enabled: true
      config:
        language: python
        linting: true
        testing: true
        security_scan: true
    git-operations:
      type: tool
      enabled: true

# Сервисы
services:
  cognitive-agent:
    enabled: true
    port: 8000
    resources:
      code-analyzer:
        type: tool
        enabled: true
      git-operations:
        type: tool
        enabled: true
  
  decision-engine:
    enabled: true
    port: 8001
    resources:
      reasoning-engine:
        type: ai
        enabled: true
      rag-search:
        type: tool
        enabled: true
  
  infra-orchestrator:
    enabled: true
    port: 8200
    resources:
      service-controller:
        type: tool
        enabled: true
      health-monitor:
        type: tool
        enabled: true

  auth-service:
    enabled: true
    port: 8003
    resources:
      jwt-handler:
        type: tool
        enabled: true
