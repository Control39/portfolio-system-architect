---
# AI Config Manager - Центральная конфигурация
# Portfolio System Architect
# Версия: 1.0.0

# Глобальные настройки AI
ai:
  default_model: "gpt-4"
  temperature: 0.7
  max_tokens: 4096
  timeout: 60

   #Fallback модели
  fallback_models:
    - "gpt-3.5-turbo"
    - "claude-3-haiku"

  # Rate limiting
  rate_limit:
    requests_per_minute: 60
    max_retries: 3

# Конфигурация сервисов
services:

  # Cognitive Automation Agent
  cognitive-agent:
    enabled: true
    autonomy_level: "high"
    approval_required: false
    risk_tolerance: "medium"

    scanner:
      enabled: true
      triggers:
        project_open: true
        file_change: true
        git_commit: true
        schedule: "0 */6 * * *"

    planner:
      enabled: true
      auto_task_creation: true
      priority_framework: "moSCoW"

    learning:
      enabled: true
      metrics_tracking: true
      feedback_loop: true

    resources:
      - name: "code-analyzer"
        type: "tool"
        enabled: true
      - name: "git-operations"
        type: "tool"
        enabled: true

  # Decision Engine
  decision-engine:
    enabled: true
    model: "gpt-4-turbo"
    temperature: 0.5

    reasoning:
      enabled: true
      chain_of_thought: true
      max_steps: 10

    rag:
      enabled: true
      vector_store: "chroma"
      collection_name: "decisions"
      top_k: 5

    resources:
      - name: "reasoning-engine"
        type: "ai"
        enabled: true
      - name: "rag-search"
        type: "tool"
        enabled: true

  # Job Automation Agent
  job-automation-agent:
    enabled: true
    model: "gpt-3.5-turbo"

    job_search:
      enabled: true
      platforms:
        - "hh.ru"
        - "linkedin"
        - "glassdoor"
      frequency: "daily"

    resume:
      auto_optimize: true
      tailor_per_job: true

    resources:
      - name: "job-scraper"
        type: "tool"
        enabled: true
      - name: "resume-parser"
        type: "tool"
        enabled: true

  # Portfolio Organizer
  portfolio-organizer:
    enabled: true

    evidence_collection:
      enabled: true
      auto_scan: true
      scan_frequency: "weekly"

    compass_integration:
      enabled: true
      auto_map_markers: true

    resources:
      - name: "evidence-collector"
        type: "tool"
        enabled: true
      - name: "compass-sync"
        type: "integration"
        enabled: true

  # ML Model Registry
  ml-model-registry:
    enabled: true
    storage: "local"  # local, s3, azure-blob

    versioning:
      enabled: true
      auto_version: true

    a_b_testing:
      enabled: false

    resources:
      - name: "model-storage"
        type: "storage"
        enabled: true
      - name: "model-versioning"
        type: "tool"
        enabled: true

  # IT Compass
  it-compass:
    enabled: true

    tracking:
      enabled: true
      auto_detect: true

    recommendations:
      enabled: true
      frequency: "weekly"

    resources:
      - name: "marker-tracker"
        type: "tool"
        enabled: true
      - name: "career-advisor"
        type: "ai"
        enabled: true

  # MCP Server
  mcp-server:
    enabled: true
    host: "localhost"
    port: 8000

    tools:
      file_operations: true
      git_operations: true
      compass_integration: true
      monitoring: true

    resources:
      - name: "file-tools"
        type: "tool"
        enabled: true
      - name: "git-tools"
        type: "tool"
        enabled: true

  # Auth Service
  auth_service:
    enabled: true
    jwt_expiry: 3600  # seconds
    refresh_token_expiry: 86400  # 24 hours

    resources:
      - name: "jwt-handler"
        type: "tool"
        enabled: true

  # Knowledge Graph
  knowledge_graph:
    enabled: true
    storage: "neo4j"  # neo4j, networkx, custom

    indexing:
      enabled: true
      auto_index: true

    resources:
      - name: "graph-engine"
        type: "tool"
        enabled: true

  # System Proof
  system_proof:
    enabled: true

    validation:
      enabled: true
      auto_verify: true

    resources:
      - name: "proof-collector"
        type: "tool"
        enabled: true

  # AI Config Manager
  ai-config-manager:
    enabled: true
    config_path: "config/ai-config.yaml"

    hot_reload:
      enabled: true
      watch_interval: 1.0

    resources:
      - name: "config-watcher"
        type: "tool"
        enabled: true
      - name: "config-validator"
        type: "tool"
        enabled: true

  # Thought Architecture
  thought-architecture:
    enabled: true
    adr_path: "docs/architecture/decisions/"

    patterns:
      enabled: true
      auto_detect: true

    resources:
      - name: "adr-manager"
        type: "tool"
        enabled: true
      - name: "pattern-detector"
        type: "ai"
        enabled: true

  # Infra Orchestrator
  infra-orchestrator:
    enabled: true
    orchestrator_type: "docker"  # docker, kubernetes, custom

    auto_scale:
      enabled: false
      min_replicas: 1
      max_replicas: 10

    resources:
      - name: "service-controller"
        type: "tool"
        enabled: true
      - name: "health-monitor"
        type: "tool"
        enabled: true

# Ресурсы (глобальные)
resources:
  - name: "code-analyzer"
    type: "tool"
    config:
      language: "python"
      linting: true
      testing: true
      security_scan: true

  - name: "git-operations"
    type: "tool"
    config:
      auto_commit: false
      auto_push: false
      require_review: true

  - name: "reasoning-engine"
    type: "ai"
    config:
      model: "gpt-4"
      temperature: 0.5
      max_steps: 10

  - name: "rag-search"
    type: "tool"
    config:
      vector_store: "chroma"
      embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
      top_k: 5

# Логи и мониторинг
logging:
  level: "INFO"
  format: "json"
  include_timestamps: true

  # Маскирование секретов
  mask_secrets: true
  secret_patterns:
    - "api_key"
    - "apikey"
    - "password"
    - "token"
    - "secret"

# Hot reload настройки
hot_reload:
  enabled: true
  watch_interval: 1.0  # seconds
  debounce_delay: 0.5  # seconds
