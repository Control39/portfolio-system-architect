# Pre-commit хуки для контроля качества кода
# Установка: pip install pre-commit && pre-commit install

repos:
  # === Python ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace      # Удаляет пробелы в конце строк
      - id: end-of-file-fixer        # Добавляет newline в конце файла
      - id: check-yaml               # Проверка YAML синтаксиса
      - id: check-json               # Проверка JSON синтаксиса
      - id: check-added-large-files  # Предупреждение о больших файлах
        args: ['--maxkb=1024']
      - id: detect-private-key       # Обнаружение приватных ключей
      - id: check-merge-conflict     # Проверка conflict markers

  # === Black (форматирование) ===
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3.12
        args: [--line-length=100]

  # === isort (сортировка импортов) ===
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # === Ruff (быстрый линтер) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # === Security ===
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ['-r', 'src/', '-ll']
        exclude: ^tests/

  # === Проверка зависимостей ===
  - repo: https://github.com/pre-commit/mirrors-pip-audit
    rev: v0.0.1
    hooks:
      - id: pip-audit
        args: ['--ignore-vuln', 'PYSEC-2023-']

  # === Git ===
  - repo: local
    hooks:
      - id: git-check-branch
        name: Check branch name
        entry: python scripts/check_branch_name.py
        language: python
        stages: [commit-msg]
