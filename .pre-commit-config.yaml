# Pre-commit хуки для контроля качества кода
# Установка: pip install pre-commit && pre-commit install

repos:
  # === Python ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [ "--allow-multiple-documents" ]
      - id: check-json
        exclude: "\\.vscode/(settings|launch)\\.json$"
      - id: check-added-large-files
        args: [ "--maxkb=1024" ]
      - id: detect-private-key
        exclude: "\\.codeassistant/tools/python/secrets-scanner\\.py"
      - id: check-merge-conflict

  # === Black (форматирование) ===
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3.12
        args: [ --line-length=100 ]

  # === isort (сортировка импортов) ===
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [ --profile=black, --line-length=100 ]

  # === Ruff (быстрый линтер) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [ --fix, --exit-non-zero-on-fix ]
      - id: ruff-format

  # === Security ===
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: [ "-r", "src/", "-ll" ]
        exclude: ^tests/
        pass_filenames: false

  # === Git ===
  - repo: local
    hooks:
      - id: git-check-branch
        name: Check branch name
        entry: python scripts/check_branch_name.py
        language: python
        stages: [ commit-msg ]
