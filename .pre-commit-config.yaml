# Pre-commit hooks for security and code quality
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

# Exclude archive, legacy, repo-env, and cognitive_agent legacy code from checks
exclude: |
  (?x)^(
    docs/archive/|
    docs/examples/legacy/|
    repo-env/|
    agents/cognitive_agent/scripts/.*|  # Legacy scripts without type hints
    agents/cognitive_agent/tools/.*|    # Legacy tools
    agents/cognitive_agent/__init__\.py
  )$

repos:
  # Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # Исключаем сканер секретов (он содержит regex паттерны), legacy конфиги и тестовые файлы с примерами
        exclude: |
          (?x)^(
            agents/cognitive_agent/tools/python/secrets-scanner\.py|
            agents/cognitive_agent/config/.*\.yaml|
            src/security/tests/test_secret_masking\.py|
            apps/decision_engine/tests/conftest\.py|
            agents/cognitive_agent/rules/security-rules\.md|
            apps/ai_config_manager/tests/test_config\.py|
            docs/templates/SERVICE_README_TEMPLATE\.md|
            scripts/migration/fix_config_paths\.ps1|
            scripts/ai/auto-update-gigacode-token\.ps1|
            apps/auth_service/tests/test_auth_security\.py|
            apps/infra_orchestrator/tests/.*\.ps1|
            apps/infra_orchestrator/src/core/diagnostics/HealthCheck\.psm1|
            scripts/prevent_blind_add\.py|
            \.agents\.disabled/.*|  # Agent disabled files with scan results
            agents\.disabled/.*|  # Agent disabled files with scan results
            .gigacode/.*  # GigaCode config files
          )$

  # Prevent giant files and other large commits
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        exclude: |
          (?x)^(
            deployment/secrets/.*\.yaml|  # Secret files
            Taskfile\.yml|  # Taskfile uses Go templates which break YAML validation
            \.github/workflows/auto-update-badges\.yml|  # Конкретный workflow
            deployment/k8s/.*\.yaml|      # K8s configuration (из main)
            deployment/gitops/.*\.yaml    # GitOps files (из main)
          )$
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml # ✅ Добавлен: проверяет валидность TOML файлов (pyproject.toml)
      - id: debug-statements # ✅ Добавлен: ловит print() и pdb в коде
      - id: detect-private-key
        # Исключаем файл, который ищет приватные ключи по regex
        exclude: |
          (?x)^(
            tests/|
            agents/cognitive_agent/tools/python/secrets-scanner\.py|
            apps/ai_config_manager/tests/test_security\.py|
            src/security/tests/test_secret_masking\.py
          )$

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: |
          (?x)^(
            agents/cognitive_agent/.*|  # Legacy code - too many errors to fix at once
            tests/.*|  # Test files have intentional test patterns
            scripts/.*|  # Scripts often have quick-and-dirty code
            tools/.*|  # Tools may have legacy patterns
            apps/assistant_orchestrator/.*|  # Needs refactoring
            apps/chat_backend/.*|  # Needs refactoring
            apps/competency_gap_engine/.*|  # Needs refactoring
            apps/context_builder/.*|  # Needs refactoring
            apps/decision_engine/.*|  # Needs refactoring
            apps/embedding_agent/.*|  # Needs refactoring
            apps/infra_orchestrator/tests/.*|  # Test patterns
            apps/it_compass/.*|  # Needs refactoring
            apps/job_automation_agent/.*|  # Needs refactoring
            apps/mcp_server/tests/.*|  # Test patterns
            apps/system_proof/.*|  # Needs refactoring
            find_empty_if\.py|  # Temporary script
            check_syntax\.py|  # Temporary script
            count_lines\.py|  # Temporary script
            apps/ai_config_manager/.*|  # Test patterns with intentional pytest.raises(Exception)
            src/ai/gigachat_bridge_fixed\.py  # Legacy compatibility code
          )$
      - id: ruff-format

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic>=2.0.0"]
        exclude: |
          (?x)^(
            agents/cognitive_agent/.*|  # Legacy code
            tests/.*|  # Test files have intentional patterns
            scripts/.*|  # Scripts often have quick-and-dirty code
            tools/.*|  # Tools may have legacy patterns
            apps/.*|  # Need to fix pyproject.toml first
            src/.*|  # Need to fix pyproject.toml first
            docs/examples/.*|  # Examples with intentional type issues
            test_.*\.py|  # Temporary test scripts
            find_.*\.py|  # Temporary scripts
            check_.*\.py|  # Temporary scripts
            count_.*\.py|  # Temporary scripts
            generate_.*\.py  # Temporary scripts
          )$

  # Security checks — обновлен exclude
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        # Исключаем:
        # - scripts/ (локальные скрипты с доверенными командами)
        # - tools/ (инструменты с MD5 для идентификации файлов, не для безопасности)
        # - legacy cognitive_agent код
        # - временные скрипты
        exclude: |
          (?x)^(
            .*test.*\.py|
            agents/cognitive_agent/.*|
            scripts/.*|  # Local scripts with trusted commands
            tools/.*|  # Tools with MD5 for file identification, not security
            apps/.*|  # Application code
            src/.*|  # Source code
            tests/.*|  # Test directories
            check_syntax\.py|  # Temporary script
            find_empty_if\.py|  # Temporary script
            count_lines\.py|  # Temporary script
            find_indent_errors\.py|  # Temporary script
            docs/examples/.*  # Example scripts with intentional patterns
          )$

  # Docker linting (disabled temporarily)
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.14.0
  #   hooks:
  #     - id: hadolint-docker

  # YAML linting (disabled temporarily - fixing indentation)
  # - repo: https://github.com/adrienverge/yamllint
  #   rev: v1.38.0
  #   hooks:
  #     - id: yamllint
  #       args:
  #         [--config-data, "{extends: default, rules: {line-length: disable}}"]

  # Port & Route Validation
  - repo: local
    hooks:
      - id: check-ports
        name: Check port consistency
        entry: python scripts/ci/check_ports.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        always_run: true
        require_serial: true

  # Service Structure Validation (disabled temporarily)
  # - repo: local
  #   hooks:
  #     - id: check-service-structure
  #       name: Check service structure
  #       entry: python scripts/check_service_structure.py
  #       language: python
  #       pass_filenames: false
  #       always_run: true
  #       require_serial: true

  # ✅ ADR (Architecture Decision Records) formatting & linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        files: ^docs/architecture/decisions/ADR-.*\.md$
        args: ["--config", ".markdownlint.json"]

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        files: ^docs/architecture/decisions/ADR-.*\.md$
        args: [--wrap=100]

  - repo: local
    hooks:
      - id: format-adrs
        name: Форматирование и нормализация ADR
        entry: python scripts/format_adrs.py
        language: system
        files: ^docs/architecture/decisions/ADR-.*\.md$
        pass_filenames: false

  - repo: local
    hooks:
      - id: forbid-blind-add
        name: Запрет на слепое git add -A (защита от мусора)
        entry: python scripts/prevent_blind_add.py
        language: system
        stages: [commit]
        pass_filenames: false
