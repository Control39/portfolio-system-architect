# Pre-commit hooks for security and code quality
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

# Exclude archive, legacy, repo-env, and cognitive_agent legacy code from checks
exclude: |
  (?x)^(
    docs/archive/|
    docs/examples/legacy/|
    repo-env/|
    apps/cognitive_agent/scripts/.*|  # Legacy scripts without type hints
    apps/cognitive_agent/tools/.*|    # Legacy tools
    apps/cognitive_agent/__init__\.py
  )$

repos:
  # Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # Исключаем сканер секретов (он содержит regex паттерны) и legacy конфиги
        exclude: |
          (?x)^(
            apps/cognitive_agent/tools/python/secrets-scanner\.py|
            apps/cognitive_agent/config/.*\.yaml|
            src/security/tests/test_secret_masking\.py|
            apps/decision_engine/tests/conftest\.py
          )$

  # Prevent giant files and other large commits
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        exclude: |
          (?x)^(
            deployment/secrets/.*\.yaml|  # Secret files
            \.github/workflows/auto-update-badges\.yml|  # Конкретный workflow
            deployment/k8s/.*\.yaml|      # K8s configuration (из main)
            deployment/gitops/.*\.yaml    # GitOps files (из main)
          )$
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml # ✅ Добавлен: проверяет валидность TOML файлов (pyproject.toml)
      - id: debug-statements # ✅ Добавлен: ловит print() и pdb в коде
      - id: detect-private-key
        # Исключаем файл, который ищет приватные ключи по regex
        exclude: |
          (?x)^(
            tests/|
            apps/cognitive_agent/tools/python/secrets-scanner\.py
          )$

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]

  # Security checks — обновлен exclude
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        exclude: |
          (?x)^(
            .*test.*\.py|
            apps/cognitive_agent/.*|
            scripts/.*|
            tools/.*
          )$

  # Docker linting (disabled temporarily)
  # - repo: https://github.com/hadolint/hadolint
  #   rev: v2.14.0
  #   hooks:
  #     - id: hadolint-docker

  # YAML linting (disabled temporarily - fixing indentation)
  # - repo: https://github.com/adrienverge/yamllint
  #   rev: v1.38.0
  #   hooks:
  #     - id: yamllint
  #       args:
  #         [--config-data, "{extends: default, rules: {line-length: disable}}"]

  # Port & Route Validation
  - repo: local
    hooks:
      - id: check-ports
        name: Check port consistency
        entry: python scripts/ci/check_ports.py --skip-pythonpath
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        always_run: true
        require_serial: true

  # Service Structure Validation (disabled temporarily)
  # - repo: local
  #   hooks:
  #     - id: check-service-structure
  #       name: Check service structure
  #       entry: python scripts/check_service_structure.py
  #       language: python
  #       pass_filenames: false
  #       always_run: true
  #       require_serial: true

  # ✅ ADR (Architecture Decision Records) formatting & linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        files: ^docs/architecture/decisions/ADR-.*\.md$
        args: ["--config", ".markdownlint.json"]

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        files: ^docs/architecture/decisions/ADR-.*\.md$
        args: [--wrap=100]

  - repo: local
    hooks:
      - id: format-adrs
        name: Форматирование и нормализация ADR
        entry: python scripts/format_adrs.py
        language: system
        files: ^docs/architecture/decisions/ADR-.*\.md$
        pass_filenames: false

  - repo: local
    hooks:
      - id: forbid-blind-add
        name: Запрет на слепое git add -A (защита от мусора)
        entry: python scripts/prevent_blind_add.py
        language: system
        stages: [commit]
        pass_filenames: false
