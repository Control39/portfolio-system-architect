[tool:pytest]
# Основные настройки тестирования
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Настройки покрытия кода
addopts =
    --verbose
    --tb=short
    --strict-markers
    --cov=agents.cognitive_agent
    --cov-report=html:coverage_report
    --cov-report=term-missing
    --cov-fail-under=50  # Минимальный порог покрытия 50%

# Игнорируемые файлы
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    venv
    env
    .venv
    dist
    build

# Регистрация маркеров
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    performance: marks tests as performance tests
    enterprise: marks tests as enterprise features tests
    rag: marks tests as rag functionality tests
