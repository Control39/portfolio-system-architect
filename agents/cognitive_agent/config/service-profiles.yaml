# Конфигурация профилей сервисов для Cognitive Agent
# Этот файл содержит профили всех микросервисов в репозитории
# Опционально можно использовать автодетект — просто удалите этот файл

services:
  # ==================== КРИТИЧНЫЕ СЕРВИСЫ ====================

  - name: "decision_engine"
    path: "apps/decision_engine"
    language: "python"
    framework: "fastapi"
    criticality: "critical"
    test_frameworks: ["pytest"]
    coverage_target: 95.0

  - name: "auth_service"
