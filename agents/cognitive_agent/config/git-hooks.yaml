# SECURITY NOTE
# Этот конфиг **перезаписывается** для нейтрализации опасных Git хуков в agents_karantin.
# По умолчанию все хуки отключены.

version: "1.0.0"

hooks:
  pre-commit:
    enabled: false
    description: "disabled by security hardening"
    actions: []

  commit-msg:
    enabled: false
    description: "disabled by security hardening"
    actions: []

  post-commit:
    enabled: false
    description: "disabled by security hardening"
    actions: []

  pre-push:
    enabled: false
    description: "disabled by security hardening"
    actions: []

  post-merge:
    enabled: false
    description: "disabled by security hardening"
    actions: []

settings:
  auto_update: false
  backup_existing: false
  notify_on_failure: false
