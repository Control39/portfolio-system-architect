# Конфигурация мониторинга квот SourceCraft
# Пороговые значения в процентах использования
# Пути указаны ОТНОСИТЕЛЬНО корня проекта (C:\repo)

thresholds:
  # Нейрокредиты - основной ресурс для AI-запросов
  neurocredits: 80
  # Подсказки кода - запросы к Code Assistant
  code_prompts: 70
  # Время автоматизаций - выполнение автономных задач
  automation_time: 75
  # Публичное хранилище - репозитории и артефакты
  public_storage: 90
  # Приватное хранилище - секреты и конфигурации
  private_storage: 85

# Настройки оповещений
alerts:
  # Каналы оповещений
  channels:
    - type: log
      level: warning
    - type: file
      # ✅ Исправлено: путь от корня проекта
      path: "apps/cognitive_agent/logs/quota-alerts.log"
    - type: email
      enabled: false
      recipients: []

  # Частота оповещений (в минутах)
  frequency: 60

  # Эскалация при критических уровнях
  escalation:
    - threshold: 90
      channels: [log, file]
    - threshold: 95
      channels: [log, file]  # email пока отключен
      repeat_interval: 15  # минут

# Стратегии оптимизации
optimization_strategies:
  # Для нейрокредитов
  neurocredits:
    - name: local_processing
      enabled: true
      description: "Локальная обработка простых задач через Ollama"
      savings_estimate: "15-30%"

    - name: caching
      enabled: true
      description: "Кэширование результатов анализа в ChromaDB"
      savings_estimate: "10-20%"

    - name: batch_processing
      enabled: true
      description: "Пакетная обработка запросов"
      savings_estimate: "20-40%"

  # Для времени автоматизаций
  automation_time:
    - name: schedule_optimization
      enabled: true
      description: "Оптимизация расписания запусков"
      savings_estimate: "20-40%"

    - name: parallel_execution
      enabled: true
      description: "Параллельное выполнение задач (макс. 3)"
      max_parallel: 3
      savings_estimate: "30-50%"

  # Для хранилища
  storage:
    - name: cleanup_old_reports
      enabled: true
      description: "Очистка старых отчетов и логов"
      retention_days: 30
      savings_estimate: "0.5-1.0 GB"

    - name: compression
      enabled: false  # Включить при нехватке места
      description: "Сжатие данных хранилища"
      savings_estimate: "40-60%"

# Настройки мониторинга
monitoring:
  # Режим работы: continuous, scheduled, on_demand
  mode: continuous

  # Расписание для scheduled режима (если mode: scheduled)
  schedule:
    # ✅ Упрощено: только интервал, чтобы избежать конфликта с time
    interval_seconds: 3600  # Проверка каждый час

  # Сохранение истории
  history:
    enabled: true
    retention_days: 90
    max_size_gb: 1.0

  # Интеграция с системой обучения
  learning_integration:
    enabled: true
    update_interval_seconds: 86400  # 24 часа
    # ✅ Исправлено: путь к модели (создадим директорию)
    model_path: "apps/cognitive_agent/models/quota-prediction.pkl"

# Интеграции
integrations:
  # SourceCraft API
  sourcecraft:
    enabled: true
    api_version: v1
    cache_ttl_seconds: 300

  # Внутренние системы
  internal:
    - name: agent_config
      enabled: true
      # ✅ Путь от корня проекта
      config_path: "apps/cognitive_agent/config/agent-config.yaml"

    - name: trigger_system
      enabled: true
      config_path: "apps/cognitive_agent/config/triggers.yaml"

# Отчетность
reporting:
  # Форматы отчетов
  formats:
    - json
    - yaml
    - markdown  # html пока отключен для простоты

  # ✅ Исправлено: директория для отчетов (создадим, если нет)
  output_dir: "apps/cognitive_agent/reports/quota"

  # Автоматическая генерация
  auto_generate:
    enabled: true
    on_threshold: true
    daily: true
    weekly: false  # Отключено для экономии ресурсов

  # ✅ Исправлено: пути к шаблонам (создадим директорию)
  templates:
    daily: "apps/cognitive_agent/templates/quota/daily.md"
    weekly: "apps/cognitive_agent/templates/quota/weekly.md"
    alert: "apps/cognitive_agent/templates/quota/alert.md"
