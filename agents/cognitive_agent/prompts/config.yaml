"# Конфигурация выбора промпт-шаблонов для TestGenerator\n\n## Структура\n\nШаблоны организованы по языку → фреймворку → типу теста:\n\n```\nagents/cognitive_agent/prompts/\n└── python/\n    ├── base/\n    │   └── unit.md\n    ├── django/\n    │   └── unit.md\n    ├── fastapi/\n    │   ├── api.md\n    │   └── integration.md\n    └── flask/\n        └── api.md\n```\n\n## Правила выбора шаблона\n\n### По технологии\n- FastAPI → `agents/cognitive_agent/prompts/python/fastapi/`\n- Flask → `agents/cognitive_agent/prompts/python/flask/`\n- Django → `agents/cognitive_agent/prompts/python/django/`\n- Другой/базовый → `agents/cognitive_agent/prompts/python/base/`\n\n### По типу файла\n- `test_*.py` или `*_test.py` → unit tests\n- `api_*.py` или `endpoint*.py` → API tests (FastAPI)\n- `integration*.py` → integration tests\n- `models.py` → unit tests для моделей\n- `views.py` → API tests (для фреймворков с views)\n\n### Приоритеты\n1. Конкретный шаблон (fastapi/api.md)\n2. Базовый шаблон (base/unit.md)\n3. Стандартный шаблон (base/unit.md)\n\n## Примеры\n\n### FastAPI\n```yaml\nfile: \"apps/user_service/api/users.py\"\nframework: \"fastapi\"\n→ agents/cognitive_agent/prompts/python/fastapi/api.md\n```\n\n### Flask\n```yaml\nfile: \"apps/chat_backend/api/messages.py\"\nframework: \"flask\"\n→ agents/cognitive_agent/prompts/python/flask/api.md\n```\n\n### Django\n```yaml\nfile: \"apps/it_compass/models/competency.py\"\nframework: \"django\"\n→ agents/cognitive_agent/prompts/python/django/unit.md\n```\n\n### Base Python\n```yaml\nfile: \"apps/ai_config_manager/config.py\"\nframework: \"base\"\n→ agents/cognitive_agent/prompts/python/base/unit.md\n```\n"
