# Конфигурация интеграций Cognitive Automation Agent
integrations:
  # Интеграция с IT-Compass
  it_compass:
    enabled: true
    endpoint: "http://localhost:8000/api/it-compass"
    api_key: "${IT_COMPASS_API_KEY}"
    auto_sync: true
    sync_interval: 300  # секунд
  
  # Интеграция с Cloud-Reason
  cloud_reason:
    enabled: true
    endpoint: "http://localhost:8080/api/cloud-reason"
    api_key: "${CLOUD_REASON_API_KEY}"
    reasoning_timeout: 30  # секунд
  
  # Интеграция с ML Model Registry
  ml_model_registry:
    enabled: true
    endpoint: "http://localhost:5000/api/models"
    api_key: "${ML_MODEL_REGISTRY_API_KEY}"
    auto_register: true
  
  # Интеграция с системой мониторинга
  monitoring:
    enabled: true
    prometheus_endpoint: "http://localhost:9090"
    grafana_endpoint: "http://localhost:3000"
    metrics_prefix: "cognitive_agent_"
  
  # Интеграция с системой уведомлений
  notifications:
    enabled: true
    telegram:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"
    email:
      smtp_server: "smtp.gmail.com"
      smtp_port: 587
      sender_email: "${EMAIL_SENDER}"
      sender_password: "${EMAIL_PASSWORD}"

# Настройки подключения
connection:
  timeout: 30
  retry_attempts: 3
  retry_delay: 5
  verify_ssl: true

# Настройки синхронизации
sync:
  enabled: true
  interval: 300  # секунд
  batch_size: 100
  max_retries: 3

# Настройки логирования интеграций
logging:
  level: "INFO"
  format: "json"
  file: "logs/integrations.log"
  max_size: "10MB"
  backup_count: 5