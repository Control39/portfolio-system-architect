name: Deploy to Production

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: pip install -r requirements.txt && pip install pytest pytest-cov

            - name: Run tests
              run: pytest tests/ --cov=src --cov-report=xml

            - name: Build Docker image
              run: docker build -t it-compass:${{ github.sha }} .

            - name: Security scan
              run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image it-compass:${{ github.sha }}
