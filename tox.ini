[tox]
envlist = py312
skip_missing_interpreters = true

[testenv]
deps = -rrequirements-dev.txt
commands = pytest {posargs:apps/*/tests/ -v --cov=apps --cov-report=term-missing}

[testenv:unit]
deps = -rrequirements-dev.txt
commands = pytest apps/*/tests/ -m "not integration" -v

[testenv:integration]
deps = -rrequirements-dev.txt
commands = pytest apps/*/tests/ -m "integration" -v

[testenv:coverage]
deps = -rrequirements-dev.txt
commands = pytest apps/*/tests/ -v --cov=apps --cov-report=html

[testenv:lint]
deps =
    ruff>=0.1.0
    mypy>=1.8.0
commands =
    ruff check .
    mypy .

[testenv:format]
deps =
    black>=24.0.0
    ruff>=0.1.0
commands =
    black --check .
    ruff format --check .

[testenv:docs]
deps =
    sphinx
commands =
    sphinx-build -b html docs/ docs/_build/html

[testenv:security]
deps =
    bandit>=1.7.0
    trivy
commands =
    bandit -r . -x .venv,legacy,experiments,.agents -f json -o security-report.json
