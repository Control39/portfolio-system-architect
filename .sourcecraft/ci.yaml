on:
  push:
    - workflows: [build-site, build-docs]
      filter:
        branches: ["main", "feature/architectural-justification-docs"]
    - workflows: [build-docs-only]
      filter:
        paths: ["docs/**", "mkdocs.yml"]
  schedule:
    # Run branch cleanup every Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
      workflows: [cleanup-branches]

workflows:
  build-site:
    tasks:
      - name: build-site
        cubes:
          - name: build-site-cube
            image: python:3.12
            script:
              - echo "Building mkdocs site for SourceCraft Sites..."
              - pip install mkdocs-material mkdocs-git-revision-date-localized-plugin
              - echo "Checking if docs/mkdocs-site directory exists..."
              - 'if [ ! -d "docs/mkdocs-site" ]; then echo "Error: docs/mkdocs-site directory not found"; exit 1; fi'
              - cd docs/mkdocs-site
              - mkdocs build --site-dir /workspace/site --clean
              - echo "Site built successfully at /workspace/site"
              - 'if [ -f "/workspace/site/index.html" ]; then echo "✓ Site verification passed"; else echo "✗ Site build failed"; exit 1; fi'
              - echo ""
              - echo "=== SourceCraft Sites Deployment Instructions ==="
              - echo "1. The site has been built to /workspace/site"
              - echo "2. SourceCraft Sites is configured via .sourcecraft/sites.yaml"
              - echo "3. To deploy:"
              - echo "   a) Merge this PR to main branch"
              - echo "   b) GitHub Actions will deploy to gh-pages branch"
              - echo "   c) SourceCraft Sites will automatically deploy from gh-pages branch"
              - echo "4. Alternatively, manually upload /workspace/site contents via SourceCraft UI"
              - echo "5. Site URL: https://leadarchitect-ai.sourcecraft.site/portfolio-system-architect/"

  build-docs:
    tasks:
      - name: build-full-documentation
        cubes:
          - name: build-mkdocs
            image: python:3.12
            script:
              - echo "Building full documentation with mkdocs..."
              - pip install mkdocs-material mkdocs-git-revision-date-localized-plugin
              - mkdocs build --site-dir /workspace/docs --clean
              - echo "Documentation built successfully at /workspace/docs"

  build-docs-only:
    tasks:
      - name: build-docs-only
        cubes:
          - name: build-docs-cube
            image: python:3.12
            script:
              - echo "Building documentation only (triggered by docs changes)..."
              - pip install mkdocs-material mkdocs-git-revision-date-localized-plugin
              - mkdocs build --site-dir /workspace/docs --clean
              - echo "Documentation built at /workspace/docs"

  cleanup-branches:
    tasks:
      - name: cleanup-old-branches
        cubes:
          - name: cleanup-cube
            image: alpine/git:latest
            script:
              - echo "Starting automated branch cleanup..."
              - echo "Current date: $(date)"
              - echo "Git version: $(git --version)"
              
              # Configure git identity
              - git config --global user.email "ci@sourcecraft.dev"
              - git config --global user.name "SourceCraft CI"
              
              # Run cleanup script (bash version)
              - chmod +x scripts/cleanup-old-branches.sh
              - DRY_RUN=false ./scripts/cleanup-old-branches.sh
              
              - echo "Branch cleanup completed successfully!"