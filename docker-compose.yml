# docker-compose.yml
# Базовый файл для локальной разработки (dev)
# Для production используйте docker-compose.prod.yml
# Для мониторинга: docker-compose -f docker-compose.yml -f docker/docker-compose.monitoring.yml up

version: "3.9"

services:
  # ============================================================
  # 🚀 API Gateway (Traefik)
  # ============================================================
  traefik:
    image: traefik:v3.0
    container_name: portfolio-gateway
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # ============================================================
  # 🔐 JWT Auth Service
  # ============================================================
  auth_service:
    build:
      context: .
      dockerfile: apps/auth_service/Dockerfile
    container_name: auth_service
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - JWT_ALGORITHM=HS256
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app:/app/src
      - OTEL_ENABLED=true
      - SERVICE_NAME=auth_service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`localhost`) && PathPrefix(`/auth`)"
      - "traefik.http.services.auth_service.loadbalancer.server.port=8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # 🧠 Decision Engine (RAG API)
  # ============================================================
  decision-engine:
    build:
      context: .
      dockerfile: apps/decision_engine/Dockerfile
    container_name: decision-engine
    environment:
      - PYTHONPATH=/app:/app/src
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - OTEL_ENABLED=true
      - SERVICE_NAME=decision_engine
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./apps/decision_engine:/app  # ✅ Hot-reload для dev
      - ./data/rag-index:/app/rag-index
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.decision-engine.rule=Host(`localhost`) && PathPrefix(`/decision-engine`)"
      - "traefik.http.services.decision-engine.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # 🧠 Knowledge Graph
  # ============================================================
  knowledge_graph:
    build:
      context: .
      dockerfile: apps/knowledge_graph/Dockerfile
    container_name: knowledge_graph
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - OTEL_ENABLED=true
      - SERVICE_NAME=knowledge_graph
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.knowledge-graph.rule=Host(`localhost`) && PathPrefix(`/knowledge-graph`)"
      - "traefik.http.services.knowledge-graph.loadbalancer.server.port=8006"
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # 💬 Chat Backend
  # ============================================================
  chat_backend:
    build:
      context: .
      dockerfile: apps/chat_backend/Dockerfile
    container_name: chat_backend
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - OTEL_ENABLED=true
      - SERVICE_NAME=chat_backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat-backend.rule=Host(`localhost`) && PathPrefix(`/chat`)"
      - "traefik.http.services.chat-backend.loadbalancer.server.port=8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # 📊 IT-Compass (Streamlit UI)
  # ============================================================
  it-compass:
    build:
      context: .
      dockerfile: apps/it_compass/Dockerfile
    container_name: it-compass
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-compass.rule=Host(`localhost`) && PathPrefix(`/it-compass`)"
      - "traefik.http.services.it-compass.loadbalancer.server.port=8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # 📈 Career Development
  # ============================================================
  career-development:
    build:
      context: .
      dockerfile: apps/career_development/Dockerfile
    container_name: career-development
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.career-dev.rule=Host(`localhost`) && PathPrefix(`/career-dev`)"
      - "traefik.http.services.career-dev.loadbalancer.server.port=8101"
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # 📁 Portfolio Organizer
  # ============================================================
  portfolio_organizer:
    build:
      context: .
      dockerfile: apps/portfolio_organizer/Dockerfile
    container_name: portfolio_organizer
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio-org.rule=Host(`localhost`) && PathPrefix(`/portfolio-organizer`)"
      - "traefik.http.services.portfolio-org.loadbalancer.server.port=8004"
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # ✅ System Proof (CoT Storage)
  # ============================================================
  system-proof:
    build:
      context: .
      dockerfile: apps/system_proof/Dockerfile
    container_name: system-proof
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./data/proofs:/app/proofs
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.system-proof.rule=Host(`localhost`) && PathPrefix(`/system-proof`)"
      - "traefik.http.services.system-proof.loadbalancer.server.port=8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # 🛠️ Infra Orchestrator
  # ============================================================
  infra_orchestrator:
    build:
      context: .
      dockerfile: apps/infra_orchestrator/Dockerfile
    container_name: infra_orchestrator
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infra-orchestrator.rule=Host(`localhost`) && PathPrefix(`/infra-orchestrator`)"
      - "traefik.http.services.infra-orchestrator.loadbalancer.server.port=8200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # ⚙️ AI Config Manager
  # ============================================================
  ai_config_manager:
    build:
      context: .
      dockerfile: apps/ai_config_manager/Dockerfile
    container_name: ai_config_manager
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-config.rule=Host(`localhost`) && PathPrefix(`/ai-config`)"
      - "traefik.http.services.ai-config.loadbalancer.server.port=8500"
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # 🤖 ML Model Registry
  # ============================================================
  ml-model-registry:
    build:
      context: .
      dockerfile: apps/ml_model_registry/Dockerfile
    container_name: ml-model-registry
    environment:
      - PYTHONPATH=/app:/app/src
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=INFO
    volumes:
      - ./data/ml-models:/app/models
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml-registry.rule=Host(`localhost`) && PathPrefix(`/ml-registry`)"
      - "traefik.http.services.ml-registry.loadbalancer.server.port=8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # 🧪 Context Builder
  # ============================================================
  context_builder:
    build:
      context: ./apps/context_builder
      dockerfile: Dockerfile
    container_name: context_builder
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - CONTEXT_BUILDER_PORT=8600
      - PROJECT_ROOT=/app
    volumes:
      - .:/app
      - context_cache:/tmp/contexts
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.context-builder.rule=Host(`localhost`) && PathPrefix(`/context-builder`)"
      - "traefik.http.services.context-builder.loadbalancer.server.port=8600"
    depends_on:
      traefik:
        condition: service_started

  # ============================================================
  # 🎯 Competency Gap Engine
  # ============================================================
  competency_gap_engine:
    build:
      context: .
      dockerfile: apps/competency_gap_engine/Dockerfile
    container_name: competency_gap_engine
    environment:
      - PYTHONPATH=/app:/app/src
      - LOG_LEVEL=INFO
      - MARKET_API_KEY=${MARKET_API_KEY:-}
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gap-engine.rule=Host(`localhost`) && PathPrefix(`/gap-engine`)"
      - "traefik.http.services.gap-engine.loadbalancer.server.port=8300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      it-compass:
        condition: service_healthy
      career-development:
        condition: service_started

  # ============================================================
  # 🗄️ PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/db:/docker-entrypoint-initdb.d
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 🔴 Redis Cache & Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  context_cache:

networks:
  portfolio-network:
    driver: bridge
