version: "3.9"

services:
  # ============================================================
  # API Gateway & Load Balancer (Traefik)
  # ============================================================
  traefik:
    image: traefik:v3.0
    container_name: portfolio-gateway
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - portfolio-network
    environment:
      - TRAEFIK_LOG_LEVEL=INFO
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # ============================================================
  # JWT Auth Service
  # ============================================================
  auth_service:
    build:
      context: .
      dockerfile: apps/auth_service/Dockerfile
    container_name: auth_service
    ports:
      - "8100:8100"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - JWT_ALGORITHM=HS256
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=auth_service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`localhost`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.service=auth_service"
      - "traefik.http.services.auth_service.loadbalancer.server.port=8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # IT-Compass (Skill Tracking UI)
  # ============================================================
  it-compass:
    build:
      context: .
      dockerfile: apps/it_compass/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-compass.rule=Host(`localhost`) && PathPrefix(`/it-compass`)"
      - "traefik.http.routers.it-compass.service=it-compass"
      - "traefik.http.services.it-compass.loadbalancer.server.port=8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # Decision Engine (RAG API)
  # ============================================================
  decision-engine:
    build:
      context: .
      dockerfile: apps/decision_engine/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app:/app/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=decision_engine
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./apps/decision_engine:/app
      - ./data/rag-index:/app/rag-index
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.decision-engine.rule=Host(`localhost`) && PathPrefix(`/decision-engine`)"
      - "traefik.http.routers.decision-engine.service=decision-engine"
      - "traefik.http.services.decision-engine.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # ML Model Registry
  # ============================================================
  ml-model-registry:
    build:
      context: .
      dockerfile: apps/ml_model_registry/Dockerfile
    container_name: portfolio-system-architect-ml-model-registry-1
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app:/app/src
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data/ml-models:/app/models
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml-registry.rule=Host(`localhost`) && PathPrefix(`/ml-registry`)"
      - "traefik.http.routers.ml-registry.service=ml-registry"
      - "traefik.http.services.ml-registry.loadbalancer.server.port=8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # Career Development
  # ============================================================
  career-development:
    build:
      context: .
      dockerfile: apps/career_development/Dockerfile
    ports:
      - "8101:8101"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.career-dev.rule=Host(`localhost`) && PathPrefix(`/career-dev`)"
      - "traefik.http.routers.career-dev.service=career-dev"
      - "traefik.http.services.career-dev.loadbalancer.server.port=8101"
    depends_on:
      - traefik

  # ============================================================
  # Portfolio Organizer
  # ============================================================
  portfolio_organizer:
    build:
      context: .
      dockerfile: apps/portfolio_organizer/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio-org.rule=Host(`localhost`) && PathPrefix(`/portfolio-organizer`)"
      - "traefik.http.routers.portfolio-org.service=portfolio-org"
      - "traefik.http.services.portfolio-org.loadbalancer.server.port=8004"
    depends_on:
      - traefik

  # ============================================================
  # System Proof (CoT Storage)
  # ============================================================
  system-proof:
    build:
      context: .
      dockerfile: apps/system_proof/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./data/proofs:/app/proofs
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.system-proof.rule=Host(`localhost`) && PathPrefix(`/system-proof`)"
      - "traefik.http.routers.system-proof.service=system-proof"
      - "traefik.http.services.system-proof.loadbalancer.server.port=8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # Infra Orchestrator (Service Management API)
  # ============================================================
  infra_orchestrator:
    build:
      context: .
      dockerfile: apps/infra_orchestrator/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infra-orchestrator.rule=Host(`localhost`) && PathPrefix(`/infra-orchestrator`)"
      - "traefik.http.routers.infra-orchestrator.service=infra_orchestrator"
      - "traefik.http.services.infra_orchestrator.loadbalancer.server.port=8200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # AI Config Manager
  # ============================================================
  ai_config_manager:
    build:
      context: .
      dockerfile: apps/ai_config_manager/Dockerfile
    ports:
      - "8500:8500"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Chat Backend
  # ============================================================
  chat_backend:
    build:
      context: .
      dockerfile: apps/chat_backend/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=chat_backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # Knowledge Graph
  # ============================================================
  knowledge_graph:
    build:
      context: .
      dockerfile: apps/knowledge_graph/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=knowledge_graph
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Cognitive Agent (WIP)
  # ============================================================
  cognitive_agent:
    build:
      context: .
      dockerfile: apps/cognitive_agent/Dockerfile
    ports:
      - "8008:8008"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=cognitive_agent
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Job Automation Agent (WIP)
  # ============================================================
  job_automation_agent:
    build:
      context: .
      dockerfile: apps/job_automation_agent/Dockerfile
    ports:
      - "8009:8009"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Thought Architecture (WIP)
  # ============================================================
  thought_architecture:
    build:
      context: .
      dockerfile: apps/thought_architecture/Dockerfile
    ports:
      - "8010:8010"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Template Service (WIP)
  # ============================================================
  template_service:
    build: ./apps/template_service
    ports:
      - "8011:8011"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # MCP Server (WIP)
  # ============================================================
  mcp_server:
    build: ./apps/mcp_server
    ports:
      - "8007:8007"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - .:/app/mounted-repo:ro
    networks:
      - portfolio-network
    depends_on:
      - auth_service

  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/db:/docker-entrypoint-initdb.d
    networks:
      - portfolio-network
    command: postgres -c listen_addresses='*' -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis Cache & Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  data:
  logs:
  postgres_data:
  redis_data:

networks:
  portfolio-network:
    driver: bridge

# ============================================================
# Context builder
# ============================================================
context_builder:
  build:
    context: ./apps/context_builder
    dockerfile: Dockerfile
  container_name: context_builder
  ports:
    - "8600:8600"
  volumes:
    - .:/app
    - context_cache:/tmp/contexts
  environment:
    - CONTEXT_BUILDER_PORT=8600
    - PROJECT_ROOT=/app
    - DEBUG=${DEBUG:-false}
    - ENABLE_CHUNKING=${ENABLE_CHUNKING:-false}
    - MAX_TOKENS_PER_CHUNK=100000
    - RESPECT_GITIGNORE=true
    - DETECT_BINARY=true
    - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
  networks:
    - portfolio-network
  labels:
    - "traefik.enable=true"
    - "traefik.http.routers.context-builder.rule=Host(`localhost`) && PathPrefix(`/context-builder`)"
    - "traefik.http.routers.context-builder.service=context-builder"
    - "traefik.http.services.context-builder.loadbalancer.server.port=8600"
  restart: unless-stopped

volumes:
  context_cache: