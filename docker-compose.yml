services:
  it-compass:
    build: ./02_MODULES/it-compass
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app

  cloud-reason:
    build: ./02_MODULES/cloud-reason
    ports:
      - "8001:8001"
    volumes:
      - ./logs:/app/logs
      - ./02_MODULES/cloud-reason:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db

  career-development:
    build: ./02_MODULES/career-development/career-development-system
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app

  ml-model-registry:
    build:
      context: ./02_MODULES/ml-model-registry
      args:
        - BUILDPLATFORM=linux/amd64
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "8002:8001"
    volumes:
      - ./data/ml-models:/app/models
    environment:
      - DATABASE_URL=sqlite:////app/models/registry.db

  arch-compass:
    build: ./02_MODULES/arch-compass-framework
    volumes:
      - ./02_MODULES/arch-compass-framework:/workspace
    working_dir: /workspace
    command: pwsh -Command 'Import-Module ./ArchCompass.psm1; Get-Help ArchCompass'

  db:
    image: nouchka/sqlite3:latest
    volumes:
      - ./data/db:/data
    command: tail -f /dev/null

volumes:
  data:
  logs:
