version: "3.9"

services:
  # ============================================================
  # API Gateway & Load Balancer (Traefik)
  # Single entry point: localhost:80
  # Dashboard: localhost:8080
  # ============================================================
  traefik:
    image: traefik:v3.0
    container_name: portfolio-gateway
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard: http://localhost:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - portfolio-network
    environment:
      - TRAEFIK_LOG_LEVEL=INFO
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # ============================================================
  # JWT Auth Service
  # Issues & validates tokens
  # Endpoint: POST /auth/token (demo: username=demo, password=demo)
  # ============================================================
  auth_service:
    build:
      context: .
      dockerfile: apps/auth_service/Dockerfile
    container_name: auth_service
    ports:
      - "8100:8100"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - JWT_ALGORITHM=HS256
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=auth_service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`localhost`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.service=auth_service"
      - "traefik.http.services.auth_service.loadbalancer.server.port=8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # IT-Compass (Skill Tracking UI)
  # Route: /it-compass
  # ============================================================
  it-compass:
    build:
      context: .
      dockerfile: apps/it_compass/Dockerfile
    ports:
      - "8501:8501" # Direct access: http://localhost:8501
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-compass.rule=Host(`localhost`) && PathPrefix(`/it-compass`)"
      - "traefik.http.routers.it-compass.service=it-compass"
      - "traefik.http.services.it-compass.loadbalancer.server.port=8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # Decision Engine (RAG API)
  # Route: /decision-engine (via Traefik) or direct: localhost:8001
  # ============================================================
  decision-engine:
    build:
      context: .
      dockerfile: apps/decision_engine/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app:/app/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=decision_engine
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./apps/decision_engine:/app
      - ./data/rag-index:/app/rag-index
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.decision-engine.rule=Host(`localhost`) && PathPrefix(`/decision-engine`)"
      - "traefik.http.routers.decision-engine.service=decision-engine"
      - "traefik.http.services.decision-engine.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # ML Model Registry
  # Route: /ml-registry (via Traefik) or direct: localhost:8002
  # ============================================================
  ml-model-registry:
    build:
      context: .
      dockerfile: apps/ml_model_registry/Dockerfile
    container_name: portfolio-system-architect-ml-model-registry-1
    ports:
      - "8002:8002" # Direct access: http://localhost:8002
    environment:
      - PYTHONPATH=/app:/app/src
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data/ml-models:/app/models
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ml-registry.rule=Host(`localhost`) && PathPrefix(`/ml-registry`)"
      - "traefik.http.routers.ml-registry.service=ml-registry"
      - "traefik.http.services.ml-registry.loadbalancer.server.port=8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # Career Development
  # Route: /career-dev
  # ============================================================
  career-development:
    build:
      context: .
      dockerfile: apps/career_development/Dockerfile
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.career-dev.rule=Host(`localhost`) && PathPrefix(`/career-dev`)"
      - "traefik.http.routers.career-dev.service=career-dev"
      - "traefik.http.services.career-dev.loadbalancer.server.port=8000"
    depends_on:
      - traefik

  # ============================================================
  # Portfolio Organizer
  # Route: /portfolio-organizer
  # ============================================================
  portfolio_organizer:
    build:
      context: .
      dockerfile: apps/portfolio_organizer/Dockerfile
    ports:
      - "8004:8004" # Direct access: http://localhost:8004
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio-org.rule=Host(`localhost`) && PathPrefix(`/portfolio-organizer`)"
      - "traefik.http.routers.portfolio-org.service=portfolio-org"
      - "traefik.http.services.portfolio-org.loadbalancer.server.port=8004"
    depends_on:
      - traefik

  # ============================================================
  # System Proof (CoT Storage)
  # Route: /system-proof
  # ============================================================
  system-proof:
    build:
      context: .
      dockerfile: apps/system_proof/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./data/proofs:/app/proofs
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.system-proof.rule=Host(`localhost`) && PathPrefix(`/system-proof`)"
      - "traefik.http.routers.system-proof.service=system-proof"
      - "traefik.http.services.system-proof.loadbalancer.server.port=8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_started

  # ============================================================
  # Infra Orchestrator (Service Management API)
  # Route: /infra-orchestrator
  # ============================================================
  infra_orchestrator:
    build:
      context: .
      dockerfile: apps/infra_orchestrator/Dockerfile
    ports:
      - "8200:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infra-orchestrator.rule=Host(`localhost`) && PathPrefix(`/infra-orchestrator`)"
      - "traefik.http.routers.infra-orchestrator.service=infra_orchestrator"
      - "traefik.http.services.infra-orchestrator.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # AI Config Manager
  # Status: Monitoring & Configuration
  # ============================================================
  ai_config_manager:
    build:
      context: .
      dockerfile: apps/ai_config_manager/Dockerfile
    ports:
      - "8500:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Chat Backend
  # Status: Stable
  # ============================================================
  chat_backend:
    build:
      context: .
      dockerfile: apps/chat_backend/Dockerfile
    ports:
      - "8005:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=chat_backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - traefik

  # ============================================================
  # Knowledge Graph
  # Status: Stable
  # ============================================================
  knowledge_graph:
    build:
      context: .
      dockerfile: apps/knowledge_graph/Dockerfile
    ports:
      - "8006:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=knowledge_graph
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Cognitive Agent
  # Status: WIP
  # ============================================================
  cognitive_agent:
    build:
      context: .
      dockerfile: apps/cognitive_agent/Dockerfile
    ports:
      - "8008:8000"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - SERVICE_NAME=cognitive_agent
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Job Automation Agent
  # Status: WIP
  # ============================================================
  job_automation_agent:
    build:
      context: .
      dockerfile: apps/job_automation_agent/Dockerfile
    ports:
      - "8009:8000"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Thought Architecture
  # Status: WIP
  # ============================================================
  thought_architecture:
    build:
      context: .
      dockerfile: apps/thought_architecture/Dockerfile
    ports:
      - "8010:8000"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # Template Service
  # Status: WIP (Template for new services)
  # ============================================================
  template_service:
    build: ./apps/template_service
    ports:
      - "8011:8000"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    depends_on:
      - traefik

  # ============================================================
  # MCP Server (Model Context Protocol)
  # Route: Direct access: localhost:8007
  # Status: WIP - Use profile: wip to run
  # ============================================================
  mcp_server:
    build: ./apps/mcp_server
    ports:
      - "8007:8000"
    profiles:
      - wip
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - .:/app/mounted-repo:ro
    networks:
      - portfolio-network
    depends_on:
      - auth_service

  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/db:/docker-entrypoint-initdb.d
    networks:
      - portfolio-network
    command: postgres -c listen_addresses='*' -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis Cache & Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  data:
  logs:
  postgres_data:
  redis_data:

networks:
  portfolio-network:
    driver: bridge