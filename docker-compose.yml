services:
  it-compass:
    build: ./apps/it-compass
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloud-reason:
    build: ./apps/cloud-reason
    ports:
      - "8001:8001"
    volumes:
      - ./logs:/app/logs
      - ./apps/cloud-reason:/app
      - ./data/rag-index:/app/rag-index
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/status')"]
      interval: 30s
      timeout: 10s
      retries: 3

  career-development:
    build: ./apps/career-development/career-development-system
    ports:
      - "8005:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ml-model-registry:
    build:
      context: ./apps/ml-model-registry
      args:
        - BUILDPLATFORM=linux/amd64
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "8002:8001"
    volumes:
      - ./data/ml-models:/app/models
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  portfolio-organizer:
    build: ./apps/portfolio-organizer/portfolio-organizer
    ports:
      - "8004:8004"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004')"]
      interval: 30s
      timeout: 10s
      retries: 3

  system-proof:
    build: ./apps/system-proof
    ports:
      - "8003:8003"
    volumes:
      - ./data:/app/data
      - ./data/proofs:/app/proofs
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003')"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - portfolio-network
    command: postgres -c listen_addresses='*' -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # arch-compass removed from default compose (PowerShell/Windows-only)
  # Run separately with: docker build -f apps/arch-compass-framework/Dockerfile -t arch-compass:latest apps/arch-compass-framework

volumes:
  data:
  logs:
  postgres_data:

networks:
  portfolio-network:
    driver: bridge
