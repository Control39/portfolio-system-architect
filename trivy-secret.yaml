# Trivy secret configuration file
# https://aquasecurity.github.io/trivy/latest/docs/references/configuration/secret-config/

# Secret scanning settings
scan:
  # Enable secret scanning
  secret: true

  # Secret scanning options
  secret-config:
    # Enable built-in rules
    enable-builtin: true

    # Custom rules
    custom:
      # Example custom rule
      - id: custom-api-key
        category: api-key
        description: Custom API Key
        regex: "custom-api-key-[a-zA-Z0-9]{32}"
        severity: HIGH
        tags:
          - api
          - key

# Secret rules
rules:
  # Built-in rules are enabled by default
  builtin: true

  # Custom rules
  custom:
    # AWS Access Key
    - id: aws-access-key
      category: aws
      description: AWS Access Key
      regex: "(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}"
      severity: CRITICAL
      tags:
        - aws
        - key

    # AWS Secret Key
    - id: aws-secret-key
      category: aws
      description: AWS Secret Key
      regex: "(?i)aws(.{0,20})?(?-i)['\\\"][0-9a-zA-Z/+]{40}['\\\"]"
      severity: CRITICAL
      tags:
        - aws
        - secret

    # GitHub Token
    - id: github-token
      category: github
      description: GitHub Token
      regex: "(?i)github(.{0,20})?(?-i)[0-9a-zA-Z]{35,40}"
      severity: CRITICAL
      tags:
        - github
        - token

    # Slack Token
    - id: slack-token
      category: slack
      description: Slack Token
      regex: "(xox[pborsa]-[0-9]{12}-[0-9]{12}-[0-9]{12}-[a-z0-9]{32})"
      severity: CRITICAL
      tags:
        - slack
        - token

    # Private Key
    - id: private-key
      category: key
      description: Private Key
      regex: "(?i)-----BEGIN[ A-Z0-9_-]{0,100}PRIVATE KEY-----"
      severity: CRITICAL
      tags:
        - key
        - private

    # Database credentials
    - id: database-credentials
      category: database
      description: Database Credentials
      regex: "(?i)(database|db)_(user|username|pass|password|host|port).*[=:][^\\s]+"
      severity: HIGH
      tags:
        - database
        - credentials

    # API Keys
    - id: generic-api-key
      category: api
      description: Generic API Key
      regex: "(?i)(api|apikey|api_key|secret|token).*[=:][\\w\\-]{16,}"
      severity: HIGH
      tags:
        - api
        - key

# Secret exclusions
exclude:
  # Exclude files
  files:
    - .gitignore
    - .trivyignore
    - .secrets.baseline

  # Exclude directories
  dirs:
    - .git
    - node_modules
    - vendor
    - .venv
    - venv
    - env

  # Exclude patterns
  patterns:
    - "test"
    - "example"
    - "sample"
    - "dummy"
    - "fake"